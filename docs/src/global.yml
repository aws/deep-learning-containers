# =============================================================================
# Framework Groups for Support Policy Consolidation
# =============================================================================
# Repositories in the same group with matching GA/EOP dates for a version
# are consolidated into a single row. Use lowercase keys.
# Display names are defined in the display_names section.
#
# Supports two formats:
#   Flat list:   group: [repo-a, repo-b]
#   Nested dict: group: { sub-group-a: [repo-a, repo-a-arm64], sub-group-b: [repo-b] }
# Nested sub-groups enable intermediate consolidation when the full group disagrees.
# =============================================================================
framework_groups:
  pytorch:
    pytorch-training:
      - pytorch-training
      - pytorch-training-arm64
    pytorch-inference:
      - pytorch-inference
      - pytorch-inference-arm64
  tensorflow:
    tensorflow-training:
      - tensorflow-training
    tensorflow-inference:
      - tensorflow-inference
      - tensorflow-inference-arm64
  vllm:
    - vllm
    - vllm-arm64

