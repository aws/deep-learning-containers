apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: sglang-deepseek-v4-pro
  labels:
    app: sglang-benchmark
spec:
  replicas: 1
  leaderWorkerTemplate:
    size: 2  # 2 nodes total: 1 leader + 1 worker = 16 GPUs
    restartPolicy: RecreateGroupOnPodRestart
    leaderTemplate:
      metadata:
        labels:
          role: leader
          app: sglang-benchmark
      spec:
        containers:
          - name: sglang-leader
            image: "${SGLANG_IMAGE}"
            securityContext:
              privileged: true
              capabilities:
                add: ["IPC_LOCK"]
            env:
              - name: NCCL_DEBUG
                value: "WARN"
              - name: NCCL_IB_DISABLE
                value: "1"
              - name: NCCL_P2P_DISABLE
                value: "1"
              - name: NCCL_NET_GDR_LEVEL
                value: "0"
              - name: NCCL_SHM_DISABLE
                value: "1"
              - name: FI_PROVIDER
                value: "efa"
              - name: FI_EFA_USE_DEVICE_RDMA
                value: "1"
              - name: FI_EFA_FORK_SAFE
                value: "1"
              - name: HF_HOME
                value: "/models"
              - name: POD_IP
                valueFrom:
                  fieldRef:
                    fieldPath: status.podIP
            command: ["/bin/bash"]
            args:
              - "-c"
              - |
                set -ex
                python3 -m sglang.launch_server \
                  --model-path /models/${MODEL_NAME} \
                  --host 0.0.0.0 \
                  --port 30000 \
                  --tp 16 \
                  --nnodes 2 \
                  --node-rank 0 \
                  --dist-init-addr ${POD_IP}:20000 \
                  --trust-remote-code \
                  --moe-runner-backend marlin \
                  --mem-fraction-static 0.88
            resources:
              limits:
                nvidia.com/gpu: "8"
                cpu: "96"
                memory: "768Gi"
                vpc.amazonaws.com/efa: 4
              requests:
                nvidia.com/gpu: "8"
                cpu: "96"
                memory: "768Gi"
                vpc.amazonaws.com/efa: 4
            ports:
              - containerPort: 30000
              - containerPort: 20000
            readinessProbe:
              httpGet:
                path: /health
                port: 30000
              initialDelaySeconds: 600
              periodSeconds: 30
              timeoutSeconds: 10
              successThreshold: 1
              failureThreshold: 20
            volumeMounts:
              - name: model-volume
                mountPath: /models
              - name: dshm
                mountPath: /dev/shm
        volumes:
          - name: model-volume
            persistentVolumeClaim:
              claimName: fsx-lustre-pvc
          - name: dshm
            emptyDir:
              medium: Memory
              sizeLimit: "64Gi"
        nodeSelector:
          nodepool-type: gpu-h100
        tolerations:
          - key: "nvidia.com/gpu"
            operator: "Exists"
            effect: "NoSchedule"
          - key: "aws.amazon.com/efa"
            operator: "Exists"
            effect: "NoSchedule"
    workerTemplate:
      spec:
        containers:
          - name: sglang-worker
            image: "${SGLANG_IMAGE}"
            securityContext:
              privileged: true
              capabilities:
                add: ["IPC_LOCK"]
            env:
              - name: NCCL_DEBUG
                value: "WARN"
              - name: NCCL_IB_DISABLE
                value: "1"
              - name: NCCL_P2P_DISABLE
                value: "1"
              - name: NCCL_NET_GDR_LEVEL
                value: "0"
              - name: NCCL_SHM_DISABLE
                value: "1"
              - name: FI_PROVIDER
                value: "efa"
              - name: FI_EFA_USE_DEVICE_RDMA
                value: "1"
              - name: FI_EFA_FORK_SAFE
                value: "1"
              - name: HF_HOME
                value: "/models"
            command: ["/bin/bash"]
            args:
              - "-c"
              - |
                set -ex
                python3 -m sglang.launch_server \
                  --model-path /models/${MODEL_NAME} \
                  --host 0.0.0.0 \
                  --port 30000 \
                  --tp 16 \
                  --nnodes 2 \
                  --node-rank 1 \
                  --dist-init-addr $(LWS_LEADER_ADDRESS):20000 \
                  --trust-remote-code \
                  --moe-runner-backend marlin \
                  --mem-fraction-static 0.88
            resources:
              limits:
                nvidia.com/gpu: "8"
                cpu: "96"
                memory: "768Gi"
                vpc.amazonaws.com/efa: 4
              requests:
                nvidia.com/gpu: "8"
                cpu: "96"
                memory: "768Gi"
                vpc.amazonaws.com/efa: 4
            volumeMounts:
              - name: model-volume
                mountPath: /models
              - name: dshm
                mountPath: /dev/shm
        volumes:
          - name: model-volume
            persistentVolumeClaim:
              claimName: fsx-lustre-pvc
          - name: dshm
            emptyDir:
              medium: Memory
              sizeLimit: "64Gi"
        nodeSelector:
          nodepool-type: gpu-h100
        tolerations:
          - key: "nvidia.com/gpu"
            operator: "Exists"
            effect: "NoSchedule"
          - key: "aws.amazon.com/efa"
            operator: "Exists"
            effect: "NoSchedule"
---
apiVersion: v1
kind: Service
metadata:
  name: sglang-deepseek-v4-pro-leader
  labels:
    app: sglang-benchmark
spec:
  ports:
    - name: sglang
      port: 30000
      targetPort: 30000
    - name: dist-init
      port: 20000
      targetPort: 20000
  type: ClusterIP
  selector:
    leaderworkerset.sigs.k8s.io/name: sglang-deepseek-v4-pro
    role: leader
