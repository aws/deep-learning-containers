[project]
name = "xgboost-sagemaker-dlc"
version = "3.0.5"
requires-python = ">=3.10,<3.11"
dependencies = [
    # XGBoost core (already in base, listed for completeness of the resolver)
    "xgboost==3.0.5",
    "numpy==2.1.0",
    "pyarrow==22.0.0",
    "pandas==2.2.3",

    # SageMaker serving stack
    "Flask==1.1.1",
    "gunicorn==23.0.0",
    "itsdangerous==2.0.1",
    "jinja2==2.11.3",
    "MarkupSafe==1.1.1",
    "Werkzeug==0.15.6",
    "multi-model-server==1.1.2",
    "sagemaker-containers==2.8.6.post2",
    "sagemaker-inference==1.5.5",

    # AWS SDK
    "boto3==1.17.52",
    "botocore==1.20.52",

    # ML / data libraries
    "dask[dataframe]==2024.11.2",
    "dask-cuda==24.12.00",
    "cuda-python==12.6.0",
    "matplotlib==3.9.2",
    "numba==0.61.0",
    "Pillow==9.1.1",
    "scikit-learn==1.5.2",
    "scipy==1.15.0",

    # Utilities
    "cryptography==45.0.5",
    "gevent==23.9.1",
    "psutil==5.8.0",
    "pynvml==11.4.1",
    "python-dateutil==2.8.2",
    "PyYAML==6.0.1",
    "requests==2.32.3",
    "retrying==1.3.3",
    "urllib3==1.26.5",
    "certifi==2023.7.22",
    "wheel==0.45.1",
    "setuptools<81",

    # Patches
    "protobuf>=3.20.0,<=3.20.3",
    "fonttools>=4.60.2",

    # Debugger (installed separately — setup.py requires git-secrets)
    # "sagemaker-debugger @ git+https://github.com/awslabs/sagemaker-debugger.git@v1.0.32",
]
