    - name: "qwen3.5-9b"
      s3_model: "qwen3.5-9b.tar.gz"
      fleet: "x86-g6xl-runner"
      extra_args: "--tensor-parallel-size 1 --max-model-len 4096  --enforce-eager"
      input_len: 512
      output_len: 128
      num_prompts: 64
      batch_size: 4
      min_throughput: 20
      min_rps: 0.15

    # https://github.com/vllm-project/vllm/issues/32637
    # transformer version doesn't support this model
