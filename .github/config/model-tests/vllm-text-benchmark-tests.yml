      input_len: 512
      output_len: 256
      num_prompts: 32
      batch_size: 2
      min_throughput: 93
      min_rps: 0.25


    - name: "qwen3-32b"
      s3_model: "qwen3-32b.tar.gz"
      extra_args: "--tensor-parallel-size 4 --max-model-len 4096 --gpu-memory-utilization 0.85"
      input_len: 512
      output_len: 256
      num_prompts: 32
      batch_size: 2
