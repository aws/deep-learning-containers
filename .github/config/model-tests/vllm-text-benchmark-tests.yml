# vLLM Text Benchmark Configuration — text-generation throughput models.
# Consumed by .github/workflows/dispatch-vllm-text-benchmark.yml.
# Workflow parser constructs s3_path from s3_prefix + s3_model.

s3_prefix: "s3://dlc-cicd-models/llm-models"
test_fixtures_prefix: "s3://dlc-cicd-models/test-fixtures"

benchmark:
  codebuild-fleet:
    - name: "qwen3-embedding-0.6b"
      s3_model: "qwen3-embedding-0.6b.tar.gz"
      fleet: "x86-g6xl-runner"
      extra_args: "--dtype bfloat16 --max-model-len 8192"
      test_script: "vllm_embedding_benchmark_test.sh"
      min_rps: 5

    - name: "qwen3-reranker-4b"
      s3_model: "qwen3-reranker-4b.tar.gz"
      fleet: "x86-g6xl-runner"
      extra_args: "--dtype bfloat16 --max-model-len 10000 --gpu-memory-utilization 0.85"
      test_script: "vllm_reranker_benchmark_test.sh"
      min_rps: 20

    - name: "gpt-oss-20b"
      s3_model: "gpt-oss-20b.tar.gz"
      fleet: "x86-g6exl-runner"
      extra_args: "--tensor-parallel-size 1 --max-model-len 4096 --dtype bfloat16"
      input_len: 512
      output_len: 128
      num_prompts: 64
      batch_size: 4
      min_throughput: 1200
      min_rps: 5

    # JetBrains Mellum2 reasoning MoE (12B total / 2.5B active, bf16 ~23GB).
    # MellumForCausalLM support added upstream in vLLM 0.23.0 (PR #43992).
    # Fits a single L40S (g6e.xl, 48GB) at tp=1; qwen3 reasoning parser emits <think> blocks.
    # Provisional floors — tighten to ~50% of observed throughput after the first run.
    - name: "mellum2-12b-a2.5b-thinking"
      s3_model: "mellum2-12b-a2.5b-thinking.tar.gz"
      fleet: "x86-g6exl-runner"
      extra_args: "--tensor-parallel-size 1 --max-model-len 4096 --dtype bfloat16 --reasoning-parser qwen3"
      input_len: 512
      output_len: 128
      num_prompts: 64
      batch_size: 4
      min_throughput: 100
      min_rps: 1

    - name: "gemma-4-e4b-it"
      s3_model: "gemma-4-e4b-it.tar.gz"
      fleet: "x86-g6exl-runner"
      extra_args: "--tensor-parallel-size 1 --max-model-len 4096 --dtype bfloat16"
      input_len: 512
      output_len: 128
      num_prompts: 64
      batch_size: 4
      min_throughput: 680
      min_rps: 5.3

    - name: "gemma-4-e2b-it"
      s3_model: "gemma-4-e2b-it.tar.gz"
      fleet: "x86-g6xl-runner"
      extra_args: "--tensor-parallel-size 1 --max-model-len 4096 --dtype bfloat16"
      input_len: 512
      output_len: 128
      num_prompts: 64
      batch_size: 4
      min_throughput: 470
      min_rps: 3.7

    # Pending p5e.48xlarge fleet creation. Fleet name "x86-p5e-runner" is a placeholder.
    # - name: "minimax-m2.7"
