  runner-scale-sets:
    # tp=4 models on 4x L40S (same hardware as the old x86-g6e12xl CodeBuild
    # fleet, which had only 1 instance and serialized these for hours).
    # gpu-l40s-4gpu-runners scales to 4 instances, so thresholds are unchanged.
    - name: "gemma-4-26b-a4b-it"
      s3_model: "gemma-4-26b-a4b-it.tar.gz"
      runner_label: "gpu-l40s-4gpu-runners"
      extra_args: "--tensor-parallel-size 4 --max-model-len 4096 --dtype bfloat16"
      input_len: 512
      output_len: 128
      num_prompts: 64
      batch_size: 4
      min_throughput: 300
      min_rps: 2.4

    - name: "gemma-4-31b-it"
      s3_model: "gemma-4-31b-it.tar.gz"
      runner_label: "gpu-l40s-4gpu-runners"
      extra_args: "--tensor-parallel-size 4 --max-model-len 4096 --dtype bfloat16"
      input_len: 512
      output_len: 128
      num_prompts: 64
