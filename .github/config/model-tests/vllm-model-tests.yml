# vLLM Model Test Configuration
# Single config for all model-based test suites.
#
# smoke-test:  model serving + inference validation
# benchmark:   throughput and latency with pass/fail thresholds
#
# Each section has codebuild-fleet and runner-scale-sets sub-keys.
# Workflow parsers construct s3_path from s3_prefix + s3_model.

s3_prefix: "s3://dlc-cicd-models/llm-models"
test_fixtures_prefix: "s3://dlc-cicd-models/test-fixtures"

smoke-test:
  codebuild-fleet:
    - name: "qwen3.5-0.8b"
      s3_model: "qwen3.5-0.8b.tar.gz"
      fleet: "x86-g6xl-runner"
      extra_args: "--tensor-parallel-size 1 --max-model-len 4096 --dtype bfloat16"

    - name: "qwen3-embedding-0.6b"
      s3_model: "qwen3-embedding-0.6b.tar.gz"
      fleet: "x86-g6xl-runner"
      extra_args: "--dtype bfloat16 --max-model-len 8192"
      test_script: "vllm_embedding_smoke_test.sh"

    - name: "qwen3-vl-embedding-2b"
      s3_model: "qwen3-vl-embedding-2b.tar.gz"
      fleet: "x86-g6xl-runner"
      extra_args: "--runner pooling --dtype bfloat16 --max-model-len 8192 --trust-remote-code"
      test_script: "vllm_embedding_smoke_test.sh"

    - name: "voxtral-mini-4b"
      s3_model: "voxtral-mini-4b.tar.gz"
      fleet: "x86-g6xl-runner"
      extra_args: "--tokenizer-mode mistral --config-format mistral --load-format mistral --max-model-len 8192 --enforce-eager"
      test_script: "vllm_asr_smoke_test.sh"
      test_fixtures:
        - "audio/asr_en.wav"
      test_cases:
        - name: "transcription-en"
          route: "/v1/audio/transcriptions"
          audio_fixture: "asr_en.wav"
          validate: "json_field:text"

  runner-scale-sets: []

benchmark:
  codebuild-fleet:
    - name: "qwen3-embedding-0.6b"
      s3_model: "qwen3-embedding-0.6b.tar.gz"
      fleet: "x86-g6xl-runner"
      extra_args: "--dtype bfloat16 --max-model-len 8192"
      test_script: "vllm_embedding_benchmark_test.sh"
      min_rps: 5

    - name: "qwen3-vl-embedding-2b"
      s3_model: "qwen3-vl-embedding-2b.tar.gz"
      fleet: "x86-g6xl-runner"
      extra_args: "--runner pooling --dtype bfloat16 --max-model-len 8192 --trust-remote-code"
      test_script: "vllm_embedding_benchmark_test.sh"
      min_rps: 3

    - name: "qwen3-asr-1.7b"
      s3_model: "qwen3-asr-1.7b.tar.gz"
      fleet: "x86-g6e12xl-runner"
      extra_args: "--tensor-parallel-size 1 --max-model-len 4096 --dtype bfloat16"
      test_script: "vllm_asr_benchmark_test.sh"
      test_fixtures:
        - "audio/asr_en.wav"
        - "audio/asr_zh.wav"
      benchmark_audio_fixture: "asr_en.wav"
      min_throughput: 30
      min_rps: 1
      benchmark_profiles: "baseline,high_concurrency,sustained_load,burst"

    - name: "voxtral-mini-4b"
      s3_model: "voxtral-mini-4b.tar.gz"
      fleet: "x86-g6xl-runner"
      extra_args: "--tokenizer-mode mistral --config-format mistral --load-format mistral --max-model-len 8192 --enforce-eager"
      test_script: "vllm_asr_benchmark_test.sh"
      test_fixtures:
        - "audio/asr_en.wav"
      benchmark_audio_fixture: "asr_en.wav"
      min_throughput: 1
      min_rps: 0.25
      benchmark_profiles: "baseline,high_concurrency"

    - name: "gpt-oss-20b"
      s3_model: "gpt-oss-20b.tar.gz"
      fleet: "x86-g6exl-runner"
      extra_args: "--tensor-parallel-size 1 --max-model-len 4096 --dtype bfloat16"
      input_len: 512
      output_len: 128
      num_prompts: 64
      batch_size: 4
      min_throughput: 1200
      min_rps: 5

    - name: "gemma-4-26b-a4b-it"
      s3_model: "gemma-4-26b-a4b-it.tar.gz"
      fleet: "x86-g6e12xl-runner"
      extra_args: "--tensor-parallel-size 4 --max-model-len 4096 --dtype bfloat16"
      input_len: 512
      output_len: 128
      num_prompts: 64
      batch_size: 4
      min_throughput: 300
      min_rps: 2.4

    - name: "gemma-4-31b-it"
      s3_model: "gemma-4-31b-it.tar.gz"
      fleet: "x86-g6e12xl-runner"
      extra_args: "--tensor-parallel-size 4 --max-model-len 4096 --dtype bfloat16"
      input_len: 512
      output_len: 128
      num_prompts: 64
      batch_size: 4
      min_throughput: 150
      min_rps: 1.2

    - name: "gemma-4-e4b-it"
      s3_model: "gemma-4-e4b-it.tar.gz"
      fleet: "x86-g6exl-runner"
      extra_args: "--tensor-parallel-size 1 --max-model-len 4096 --dtype bfloat16"
      input_len: 512
      output_len: 128
      num_prompts: 64
      batch_size: 4
      min_throughput: 680
      min_rps: 5.3

    - name: "qwen3.5-9b"
      s3_model: "qwen3.5-9b.tar.gz"
      fleet: "x86-g6xl-runner"
      extra_args: "--tensor-parallel-size 1 --max-model-len 4096  --enforce-eager"
      input_len: 512
      output_len: 128
      num_prompts: 64
      batch_size: 4
      min_throughput: 20
      min_rps: 0.15

    - name: "llama-3.3-70b"
      s3_model: "llama-3.3-70b.tar.gz"
      fleet: "x86-g6e12xl-runner"
      extra_args: "--tensor-parallel-size 4 --max-model-len 4096"
      input_len: 512
      output_len: 128
      num_prompts: 32
      batch_size: 2
      min_throughput: 80
      min_rps: 0.35

    # https://github.com/vllm-project/vllm/issues/32637
    # transformer version doesn't support this model
    # https://github.com/vllm-project/vllm/issues/34098
    # - name: "glm-4.7-flash"
    #   s3_model: "glm-4.7-flash.tar.gz"
    #   fleet: "x86-g6xl-runner"
    #   extra_args: "--tensor-parallel-size 1 --max-model-len 4096 --dtype bfloat16"
    #   input_len: 512
    #   output_len: 128
    #   num_prompts: 64
    #   batch_size: 4
    #   min_throughput: 20
    #   min_rps: 1

    - name: "qwen3.5-35b-a3b-fp8"
      s3_model: "qwen3.5-35b-a3b-fp8.tar.gz"
      fleet: "x86-g6e12xl-runner"
      # https://github.com/vllm-project/vllm/issues/35743 open bug for capturing CUDA graph fails
      # workaround with --enforce-eager tp=1 fail while tp=4 success
      extra_args: "--tensor-parallel-size 4 --max-model-len 4096"
      input_len: 512
      output_len: 128
      num_prompts: 64
      batch_size: 4
      min_throughput: 80
      min_rps: 0.35

# A100 is compute capability 8.0 — FP8 requires 8.9+ (H100/L40S).
# The Marlin fallback uses significantly more memory.
    - name: "qwen3.5-27b-fp8"
      s3_model: "qwen3.5-27b-fp8.tar.gz"
      fleet: "x86-g6e12xl-runner"
      extra_args: "--tensor-parallel-size 4 --max-model-len 4096"
      input_len: 512
      output_len: 128
      num_prompts: 64
      batch_size: 4
      min_throughput: 20
      min_rps: 0.2

    - name: "qwen3-coder-next-fp8"
      s3_model: "qwen3-coder-next-fp8.tar.gz"
      fleet: "x86-g6e12xl-runner"
      extra_args: "--tensor-parallel-size 4 --max-model-len 4096"
      input_len: 512
      output_len: 256
      num_prompts: 32
      batch_size: 2
      min_throughput: 93
      min_rps: 0.25

  runner-scale-sets:
    - name: "qwen3-32b"
      s3_model: "qwen3-32b.tar.gz"
      extra_args: "--tensor-parallel-size 4 --max-model-len 4096 --gpu-memory-utilization 0.85"
      input_len: 512
      output_len: 256
      num_prompts: 32
      batch_size: 2
      min_throughput: 1133
      min_rps: 3

    - name: "qwen3.5-35b-a3b-fp8"
      s3_model: "qwen3.5-35b-a3b-fp8.tar.gz"
      # https://github.com/vllm-project/vllm/issues/35743 open bug for capturing CUDA graph fails
      # workaround with --enforce-eager tp=1 fail while tp=4 success
      extra_args: "--tensor-parallel-size 4 --max-model-len 4096"
      input_len: 512
      output_len: 128
      num_prompts: 64
      batch_size: 4
      min_throughput: 80
      min_rps: 0.35

    - name: "qwen3.5-27b-fp8"
      s3_model: "qwen3.5-27b-fp8.tar.gz"
      # A100 lacks native FP8 — vLLM dequantizes to BF16 at load, doubling weight memory
      extra_args: "--tensor-parallel-size 4 --max-model-len 4096 --enforce-eager"
      input_len: 512
      output_len: 128
      num_prompts: 64
      batch_size: 4
      min_throughput: 20
      min_rps: 0.2

    - name: "qwen3-coder-next-fp8"
      s3_model: "qwen3-coder-next-fp8.tar.gz"
      extra_args: "--tensor-parallel-size 4 --max-model-len 4096"
      input_len: 512
      output_len: 256
      num_prompts: 32
      batch_size: 2
      min_throughput: 93
      min_rps: 0.25

    - name: "llama-3.3-70b"
      s3_model: "llama-3.3-70b.tar.gz"
      extra_args: "--tensor-parallel-size 4 --max-model-len 4096"
      input_len: 512
      output_len: 128
      num_prompts: 32
      batch_size: 2
      min_throughput: 80
      min_rps: 0.35

    # --- Qwen 3.5/3.6 new models (thresholds at ~50% of observed) ---
    - name: "qwen3.5-2b"
      s3_model: "qwen3.5-2b.tar.gz"
      runner_label: "gpu-l4-1gpu-runners"
      extra_args: "--tensor-parallel-size 1 --max-model-len 4096 --dtype bfloat16 --gpu-memory-utilization 0.6"
      input_len: 512
      output_len: 128
      num_prompts: 64
      batch_size: 4
      min_throughput: 5256
      min_rps: 8.2

    - name: "qwen3.6-27b"
      s3_model: "qwen3.6-27b.tar.gz"
      runner_label: "gpu-l40s-4gpu-runners"
      extra_args: "--tensor-parallel-size 4 --max-model-len 4096 --dtype bfloat16 --gpu-memory-utilization 0.8"
      input_len: 512
      output_len: 128
      num_prompts: 64
      batch_size: 4
      min_throughput: 2195
      min_rps: 3.4

    - name: "qwen3.6-35b-a3b"
      s3_model: "qwen3.6-35b-a3b.tar.gz"
      runner_label: "gpu-l40s-4gpu-runners"
      extra_args: "--tensor-parallel-size 4 --max-model-len 4096 --dtype bfloat16 --gpu-memory-utilization 0.8"
      input_len: 512
      output_len: 128
      num_prompts: 64
      batch_size: 4
      min_throughput: 2654
      min_rps: 4.1

    - name: "qwen3.5-0.8b"
      s3_model: "qwen3.5-0.8b.tar.gz"
      runner_label: "gpu-l4-1gpu-runners"
      extra_args: "--tensor-parallel-size 1 --max-model-len 4096 --dtype bfloat16 --gpu-memory-utilization 0.6"
      input_len: 512
      output_len: 128
      num_prompts: 64
      batch_size: 4
      min_throughput: 5966
      min_rps: 9.3

