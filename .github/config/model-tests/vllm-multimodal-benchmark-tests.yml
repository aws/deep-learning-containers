# vLLM Multimodal Benchmark Configuration — audio / vision-language models.
# Consumed by .github/workflows/dispatch-vllm-multimodal-benchmark.yml.
# Workflow parser constructs s3_path from s3_prefix + s3_model.

s3_prefix: "s3://dlc-cicd-models/llm-models"
test_fixtures_prefix: "s3://dlc-cicd-models/test-fixtures"

benchmark:
  codebuild-fleet:
    - name: "qwen3-asr-1.7b"
      s3_model: "qwen3-asr-1.7b.tar.gz"
      fleet: "x86-g6e12xl-runner"
      extra_args: "--tensor-parallel-size 1 --max-model-len 4096 --dtype bfloat16"
      test_script: "vllm_asr_benchmark_test.sh"
      test_fixtures:
        - "audio/asr_en.wav"
        - "audio/asr_zh.wav"
      benchmark_audio_fixture: "asr_en.wav"
      min_throughput: 30
      min_rps: 1
      benchmark_profiles: "baseline,high_concurrency,sustained_load,burst"

  runner-scale-sets:
    - name: "qwen3-vl-embedding-2b"
      s3_model: "qwen3-vl-embedding-2b.tar.gz"
      runner_label: "gpu-l40s-1gpu-runners"
      extra_args: "--runner pooling --dtype bfloat16 --max-model-len 2048 --trust-remote-code"
      test_script: "vllm_embedding_benchmark_test.sh"
      min_rps: 3

    - name: "lighton-ocr-2-1b"
      s3_model: "lighton-ocr-2-1b.tar.gz"
      runner_label: "gpu-l40s-1gpu-runners"
      extra_args: "--dtype bfloat16 --max-model-len 16384"
      min_throughput: 30
      min_rps: 1
      benchmark_profiles: "baseline,high_concurrency"

    # Realtime model — benchmark via /v1/audio/transcriptions; it does not
    # support chat audio_url (empty MM embeddings crash the engine).
    - name: "voxtral-mini-4b"
      s3_model: "voxtral-mini-4b.tar.gz"
      runner_label: "gpu-l40s-1gpu-runners"
      extra_args: "--tokenizer-mode mistral --config-format mistral --load-format mistral --max-model-len 8192 --enforce-eager"
      test_script: "vllm_asr_benchmark_test.sh"
      benchmark_route: "/v1/audio/transcriptions"
      test_fixtures:
        - "audio/asr_en.wav"
      benchmark_audio_fixture: "asr_en.wav"
      min_throughput: 1
      min_rps: 0.25
      benchmark_profiles: "baseline,high_concurrency"
