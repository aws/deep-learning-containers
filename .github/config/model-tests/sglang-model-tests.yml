# SGLang Model Test Configuration
# Single config for all model-based test suites.
#
# smoke-test:  model serving + inference validation
# benchmark:   throughput and latency with pass/fail thresholds
#
# Each section has codebuild-fleet and runner-scale-sets sub-keys.
# Workflow parsers construct s3_path from s3_prefix + s3_model.
#
# codebuild-fleet runners:
#   x86-g6xl-runner    = g6.xlarge    (1x L4 24GB)
#   x86-g6exl-runner   = g6e.xlarge   (1x L40S 48GB)
#   x86-g6e12xl-runner = g6e.12xlarge (4x L40S 192GB)
#   x86-g612xl-runner  = g6.12xlarge  (4x L4 96GB)
#   x86-g512xl-runner  = g5.12xlarge  (4x A10G 96GB)
#
# runner-scale-sets (self-hosted):
#   gpu-l4-1gpu-runners    = 1x L4 24GB VRAM
#   gpu-l4-2gpu-runners    = 2x L4 48GB VRAM
#   gpu-l4-4gpu-runners    = 4x L4 96GB VRAM
#   gpu-l40s-1gpu-runners  = 1x L40S 48GB VRAM
#   gpu-l40s-2gpu-runners  = 2x L40S 96GB VRAM
#   gpu-l40s-4gpu-runners  = 4x L40S 192GB VRAM
#   gpu-h100-8gpu-runners  = 8x H100 640GB VRAM
#   gpu-efa-runners        = 4x A100/H100 160-320GB VRAM (4 GPU per pod limit)
#   gpu-p4d-runners        = 4x A100 160GB VRAM (reserved)

s3_prefix: "s3://dlc-cicd-models/llm-models"

