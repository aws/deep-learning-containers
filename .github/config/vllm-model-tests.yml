# vLLM Model Test Configuration
# Single config for all model-based test suites.
#
# smoke-test:  model serving + inference validation
# benchmark:   throughput and latency with pass/fail thresholds
#
# Each section has codebuild-fleet and runner-scale-sets sub-keys.

smoke-test:
  codebuild-fleet:
    - name: "qwen3.5-9b"
      s3_path: "s3://dlc-cicd-models/llm-models/gpt-oss-20b.tar.gz"
      fleet: "x86-g6xl-runner"
      extra_args: "--tensor-parallel-size 1 --max-model-len 4096 --dtype bfloat16"

  runner-scale-sets: []

benchmark:
  codebuild-fleet:
    - name: "gpt-oss-20b"
      s3_path: "s3://dlc-cicd-models/llm-models/gpt-oss-20b.tar.gz"
      fleet: "x86-g6exl-runner"
      extra_args: "--tensor-parallel-size 1 --max-model-len 4096 --dtype bfloat16"
      input_len: 512
      output_len: 128
      num_prompts: 64
      batch_size: 4
      min_throughput: 100
      min_rps: 1

    - name: "llama-3.3-70b"
      s3_path: "s3://dlc-cicd-models/llm-models/llama-3.3-70b.tar.gz"
      fleet: "x86-g6e12xl-runner"
      extra_args: "--tensor-parallel-size 4 --max-model-len 4096"
      input_len: 512
      output_len: 128
      num_prompts: 32
      batch_size: 2
      min_throughput: 200
      min_rps: 0.70

  runner-scale-sets:
    - name: "qwen3-32b"
      s3_path: "s3://dlc-cicd-models/llm-models/qwen3-32b.tar.gz"
      extra_args: "--tensor-parallel-size 4 --max-model-len 4096 --gpu-memory-utilization 0.85"
      input_len: 512
      output_len: 256
      num_prompts: 32
      batch_size: 2
      min_throughput: 150
      min_rps: 1

