# vLLM EC2 Image Configuration
# This file contains all configuration for building, testing, and releasing the vLLM EC2 image

# Image identification
image:
  name: "vllm-ec2"
  description: "vLLM for EC2 instances"

# Build configuration
common:
  framework: "vllm"
  framework_version: "0.16.0"
  job_type: "general"
  python_version: "py312"
  cuda_version: "cu129"
  os_version: "ubuntu22.04"
  customer_type: "ec2"
  arch_type: "x86"
  prod_image: "vllm:0.16-gpu-py312-ec2"
  device_type: "gpu"
  contributor: "None"

# Release configuration
release:
  release: true
  force_release: false
  public_registry: true
  private_registry: true
  enable_soci: true
  environment: gamma  # gamma or production
