# SGLang AML2023 SageMaker Image Configuration
# This file contains all configuration for building, testing, and releasing the SGLang AML2023 SageMaker image

# Image identification
image:
  name: "sglang-amzn2023-sagemaker"
  description: "SGLang for SageMaker (Amazon Linux 2023)"

# Build configuration
common:
  framework: "sglang"
  framework_version: "0.5.9"
  job_type: "general"
  python_version: "py312"
  cuda_version: "cu129"
  os_version: "amzn2023"
  customer_type: "sagemaker"
  arch_type: "x86"
  prod_image: "sglang:0.5-gpu-py312-amzn2023"
  device_type: "gpu"
  contributor: "None"

# Release configuration
release:
  release: true
  force_release: false
  public_registry: true
  private_registry: true
  enable_soci: true
  environment: production  # gamma or production
