# SGLang Model Smoke Test Configuration
# Shared across all SGLang PR workflows
#
# codebuild-fleet: Runs on CodeBuild fleet runners (single GPU instances)
# runner-scale-sets: Runs on self-hosted runner scale sets (multi-GPU instances)
#
# extra_args: passed directly to sglang.launch_server (includes --tp)

codebuild-fleet:
  - name: "gpt-oss-20b"
    s3_path: "s3://dlc-cicd-models/sglang_models/gpt-oss-20b.tar.gz"
    fleet: "x86-g6exl-runner"
    extra_args: "--tp 1 --context-length 4096 --dtype bfloat16 --trust-remote-code"

  - name: "llama-3.3-70b"
    s3_path: "s3://dlc-cicd-models/sglang_models/llama-3.3-70b.tar.gz"
    fleet: "x86-g6e12xl-runner"
    extra_args: "--tp 4 --context-length 4096"

runner-scale-sets:
  - name: "qwen3-32b"
    s3_path: "s3://dlc-cicd-models/sglang_models/qwen3-32b.tar.gz"
    extra_args: "--tp 4 --context-length 8192 --trust-remote-code"
