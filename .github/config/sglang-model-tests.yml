  runner-scale-sets:
    - name: "qwen3-32b"
      s3_model: "qwen3-32b.tar.gz"
      extra_args: "--tp 4 --context-length 4096 --mem-fraction-static 0.85"
      input_len: 512
      output_len: 256
      num_prompts: 32
      batch_size: 2
      min_throughput: 3400
      min_rps: 3

    - name: "llama-3.3-70b"
      s3_model: "llama-3.3-70b.tar.gz"
      extra_args: "--tp 4 --context-length 4096"
      input_len: 512
      output_len: 128
      num_prompts: 32
      batch_size: 2
      min_throughput: 400
      min_rps: 0.35

    - name: "qwen3-coder-next-fp8"
