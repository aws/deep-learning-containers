# llama.cpp EC2 Image Configuration
# This file contains all configuration for building, testing, and releasing the llama.cpp EC2 image

# Image identification
image:
  name: "llamacpp-ec2"
  description: "llama.cpp for EC2 instances (AL2023, built from source)"

# Build configuration
common:
  framework: "llamacpp"
  framework_version: "b5460"
  job_type: "general"
  python_version: "py312"
  cuda_version: "cu129"
  os_version: "amzn2023"
  customer_type: "ec2"
  arch_type: "x86"
  prod_image: "llamacpp:b5460-gpu-py312-ec2"
  device_type: "gpu"
  contributor: "None"

# Release configuration
release:
  release: false
  force_release: false
  public_registry: false
  private_registry: true
  enable_soci: true
  environment: gamma
