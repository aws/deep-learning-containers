# llama.cpp SageMaker Image Configuration
# This file contains all configuration for building, testing, and releasing the llama.cpp SageMaker image

# Image identification
image:
  name: "llamacpp-sagemaker"
  description: "llama.cpp for SageMaker on Amazon Linux 2023"

# Build configuration
common:
  framework: "llamacpp"
  framework_version: "b5460"
  job_type: "general"
  python_version: "py312"
  cuda_version: "cu129"
  os_version: "amzn2023"
  customer_type: "sagemaker"
  arch_type: "x86"
  prod_image: "llamacpp:b5460-gpu-py312-amzn2023-sagemaker"
  device_type: "gpu"
  contributor: "None"

# Release configuration
release:
  release: false
  force_release: false
  public_registry: false
  private_registry: true
  enable_soci: true
  environment: production
