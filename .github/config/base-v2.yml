# Base cu130 amzn2023 Image Configuration
# This file contains all configuration for building, testing, and releasing the base GPU image

# Image identification
image:
  name: "base-v2"
  description: "Base GPU image with CUDA 13.0 and Python on amzn2023 (runtime and devel variants)"

# Build configuration
common:
  framework: "base"
  framework_version: "13.0.2"
  job_type: "general"
  python_version: "py313"
  cuda_version: "cu130"
  os_version: "amzn2023"
  customer_type: "ec2"
  arch_type: "x86"
  prod_image: "base:13.0-gpu-py313-amzn2023"
  device_type: "gpu"
  contributor: "None"

# Release configuration
release:
  release: true
  force_release: false
  public_registry: true
  private_registry: true
  enable_soci: true
  environment: gamma # gamma or production
