# Ray SageMaker GPU Image Configuration
# This file contains all configuration for building, testing, and releasing the Ray SageMaker GPU image

# Image identification
image:
  name: "ray-sagemaker-gpu"
  description: "Ray for SageMaker (GPU)"

# Build configuration
common:
  framework: "ray"
  framework_version: "2.54.1"
  job_type: "inference"
  python_version: "py313"
  cuda_version: "cu129"
  os_version: "amzn2023"
  customer_type: "sagemaker"
  arch_type: "x86"
  container_type: "serve-ml"
  build_target: "ray-sagemaker-gpu"
  ci_tag: "ray-gpu-sagemaker"
  dockerfile: "docker/ray/Dockerfile.gpu"
  base_image: "unused-ray-gpu-multistage"
  platform: "sagemaker"
  prod_image: "ray:2.54-gpu-py313"
  device_type: "gpu"
  contributor: "None"

# Release configuration
release:
  release: true
  force_release: false
  public_registry: true
  private_registry: true
  enable_soci: true
  environment: production
