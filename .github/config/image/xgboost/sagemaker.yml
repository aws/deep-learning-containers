image:
  name: "sagemaker-xgboost"
  description: "SageMaker XGBoost 3.2"

metadata:
  framework: "xgboost"
  framework_version: "3.2.0"
  os_version: "amzn2023"
  customer_type: "sagemaker"
  platform: "sagemaker"
  arch_type: "x86"
  device_type: "cpu"
  job_type: "general"

build:
  dockerfile: "docker/xgboost/Dockerfile"
  target: "xgboost-sagemaker"
  base_image: "nvidia/cuda:12.9.1-base-amzn2023"
  python_version: "3.12"
  dlc_major_version: "1"
  dlc_minor_version: "0"

release:
  release: false
  prod_image: "sagemaker-xgboost:3.2-0-cpu-py3"
  force_release: false
  public_registry: false
  private_registry: true
  enable_soci: false
  environment: "gamma"
