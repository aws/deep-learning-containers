image:
  name: "huggingface-vllm-sagemaker"
  description: "Hugging Face vLLM for SageMaker (layered on the AWS vLLM DLC)"

metadata:
  framework: "huggingface-vllm"
  framework_version: "0.22.1"
  os_version: "ubuntu22.04"
  customer_type: "sagemaker"
  platform: "sagemaker"
  arch_type: "x86"
  device_type: "gpu"
  job_type: "general"
  contributor: "huggingface"
  prod_image: "huggingface-vllm:server-sagemaker-cuda-v1"

build:
  dockerfile: "docker/huggingface/vllm/Dockerfile"
  target: "huggingface-vllm-sagemaker"
  base_image: "public.ecr.aws/deep-learning-containers/vllm:0.22.1-gpu-py312-cu130-ubuntu22.04-sagemaker-v1.0"
  python_version: "3.12"
  cuda_version: "13.0.2"
  transformers_version: "5.10.2"
  huggingface_hub_version: "1.17.0"
  hf_xet_version: "1.5.0"
  ffmpeg_tag: "n8.1"
  dlc_major_version: "1"
  dlc_minor_version: "0"

release:
  release: true
  force_release: false
  public_registry: false
  private_registry: true
  enable_soci: false
  environment: "production"
