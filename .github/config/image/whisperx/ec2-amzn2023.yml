image:
  name: "whisperx-ec2-amzn2023"
  description: "WhisperX ASR (VAD + faster-whisper transcription + wav2vec2 alignment + pyannote diarization) for EC2 instances (AL2023, GPU)"

metadata:
  framework: "whisperx"
  framework_version: "3.8.6"
  os_version: "amzn2023"
  customer_type: "ec2"
  arch_type: "x86"
  device_type: "gpu"
  job_type: "inference"
  prod_image: "whisperx:3.8.6-ec2-gpu-cuda-amzn2023"

build:
  dockerfile: "docker/whisperx/Dockerfile.amzn2023"
  target: "whisperx-ec2-amzn2023"
  python_version: "3.12"
  cuda_version: "12.8.2"
  # Python dependency pins live in docker/whisperx/{pyproject.toml,uv.lock},
  # installed via `uv sync --frozen`. framework_version (metadata) tracks the
  # WhisperX release; bump it there and in pyproject.toml together.
  dlc_major_version: "1"
  dlc_minor_version: "0"

release:
  release: false
  force_release: false
  public_registry: false
  private_registry: false
  enable_soci: false
  environment: "production"
