# Lambda Base CUDA Preview Image Configuration
# This file contains all configuration for building, testing, and releasing the Lambda base preview image

# Image identification
image:
  name: "lambda-base-preview"
  description: "Lambda base GPU image with CUDA, Python, and thread-mode RIC preview"

# Build configuration
common:
  framework: "lambda"
  framework_version: "12.9.1"
  job_type: "general"
  python_version: "py313"
  cuda_version: "cu129"
  os_version: "amzn2023"
  arch_type: "x86"
  container_type: "base-cuda-preview"
  build_target: "base-preview-py3"
  ci_tag: "gpu-base-preview-py3"

# Release configuration
release:
  release: true
  force_release: false
  public_registry: false
  private_registry: true
  enable_soci: false
  environment: gamma
