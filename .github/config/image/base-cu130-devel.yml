# Base cu130 devel (CUDA 13.0.2, amzn2023) Image Configuration
# This file contains all configuration for building, testing, and releasing the base-cu130 devel image

# Image identification
image:
  name: "base-cu130-devel"
  description: "Base cu130 devel GPU image with CUDA 13.0.2, Python, and build tools on amzn2023"

# Build configuration
common:
  framework: "base_dlc"
  framework_version: "13.0.2"
  job_type: "general"
  python_version: "py313"
  cuda_version: "cu130"
  os_version: "amzn2023"
  customer_type: "ec2"
  arch_type: "x86"
  container_type: "devel"
  build_target: "devel"
  ci_tag: "cuda130-devel-amzn2023"
  device_type: "gpu"
  contributor: "None"
  prod_image: "base:devel-cu130-amzn2023"

# Build pins passed to the Dockerfile as --build-args (UPPER_CASE keys)
build:
  python_version: "3.13.12"
  uv_version: "0.11.17"

# Release configuration
release:
  release: true
  force_release: false
  public_registry: true
  private_registry: true
  enable_soci: true
  environment: production # gamma or production
