# SGLang SageMaker AL2023 Image Configuration
# Single source of truth for image identity, build pins, and release settings.
# Workflow extracts both image tags and --build-args from this file.
image:
  name: "sglang-sagemaker-amzn2023"
  description: "SGLang for SageMaker on Amazon Linux 2023"
common:
  framework: "sglang_server"
  framework_version: "0.5.12+dlc1"
  job_type: "general"
  python_version: "py312"
  cuda_version: "cu130"
  os_version: "amzn2023"
  customer_type: "sagemaker"
  platform: "sagemaker"
  arch_type: "x86"
  prod_image: "sglang:server-sagemaker-cuda-v1"
  device_type: "gpu"
  contributor: "None"
build:
  sglang_ref: "d9d719b270729eaf93a923677c2fef06b9f5fded"
  sglang_kernel_version: "0.4.2.post2"
  flashinfer_version: "0.6.11.post1"
  deepep_commit: "9af0e0d0e74f3577af1979c9b9e1ac2cad0104ee"
  mooncake_version: "0.3.9"
  torch_version: "2.11.0"
  nccl_version: "2.28.3"
  cudnn_version: "9.16.0.29"
  efa_version: "1.48.0"
  rust_version: "1.90.0"
  gdrcopy_version: "2.5.1"
  cuda_ref: "13.0.3"
  torch_cuda_arch_list: "9.0;10.0;10.3"
  dlc_major_version: "1"
  dlc_minor_version: "0"
release:
  release: true
  force_release: false
  public_registry: true
  private_registry: true
  enable_soci: true
  environment: gamma
