# XGBoost 3.0.5 SageMaker Image Configuration
# Parallel support alongside 3.2.0 — Ubuntu 20.04, Python 3.10, CUDA 12.6, Miniforge/Conda

image:
  name: "sagemaker-xgboost-3.0"
  description: "SageMaker XGBoost 3.0.5"

common:
  framework: "xgboost"
  framework_version: "3.0.5"
  job_type: "general"
  python_version: "py310"
  cuda_version: "cu126"
  os_version: "ubuntu20.04"
  customer_type: "sagemaker"
  arch_type: "x86"
  prod_image: "sagemaker-xgboost:3.0-5-cpu-py3"
  device_type: "cpu"
  contributor: "None"

release:
  release: true
  force_release: false
  public_registry: true
  private_registry: true
  enable_soci: false
  environment: preprod
