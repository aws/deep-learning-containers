image:
  name: "base-cu129-devel"
  description: "Base devel GPU image with CUDA 12.9.1, Python 3.13, and build tools on AL2023"

metadata:
  framework: "base_dlc"
  framework_version: "12.9.1"
  os_version: "amzn2023"
  customer_type: "ec2"
  arch_type: "x86"
  device_type: "gpu"
  job_type: "general"

build:
  dockerfile: "docker/base/cu129/Dockerfile"
  target: "devel"
  python_version: "3.13.12"
  cuda_version: "12.9.1"
  uv_version: "0.11.17"
  dlc_major_version: "1"
  dlc_minor_version: "0"

release:
  release: true
  prod_image: "base:devel-cu129-amzn2023"
  force_release: false
  public_registry: true
  private_registry: true
  enable_soci: true
  environment: "production"
