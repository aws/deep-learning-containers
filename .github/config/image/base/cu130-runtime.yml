image:
  name: "base-cu130-runtime"
  description: "Base runtime GPU image with CUDA 13.0.2 and Python 3.13 on AL2023"

metadata:
  framework: "base_dlc"
  framework_version: "13.0.2"
  os_version: "amzn2023"
  customer_type: "ec2"
  arch_type: "x86"
  device_type: "gpu"
  job_type: "general"
  prod_image: "base:runtime-cu130-amzn2023"

build:
  dockerfile: "docker/base/cu130/Dockerfile"
  target: "runtime"
  python_version: "3.13.12"
  cuda_version: "13.0.2"
  uv_version: "0.11.17"
  dlc_major_version: "1"
  dlc_minor_version: "0"

release:
  release: true
  force_release: false
  public_registry: true
  private_registry: true
  enable_soci: true
  environment: "production"
