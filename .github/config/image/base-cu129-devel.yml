# Base cu129 devel (CUDA 12.9.1, amzn2023) Image Configuration
# This file contains all configuration for building, testing, and releasing the base-cu129 devel image

# Image identification
image:
  name: "base-cu129-devel"
  description: "Base cu129 devel GPU image with CUDA 12.9.1, Python, and build tools on amzn2023"

# Build configuration
common:
  framework: "base_dlc"
  framework_version: "12.9.1"
  job_type: "general"
  python_version: "py313"
  cuda_version: "cu129"
  os_version: "amzn2023"
  customer_type: "ec2"
  arch_type: "x86"
  container_type: "devel"
  build_target: "devel"
  ci_tag: "cuda129-devel-amzn2023"
  device_type: "gpu"
  contributor: "None"
  prod_image: "base:devel-cu129-amzn2023"

# Release configuration
release:
  release: true
  force_release: false
  public_registry: true
  private_registry: true
  enable_soci: true
  environment: production # gamma or production
