image:
  name: "ray-train-ec2-gpu"
  description: "Ray Train (distributed training) for EC2 instances (GPU, multi-node)"

metadata:
  framework: "ray"
  framework_version: "2.56.0"
  os_version: "amzn2023"
  customer_type: "ec2"
  arch_type: "x86"
  device_type: "gpu"
  job_type: "training"
  container_type: "train-ml"
  prod_image: "ray:train-ml-cuda"

build:
  dockerfile: "docker/ray-train/Dockerfile.cuda"
  target: "ec2"
  builder_base_image: "public.ecr.aws/deep-learning-containers/base:devel-cu130-amzn2023"
  base_image: "public.ecr.aws/deep-learning-containers/base:runtime-cu130-amzn2023"
  python_version: "3.13.12"
  python_short_version: "3.13"
  cuda_version: "13.0.2"
  torch_version: "2.13.0"
  transformer_engine_version: "2.13.0"
  flash_attn_version: "2.8.3"
  efa_version: "1.47.0"
  gdrcopy_version: "2.4.4"
  max_jobs: "8"
  dlc_major_version: "1"
  dlc_minor_version: "0"

release:
  release: true
  force_release: false
  # Gamma-only for now (private ECR, no public gallery) until v1 is signed off.
  public_registry: false
  private_registry: true
  enable_soci: true
  environment: "gamma"
