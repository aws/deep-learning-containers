# XGBoost SageMaker Image Configuration
# This file contains all configuration for building, testing, and releasing the XGBoost SageMaker image

# Image identification
image:
  name: "sagemaker-xgboost"
  description: "SageMaker XGBoost"

# Build configuration
common:
  framework: "xgboost"
  framework_version: "3.0.5"
  job_type: "general"
  python_version: "py310"
  cuda_version: "cu126"
  os_version: "ubuntu20.04"
  customer_type: "sagemaker"
  arch_type: "x86"
  prod_image: "sagemaker-xgboost:3.0-5-cpu-py310-sagemaker"
  device_type: "cpu"
  contributor: "None"

# Release configuration
release:
  release: false
  force_release: false
  public_registry: false
  private_registry: true
  enable_soci: false
  environment: preprod
