image:
  name: "ray-ec2-cpu"
  description: "Ray for EC2 instances (CPU)"

metadata:
  framework: "ray"
  framework_version: "2.55.1"
  os_version: "amzn2023"
  customer_type: "ec2"
  arch_type: "x86"
  device_type: "cpu"
  job_type: "inference"
  container_type: "serve-ml"
  prod_image: "ray:serve-ml-cpu"

build:
  dockerfile: "docker/ray/Dockerfile.cpu"
  target: "ray-ec2-cpu"
  python_version: "3.13.12"
  dlc_major_version: "1"
  dlc_minor_version: "2"

release:
  release: true
  force_release: false
  public_registry: true
  private_registry: true
  enable_soci: true
  environment: "production"
