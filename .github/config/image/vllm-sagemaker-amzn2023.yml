# vLLM SageMaker AL2023 Image Configuration
image:
  name: "vllm-sagemaker-amzn2023"
  description: "vLLM for SageMaker on Amazon Linux 2023"
# NOTE: keep framework_version and vllm_ref in sync with docker/vllm/versions.env
#       (VLLM_VERSION, VLLM_REF). They are used here for image tags/labels/wheel-cache keys.
common:
  framework: "vllm_server"
  framework_version: "0.20.0.dev361"
  vllm_ref: "3f5bd482f5c1a5dbdffbbf68d624e20bb7032013"
  job_type: "general"
  python_version: "py312"
  cuda_version: "cu129"
  os_version: "amzn2023"
  customer_type: "sagemaker"
  platform: "sagemaker"
  arch_type: "x86"
  prod_image: "vllm:server-sagemaker-cuda-v1"
  device_type: "gpu"
  contributor: "None"
release:
  release: true
  force_release: false
  public_registry: true
  private_registry: true
  enable_soci: true
  environment: production
