# vLLM EC2 AL2023 Image Configuration
# This file contains all configuration for building, testing, and releasing the vLLM EC2 AL2023 image

# Image identification
image:
  name: "vllm-ec2-amzn2023"
  description: "vLLM for EC2 instances (AL2023, built from source)"

# Build configuration
# NOTE: keep framework_version and vllm_ref in sync with docker/vllm/versions.env
#       (VLLM_VERSION, VLLM_REF). They are used here for image tags/labels/wheel-cache keys.
common:
  framework: "vllm_server"
  framework_version: "0.20.1rc0"
  vllm_ref: "ebf862c351dc4bcaf65de34c3caebe6df6e9e214"
  job_type: "general"
  python_version: "py312"
  cuda_version: "cu129"
  os_version: "amzn2023"
  customer_type: "ec2"
  arch_type: "x86"
  prod_image: "vllm:0.18-gpu-py312-ec2"
  device_type: "gpu"
  contributor: "None"

# Release configuration
release:
  release: true
  force_release: false
  public_registry: true
  private_registry: true
  enable_soci: true
  environment: production
