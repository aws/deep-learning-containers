image:
  name: "lambda-cupy-preview"
  description: "Lambda CuPy GPU image with multi-mode concurrency RIC"

metadata:
  framework: "lambda"
  framework_version: "12.9.1"
  os_version: "amzn2023"
  arch_type: "x86"
  device_type: "gpu"
  job_type: "general"
  container_type: "cupy-cuda-preview"
  prod_image: "lambda:cupy-preview-gpu-py313-cu129"

build:
  dockerfile: "docker/lambda/Dockerfile"
  target: "cupy-preview-py3"
  python_version: "3.13"
  cuda_version: "12.9.1"
  dlc_major_version: "1"
  dlc_minor_version: "0"
  awslambdaric_version: "3.1.1"
  awslambdaric_release: "2.0.0.0"

release:
  release: true
  force_release: false
  public_registry: false
  private_registry: true
  enable_soci: false
  environment: "production"
