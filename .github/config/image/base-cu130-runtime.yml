# Base cu130 runtime (CUDA 13.0.2, amzn2023) Image Configuration
# This file contains all configuration for building, testing, and releasing the base-cu130 runtime image

# Image identification
image:
  name: "base-cu130-runtime"
  description: "Base cu130 runtime GPU image with CUDA 13.0.2 and Python on amzn2023"

# Build configuration
common:
  framework: "base_dlc"
  framework_version: "13.0.2"
  job_type: "general"
  python_version: "py313"
  cuda_version: "cu130"
  os_version: "amzn2023"
  customer_type: "ec2"
  arch_type: "x86"
  container_type: "runtime"
  build_target: "runtime"
  ci_tag: "cuda130-runtime-amzn2023"
  device_type: "gpu"
  contributor: "None"
  prod_image: "base:runtime-cu130-amzn2023"

# Release configuration
release:
  release: true
  force_release: false
  public_registry: true
  private_registry: true
  enable_soci: true
  environment: production # gamma or production
