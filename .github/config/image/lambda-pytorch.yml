# Lambda PyTorch CUDA Image Configuration
# This file contains all configuration for building, testing, and releasing the Lambda PyTorch image

# Image identification
image:
  name: "lambda-pytorch"
  description: "Lambda PyTorch GPU image with CUDA and Python"

# Build configuration
common:
  framework: "lambda"
  framework_version: "12.9.1"
  job_type: "general"
  python_version: "py313"
  cuda_version: "cu129"
  os_version: "amzn2023"
  arch_type: "x86"
  container_type: "pytorch-cuda"
  build_target: "pytorch-py3"
  ci_tag: "gpu-pytorch-py3"

# Release configuration
release:
  release: true
  force_release: false
  public_registry: false
  private_registry: true
  enable_soci: false
  environment: production
