image:
  name: "sglang-sagemaker-ubuntu"
  description: "SGLang for SageMaker (Ubuntu, upstream base image)"

metadata:
  framework: "sglang_server"
  framework_version: "0.5.13"
  os_version: "ubuntu22.04"
  customer_type: "sagemaker"
  platform: "sagemaker"
  arch_type: "x86"
  device_type: "gpu"
  job_type: "general"
  prod_image: "sglang:server-sagemaker-cuda-ubuntu"

build:
  dockerfile: "docker/sglang/Dockerfile"
  target: "sglang-sagemaker"
  base_image: "lmsysorg/sglang:v0.5.13"
  efa_version: "1.46.0"
  dlc_major_version: "1"
  dlc_minor_version: "0"

release:
  release: true
  force_release: false
  public_registry: true
  private_registry: true
  enable_soci: true
  environment: "production"
