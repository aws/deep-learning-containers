# Mapping of CI job names to relevant source files for the currency fix agent.
# When a job fails, the agent includes these files in the LLM context.
# Paths support {framework} placeholder (replaced at runtime with vllm/sglang).
#
# The agent matches job names from CI log filenames (e.g., "8_security-test _ ecr-vulnerability-scan.txt")
# against the keys below using substring match.

# Always included regardless of which job fails
common:
  - "docker/{framework}/Dockerfile"
  - ".github/config/image/{framework}-ec2.yml"

# Job-specific files
jobs:
  build-image:
    - "scripts/common/install_efa.sh"

  sanity-test:
    - "scripts/{framework}/dockerd_entrypoint.sh"
    - "test/sanity/scripts/test_sanity_vllm_sglang.py"

  security-test:
    - "test/security/data/ecr_scan_allowlist/{framework}/framework_allowlist.json"

  telemetry-test:
    - "scripts/telemetry/deep_learning_container.py"
    - "scripts/telemetry/bash_telemetry.sh.template"

  upstream-tests:
    - "test/{framework}/scripts/{framework}_test_setup.sh"
    - "test/{framework}/scripts/{framework}_ec2_examples_test.sh"

  sagemaker-test:
    - "scripts/{framework}/sagemaker_entrypoint.sh"
    - "test/{framework}/scripts/{framework}_sagemaker_examples_test.sh"
