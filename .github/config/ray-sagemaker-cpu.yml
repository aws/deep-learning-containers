# Ray SageMaker CPU Image Configuration
# This file contains all configuration for building, testing, and releasing the Ray SageMaker CPU image

# Image identification
image:
  name: "ray-sagemaker-cpu"
  description: "Ray for SageMaker (CPU)"

# Build configuration
common:
  framework: "ray"
  framework_version: "2.54.1"
  job_type: "inference"
  python_version: "py313"
  os_version: "amzn2023"
  customer_type: "sagemaker"
  arch_type: "x86"
  container_type: "serve-ml"
  build_target: "ray-sagemaker-cpu"
  ci_tag: "ray-cpu-sagemaker"
  dockerfile: "docker/ray/Dockerfile.cpu"
  base_image: "unused-ray-cpu-multistage"
  platform: "sagemaker"
  prod_image: "ray:2.54-cpu-py313"
  device_type: "cpu"
  contributor: "None"

# Release configuration
release:
  release: false
  force_release: false
  public_registry: true
  private_registry: true
  enable_soci: true
  environment: production
