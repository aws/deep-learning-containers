name: Download Model

description: >
  Download a model from S3 with local caching. Uses flock for safe concurrent
  access when multiple pods share the same host filesystem. Checks ETag to
  detect S3 updates and re-downloads only when the model has changed.

inputs:
  s3-path:
    description: Full S3 path to the model tarball (e.g., s3://bucket/models/model.tar.gz)
    required: true
  model-name:
    description: Model name used for the local directory (e.g., qwen3-32b)
    required: true
  cache-dir:
    description: Base directory for cached models
    required: false
    default: /dlc-models

outputs:
  model-dir:
    description: Path to the extracted model directory
    value: ${{ steps.download.outputs.model-dir }}

runs:
  using: composite
  steps:
    - name: Download model with cache check
      id: download
      shell: bash
      run: |
        CACHE_DIR="${{ inputs.cache-dir }}"
        MODEL_NAME="${{ inputs.model-name }}"
        S3_PATH="${{ inputs.s3-path }}"
        MODEL_DIR="${CACHE_DIR}/${MODEL_NAME}"
        LOCK_FILE="${CACHE_DIR}/.lock-${MODEL_NAME}"

        echo "model-dir=${MODEL_DIR}" >> $GITHUB_OUTPUT
        mkdir -p "${CACHE_DIR}"

        # Per-model lock prevents race conditions when multiple pods share the
        # same host filesystem. Different models use different lock files so
        # they don't block each other.
        flock -x "${LOCK_FILE}" bash -c '
          S3_PATH="'"${S3_PATH}"'"
          MODEL_DIR="'"${MODEL_DIR}"'"
          MODEL_NAME="'"${MODEL_NAME}"'"
          CACHE_DIR="'"${CACHE_DIR}"'"
          ETAG_FILE="${CACHE_DIR}/.etag-${MODEL_NAME}"

          # Get the current S3 ETag
          S3_ETAG=$(aws s3api head-object --bucket "$(echo ${S3_PATH} | cut -d/ -f3)" \
            --key "$(echo ${S3_PATH} | cut -d/ -f4-)" \
            --query ETag --output text 2>/dev/null || echo "")
          echo "S3 ETag: ${S3_ETAG}"

          # Check if cached model exists and ETag matches
          if [ -d "${MODEL_DIR}" ] && [ -f "${ETAG_FILE}" ]; then
            CACHED_ETAG=$(cat "${ETAG_FILE}")
            echo "Cached ETag: ${CACHED_ETAG}"
            if [ "${S3_ETAG}" = "${CACHED_ETAG}" ]; then
              echo "Model '"'"'${MODEL_NAME}'"'"' is cached and up to date. Skipping download."
              exit 0
            fi
            echo "Model '"'"'${MODEL_NAME}'"'"' is stale (ETag mismatch). Re-downloading."
            rm -rf "${MODEL_DIR}"
          fi

          # Download and extract
          echo "Downloading ${MODEL_NAME} from ${S3_PATH}..."
          mkdir -p "${MODEL_DIR}"
          aws s3 cp "${S3_PATH}" "${CACHE_DIR}/${MODEL_NAME}.tar.gz"
          tar xzf "${CACHE_DIR}/${MODEL_NAME}.tar.gz" -C "${MODEL_DIR}"
          rm -f "${CACHE_DIR}/${MODEL_NAME}.tar.gz"

          # Flatten if tarball contains a single subdirectory
          SUBDIRS=("${MODEL_DIR}"/*)
          if [ ${#SUBDIRS[@]} -eq 1 ] && [ -d "${SUBDIRS[0]}" ]; then
            mv "${SUBDIRS[0]}"/* "${MODEL_DIR}"/
            rmdir "${SUBDIRS[0]}"
          fi

          # Save ETag — written last so a crash before this triggers re-download
          echo "${S3_ETAG}" > "${ETAG_FILE}"
          echo "Model '"'"'${MODEL_NAME}'"'"' downloaded and cached."
        '
