name: 'Check ECR image exists'
description: >
  Probe an ECR image URI. Outputs `exists=true|false`. Does NOT fail if the
  image is missing — callers should gate downstream jobs/steps on the output.
  Intended for graceful skip when the fallback prod image has not been
  released yet (e.g. first-time PR on a new image config, or when the build
  job was skipped because only test files changed).

inputs:
  aws-account-id:
    description: 'AWS account ID owning the ECR repo'
    required: true
  aws-region:
    description: 'AWS region of the ECR repo'
    required: true
  image-uri:
    description: 'Full ECR image URI (account.dkr.ecr.region.amazonaws.com/repo:tag)'
    required: true

outputs:
  exists:
    description: 'true if the image manifest exists, false otherwise'
    value: ${{ steps.probe.outputs.exists }}

runs:
  using: composite
  steps:
    - name: Probe ECR image
      id: probe
      shell: bash
      run: |
        URI="${{ inputs.image-uri }}"
        REPO_TAG="${URI#*/}"
        REPO="${REPO_TAG%:*}"
        TAG="${REPO_TAG#*:}"
        echo "Probing ECR: repo=${REPO} tag=${TAG}"
        if aws ecr describe-images \
            --registry-id "${{ inputs.aws-account-id }}" \
            --region "${{ inputs.aws-region }}" \
            --repository-name "${REPO}" \
            --image-ids imageTag="${TAG}" >/dev/null 2>&1; then
          echo "::notice::ECR image found: ${URI}"
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "::warning::ECR image not found: ${URI} — skipping test"
          {
            echo "### ⚠️ Test skipped: image not available"
            echo "Image URI: \`${URI}\`"
            echo ""
            echo "The build job was skipped (typically because only test files changed) and the fallback prod image has not been released yet."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi
