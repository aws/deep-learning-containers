name: Reusable llama.cpp Upstream Tests

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      image-uri:
        description: 'Image URI to test'
        required: true
        type: string
      aws-account-id:
        description: 'AWS account ID for ECR authentication'
        required: true
        type: string
      aws-region:
        description: 'AWS region for ECR authentication'
        required: true
        type: string
      framework-version:
        description: 'llama.cpp framework version'
        required: true
        type: string

jobs:
  health-check-test:
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-g6xl-runner
        buildspec-override:true
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v5

      - name: Container pull
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ inputs.aws-account-id }}
          aws-region: ${{ inputs.aws-region }}
          image-uri: ${{ inputs.image-uri }}

      - name: Verify llama.cpp binary
        env:
          IMAGE: ${{ inputs.image-uri }}
        run: |
          # Verify the llama-server binary exists and runs
          docker run --rm --gpus all ${IMAGE} --help

      - name: Run health check
        env:
          IMAGE: ${{ inputs.image-uri }}
        run: |
          # Start llama-server with no model to verify /health endpoint
          CONTAINER_ID=$(docker run -d --gpus all -p 8080:8080 ${IMAGE} \
            --host 0.0.0.0 --port 8080)
          echo "CONTAINER_ID=${CONTAINER_ID}" >> ${GITHUB_ENV}

          # Wait for server to start
          echo "Waiting for llama-server to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Server is healthy"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Server failed to start"
              docker logs ${CONTAINER_ID}
              exit 1
            fi
            sleep 2
          done

          # Verify health endpoint
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health)
          echo "Health check returned HTTP ${HTTP_CODE}"
          if [ "${HTTP_CODE}" -ne 200 ]; then
            echo "Health check failed"
            docker logs ${CONTAINER_ID}
            exit 1
          fi

          docker stop ${CONTAINER_ID}
