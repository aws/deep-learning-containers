name: Reusable vLLM Model Smoke Tests

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      image-uri:
        description: "Image URI to test"
        required: true
        type: string
      aws-account-id:
        description: "AWS account ID for ECR authentication"
        required: true
        type: string
      aws-region:
        description: "AWS region for ECR authentication"
        required: true
        type: string

jobs:
  load-models:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Parse model config
        id: parse
        run: |
          python3 -c "
          import yaml, json
          with open('.github/config/vllm-model-tests.yml') as f:
              cfg = yaml.safe_load(f)
          print(json.dumps(cfg['models']))
          " > matrix.json
          echo "matrix=$(cat matrix.json)" >> $GITHUB_OUTPUT

  test-model:
    needs: [load-models]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.load-models.outputs.matrix) }}
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:${{ matrix.fleet }}
        buildspec-override:true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: ECR authenticate
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ inputs.aws-account-id }}
          aws-region: ${{ inputs.aws-region }}

      - name: Download model from S3
        run: |
          MODEL_DIR="/tmp/models/${{ matrix.name }}"
          mkdir -p "${MODEL_DIR}"
          aws s3 cp "${{ matrix.s3_path }}" /tmp/${{ matrix.name }}.tar.gz
          tar xzf /tmp/${{ matrix.name }}.tar.gz -C "${MODEL_DIR}"
          rm -f /tmp/${{ matrix.name }}.tar.gz
          # If tar created a single subdirectory, flatten it
          SUBDIRS=("${MODEL_DIR}"/*)
          if [ ${#SUBDIRS[@]} -eq 1 ] && [ -d "${SUBDIRS[0]}" ]; then
            mv "${SUBDIRS[0]}"/* "${MODEL_DIR}"/
            rmdir "${SUBDIRS[0]}"
          fi

      - name: Run model smoke test
        run: |
          docker pull ${{ inputs.image-uri }}
          docker run --rm --gpus all \
            --entrypoint bash \
            -v /tmp/models:/tmp/models \
            -v ${{ github.workspace }}/scripts/vllm:/opt/scripts/vllm \
            ${{ inputs.image-uri }} \
            /opt/scripts/vllm/vllm_model_smoke_test.sh \
              "/tmp/models/${{ matrix.name }}" \
              "${{ matrix.tp }}" \
              "${{ matrix.name }}"
