name: Test - Build Cache (sccache + prebuilt wheel)

on:
  workflow_dispatch:
    inputs:
      test-mode:
        description: "Which path to test"
        required: true
        type: choice
        options:
          - default
          - sccache
          - prebuilt-wheel
        default: default
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - ".github/workflows/test-build-cache.yml"
      - "docker/vllm/Dockerfile.build-cache-test"
      - "docker/vllm/build-cache-test/**"
      - "scripts/vllm/amzn2023/fetch_cached_wheels.sh"
      - "scripts/vllm/amzn2023/upload_cached_wheels.sh"
      - "scripts/vllm/amzn2023/vllm_source_hash.sh"

permissions:
  contents: read

env:
  FORCE_COLOR: "1"
  BUCKET: dlc-cicd-wheels

jobs:
  test-default:
    if: github.event_name == 'pull_request' || inputs.test-mode == 'default'
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Build (default path — no sccache, no prebuilt wheel)
        run: |
          docker buildx build --progress=plain \
            --target runtime \
            -f docker/vllm/Dockerfile.build-cache-test .

  test-sccache:
    # Disabled: requires IAM credentials for S3 bucket access (use x86-vllm-build-runner fleet)
    if: false
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Build (sccache path)
        run: |
          docker buildx build --progress=plain \
            --build-arg USE_SCCACHE=1 \
            --build-arg SCCACHE_BUCKET=${BUCKET} \
            --target runtime \
            -f docker/vllm/Dockerfile.build-cache-test .

  test-prebuilt-wheel:
    if: github.event_name == 'pull_request' || inputs.test-mode == 'prebuilt-wheel'
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Build wheel from source and upload to S3
        run: |
          docker buildx build --progress=plain \
            --target build -t test-build \
            -f docker/vllm/Dockerfile.build-cache-test .
          CID=$(docker create test-build /bin/true)
          mkdir -p /tmp/test-wheels
          docker cp "${CID}:/workspace/dist/" /tmp/test-wheels/
          docker rm "${CID}"
          S3_PREFIX="s3://${BUCKET}/wheels/test-build-cache/${GITHUB_RUN_ID}/"
          aws s3 cp /tmp/test-wheels/ "${S3_PREFIX}" --recursive --exclude "*" --include "*.whl"
          echo "S3_PREFIX=${S3_PREFIX}" >> $GITHUB_ENV

      - name: Build (prebuilt wheel path — should skip compilation)
        run: |
          docker buildx build --progress=plain \
            --build-arg VLLM_WHEEL_S3_URI="${S3_PREFIX}" \
            --target runtime \
            -f docker/vllm/Dockerfile.build-cache-test . 2>&1 | tee /tmp/build.log
          grep -q "PREBUILT WHEEL PATH" /tmp/build.log || { echo "❌ Prebuilt wheel path was NOT taken"; exit 1; }
          echo "✅ Prebuilt wheel path confirmed"
