name: Auto Release - Base

on:
  # schedule run must be on the default branch.
  # One cron per CUDA version — each run releases that version's
  # runtime + devel pair. (Mirrors the old per-version DLContainersInfraCDK
  # schedule: cu129 first, then cu130.)
  schedule:
    - cron: '40 20 * * 1,3'   # cu129 (CUDA 12.9) — 12:40 PM PST Mon/Wed
    - cron: '40 21 * * 1,3'   # cu130 (CUDA 13.0) —  1:40 PM PST Mon/Wed
    # - cron: '40 22 * * 1,3' # cuXXX (future)     —  2:40 PM PST Mon/Wed

  # Manual trigger — release a single CUDA version on demand
  workflow_dispatch:
    inputs:
      cuda-version:
        description: "CUDA version to release (e.g. cu129, cu130)"
        required: true
        type: string

permissions:
  contents: read

env:
  FORCE_COLOR: "1"

jobs:
  # ============================================================
  # Resolve the CUDA version for this run (cron → version, or
  # workflow_dispatch input) and build the runtime+devel build/test
  # matrix for it.
  # ============================================================
  load-config:
    runs-on: ubuntu-latest
    outputs:
      cuda-version: ${{ steps.resolve.outputs.cuda }}
      configs: ${{ steps.matrix.outputs.configs }}
      release-configs: ${{ steps.matrix.outputs.release-configs }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install yq
        run: |
          if ! command -v yq &> /dev/null; then
            sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            sudo chmod +x /usr/local/bin/yq
          fi

      - name: Resolve CUDA version
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CUDA="${{ inputs.cuda-version }}"
          else
            case "${{ github.event.schedule }}" in
              "40 20 * * 1,3") CUDA="cu129" ;;
              "40 21 * * 1,3") CUDA="cu130" ;;
              *) echo "::error::Unknown cron: ${{ github.event.schedule }}"; exit 1 ;;
            esac
          fi
          echo "Resolved CUDA version: ${CUDA}"
          echo "cuda=${CUDA}" >> "$GITHUB_OUTPUT"

      - name: Build configs matrix (runtime + devel for this CUDA version)
        id: matrix
        run: |
          CUDA="${{ steps.resolve.outputs.cuda }}"
          CONFIGS="[]"
          RELEASE_CONFIGS="[]"

          for TARGET in runtime devel; do
            CONFIG_FILE=".github/config/image/base-${CUDA}-${TARGET}.yml"
            if [ ! -f "$CONFIG_FILE" ]; then
              echo "::error::Config not found: $CONFIG_FILE"; exit 1
            fi

            FW=$(yq -r '.common.framework' "$CONFIG_FILE")
            FWV=$(yq -r '.common.framework_version' "$CONFIG_FILE")
            PY=$(yq -r '.common.python_version' "$CONFIG_FILE")
            OS=$(yq -r '.common.os_version' "$CONFIG_FILE")
            JOB=$(yq -r '.common.job_type' "$CONFIG_FILE")
            CI_TAG=$(yq -r '.common.ci_tag' "$CONFIG_FILE")
            DT=$(yq -r '.common.device_type // "gpu"' "$CONFIG_FILE")
            AT=$(yq -r '.common.arch_type // "x86"' "$CONFIG_FILE")
            CONTRIB=$(yq -r '.common.contributor // "None"' "$CONFIG_FILE")
            CUST=$(yq -r '.common.customer_type // ""' "$CONFIG_FILE")
            SHOULD_RELEASE=$(yq -r '.release.release // false' "$CONFIG_FILE")
            ENVIRONMENT=$(yq -r '.release.environment // "production"' "$CONFIG_FILE")

            # check_base_image.sh expects "<py-major.minor> <cuda-major.minor>"
            CHECK_PY=$(echo "$PY" | sed -E 's/^py([0-9])([0-9]+)$/\1.\2/')
            CHECK_CUDA=$(echo "$FWV" | cut -d. -f1,2)
            if [ "$TARGET" = "devel" ]; then
              CUDA_SCRIPT="cuda_devel_test.sh"
            else
              CUDA_SCRIPT="cuda_runtime_test.sh"
            fi

            ENTRY=$(jq -nc \
              --arg cuda "$CUDA" --arg ci_tag "$CI_TAG" --arg target "$TARGET" \
              --arg dockerfile "docker/base/${CUDA}/Dockerfile" --arg fw "$FW" --arg fwv "$FWV" \
              --arg py "$PY" --arg os "$OS" --arg job "$JOB" \
              --arg dt "$DT" --arg at "$AT" --arg contrib "$CONTRIB" --arg cust "$CUST" \
              --arg check_py "$CHECK_PY" --arg check_cuda "$CHECK_CUDA" \
              --arg cuda_script "$CUDA_SCRIPT" --arg env "$ENVIRONMENT" \
              '{cuda_version:$cuda, ci_tag:$ci_tag, target:$target, dockerfile:$dockerfile,
                framework:$fw, framework_version:$fwv, python_version:$py, os_version:$os,
                job_type:$job, device_type:$dt, arch_type:$at, contributor:$contrib,
                customer_type:$cust, check_py:$check_py, check_cuda:$check_cuda,
                cuda_script:$cuda_script, environment:$env}')

            CONFIGS=$(echo "$CONFIGS" | jq -c --argjson e "$ENTRY" '. + [$e]')
            if [ "$SHOULD_RELEASE" = "true" ]; then
              RELEASE_CONFIGS=$(echo "$RELEASE_CONFIGS" | jq -c --argjson e "$ENTRY" '. + [$e]')
            fi
          done

          echo "configs=${CONFIGS}" >> "$GITHUB_OUTPUT"
          echo "release-configs=${RELEASE_CONFIGS}" >> "$GITHUB_OUTPUT"
          echo "Configs matrix: ${CONFIGS}"
          echo "Release configs: ${RELEASE_CONFIGS}"

  # ============================================================
  # Build base images for this CUDA version (runtime + devel)
  # ============================================================
  build-images:
    needs: [load-config]
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-build-runner
        buildspec-override:true
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.load-config.outputs.configs) }}
    concurrency:
      group: ${{ github.workflow }}-build-${{ matrix.ci_tag }}-${{ github.run_id }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6

      - name: Setup buildkitd
        run: .github/scripts/buildkitd.sh

      - name: ECR login
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Build ${{ matrix.ci_tag }}
        run: |
          CI_IMAGE_URI="${{ vars.CI_AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/ci:base-${{ matrix.ci_tag }}-${{ github.run_id }}"
          echo "Building ${CI_IMAGE_URI}"
          docker buildx build --progress plain \
            --build-arg CUDA_VERSION=${{ matrix.framework_version }} \
            --build-arg CUDA_VERSION_SHORT=${{ matrix.cuda_version }} \
            --cache-to=type=inline \
            --cache-from=type=registry,ref=${CI_IMAGE_URI} \
            --tag ${CI_IMAGE_URI} \
            --push \
            --target ${{ matrix.target }} \
            -f ${{ matrix.dockerfile }} .

  # ============================================================
  # Sanity tests — runtime + devel
  # ============================================================
  sanity-test:
    needs: [load-config, build-images]
    if: success()
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.load-config.outputs.configs) }}
    concurrency:
      group: ${{ github.workflow }}-sanity-${{ matrix.ci_tag }}-${{ github.run_id }}
      cancel-in-progress: true
    uses: ./.github/workflows/reusable-sanity-tests.yml
    with:
      image-uri: ${{ vars.CI_AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/ci:base-${{ matrix.ci_tag }}-${{ github.run_id }}
      aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
      aws-region: ${{ vars.AWS_REGION }}
      framework: ${{ matrix.framework }}
      framework-version: ${{ matrix.framework_version }}
      python-version: ${{ matrix.python_version }}
      cuda-version: ${{ matrix.cuda_version }}
      os-version: ${{ matrix.os_version }}
      customer-type: ${{ matrix.customer_type }}
      arch-type: ${{ matrix.arch_type }}
      device-type: ${{ matrix.device_type }}
      contributor: ${{ matrix.contributor }}
      container-type: ${{ matrix.job_type }}

  # ============================================================
  # Base-specific sanity tests (CPU only — Python, compiler flags)
  # ============================================================
  base-sanity-test:
    needs: [load-config, build-images]
    if: success()
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.load-config.outputs.configs) }}
    concurrency:
      group: ${{ github.workflow }}-base-sanity-${{ matrix.ci_tag }}-${{ github.run_id }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          image-uri: ${{ vars.CI_AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/ci:base-${{ matrix.ci_tag }}-${{ github.run_id }}
      - name: Start container
        run: |
          CONTAINER_ID=$(docker run -d -it --rm --entrypoint /bin/bash \
            -v .:/workdir --workdir /workdir \
            ${{ vars.CI_AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/ci:base-${{ matrix.ci_tag }}-${{ github.run_id }})
          echo "CONTAINER_ID=$CONTAINER_ID" >> $GITHUB_ENV
      - name: Run base image checks
        run: docker exec ${CONTAINER_ID} bash /workdir/test/sanity/scripts/check_base_image.sh ${{ matrix.check_py }} ${{ matrix.check_cuda }}

  # ============================================================
  # CUDA tests — GPU sanity checks for runtime + devel
  # ============================================================
  cuda-test:
    needs: [load-config, build-images]
    if: success()
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-g6xl-runner
        buildspec-override:true
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.load-config.outputs.configs) }}
    concurrency:
      group: ${{ github.workflow }}-cuda-${{ matrix.ci_tag }}-${{ github.run_id }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          image-uri: ${{ vars.CI_AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/ci:base-${{ matrix.ci_tag }}-${{ github.run_id }}
      - name: Start container
        run: |
          CONTAINER_ID=$(docker run -d -it --rm --gpus=all --entrypoint /bin/bash \
            -v .:/workdir --workdir /workdir \
            ${{ vars.CI_AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/ci:base-${{ matrix.ci_tag }}-${{ github.run_id }})
          echo "CONTAINER_ID=$CONTAINER_ID" >> $GITHUB_ENV
      - name: Run CUDA test
        run: docker exec ${CONTAINER_ID} bash /workdir/test/cuda/scripts/${{ matrix.cuda_script }} ${{ matrix.check_cuda }}

  # ============================================================
  # Generate release specs — after all tests pass, before release
  # (same placement as pr-pytorch). Runs the generate-release-spec
  # action once per target via the load-config → generate-release-spec
  # chain, exposing a runtime spec and a devel spec.
  # ============================================================
  generate-release-spec:
    needs: [load-config, build-images, sanity-test, base-sanity-test, cuda-test]
    if: success() && needs.load-config.outputs.release-configs != '[]'
    runs-on: ubuntu-latest
    outputs:
      runtime-spec: ${{ steps.spec-runtime.outputs.release-spec }}
      devel-spec: ${{ steps.spec-devel.outputs.release-spec }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Load runtime config
        id: cfg-runtime
        uses: ./.github/actions/load-config
        with:
          config-file: .github/config/image/base-${{ needs.load-config.outputs.cuda-version }}-runtime.yml

      - name: Generate runtime release spec
        id: spec-runtime
        uses: ./.github/actions/generate-release-spec
        with:
          config-json: ${{ steps.cfg-runtime.outputs.config }}

      - name: Load devel config
        id: cfg-devel
        uses: ./.github/actions/load-config
        with:
          config-file: .github/config/image/base-${{ needs.load-config.outputs.cuda-version }}-devel.yml

      - name: Generate devel release spec
        id: spec-devel
        uses: ./.github/actions/generate-release-spec
        with:
          config-json: ${{ steps.cfg-devel.outputs.config }}

  # ============================================================
  # Release — runtime + devel for this CUDA version.
  # ============================================================
  release:
    needs: [load-config, generate-release-spec]
    if: success() && needs.load-config.outputs.release-configs != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.load-config.outputs.release-configs) }}
    concurrency:
      group: ${{ github.workflow }}-release-${{ matrix.ci_tag }}-${{ github.run_id }}
      cancel-in-progress: true
    uses: ./.github/workflows/reusable-release-image.yml
    with:
      source-image-uri: ${{ vars.CI_AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/ci:base-${{ matrix.ci_tag }}-${{ github.run_id }}
      release-spec: ${{ matrix.target == 'devel' && needs.generate-release-spec.outputs.devel-spec || needs.generate-release-spec.outputs.runtime-spec }}
      environment: ${{ matrix.environment }}
      aws-region: ${{ vars.AWS_REGION }}
      runner-fleet: default-runner
      publish-only: false
    secrets: inherit
