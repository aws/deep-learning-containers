name: Reusable Ray Serve Tests

on:
  workflow_call:
    inputs:
      config-file:
        description: "Path to image config YAML"
        required: true
        type: string
      image-uri:
        description: "Image URI to test. If empty, derives prod URI from config."
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  preflight:
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    outputs:
      image-uri: ${{ steps.image.outputs.image-uri }}
      aws-account-id: ${{ steps.image.outputs.aws-account-id }}
      image-exists: ${{ steps.check.outputs.exists }}
      device-type: ${{ steps.config.outputs.device-type }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve image URI
        id: image
        uses: ./.github/actions/resolve-image-uri
        with:
          image-uri: ${{ inputs.image-uri }}
          ci-aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
          prod-aws-account-id: ${{ vars.PROD_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          config-file: ${{ inputs.config-file }}

      - name: Check image exists
        id: check
        uses: ./.github/actions/check-image-exists
        with:
          image-uri: ${{ steps.image.outputs.image-uri }}

      - name: Parse config
        id: config
        run: |
          echo "device-type=$(yq '.metadata.device_type' '${{ inputs.config-file }}')" >> $GITHUB_OUTPUT

  serve-gpu:
    if: ${{ needs.preflight.outputs.image-exists == 'true' && needs.preflight.outputs.device-type == 'gpu' }}
    needs: [preflight]
    timeout-minutes: 60
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-g6xl-runner
        buildspec-override:true
    steps:
      - uses: actions/checkout@v6

      - name: ECR login
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ needs.preflight.outputs.aws-account-id }}
          aws-region: ${{ vars.AWS_REGION }}
          image-uri: ${{ needs.preflight.outputs.image-uri }}

      - name: Install test dependencies
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install -r test/requirements.txt
          uv pip install -r test/ray/ec2/requirements.txt

      - name: Clean stale ray temp files
        run: rm -rf /tmp/ray-ec2-*

      - name: Run EC2 GPU serve tests
        run: |
          source .venv/bin/activate
          cd test/
          python3 -m pytest -v --tb=short -rA --log-cli-level=INFO \
            --image-uri ${{ needs.preflight.outputs.image-uri }} \
            ray/ec2/test_ec2_gpu.py

      - name: Clean stale ray temp files
        if: always()
        run: rm -rf /tmp/ray-ec2-*

  serve-cpu:
    if: ${{ needs.preflight.outputs.image-exists == 'true' && needs.preflight.outputs.device-type == 'cpu' }}
    needs: [preflight]
    timeout-minutes: 60
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    steps:
      - uses: actions/checkout@v6

      - name: ECR login
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ needs.preflight.outputs.aws-account-id }}
          aws-region: ${{ vars.AWS_REGION }}
          image-uri: ${{ needs.preflight.outputs.image-uri }}

      - name: Install test dependencies
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install -r test/requirements.txt
          uv pip install -r test/ray/ec2/requirements.txt

      - name: Clean stale ray temp files
        run: rm -rf /tmp/ray-ec2-*

      - name: Run EC2 CPU serve tests
        run: |
          source .venv/bin/activate
          cd test/
          python3 -m pytest -v --tb=short -rA --log-cli-level=INFO \
            --image-uri ${{ needs.preflight.outputs.image-uri }} \
            ray/ec2/test_ec2_cpu.py

      - name: Clean stale ray temp files
        if: always()
        run: rm -rf /tmp/ray-ec2-*
