name: "PR - SGLang SageMaker"

on:
  # TEMP: Enable after all frameworks are refactored
  workflow_dispatch:
  # pull_request:
  #   branches: [main]
  #   types: [opened, reopened, synchronize]
  #   paths:
  #     - ".github/config/image/sglang/sagemaker-amzn2023.yml"
  #     - ".github/config/model-tests/sglang-model-tests.yml"
  #     - "docker/sglang/Dockerfile.amzn2023"
  #     - "scripts/docker/common/**"
  #     - "scripts/docker/sglang/**"
  #     - "test/sglang/**"
  #     - "test/sanity/**"
  #     - "test/telemetry/**"
  #     - ".github/workflows/sglang.pr-sagemaker.yml"
  #     - ".github/workflows/sglang.pipeline.yml"
  #     - "!docs/**"

permissions:
  contents: read
  pull-requests: read

jobs:
  gatekeeper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1
      - uses: ./.github/actions/pr-permission-gate

  check-changes:
    needs: [gatekeeper]
    runs-on: ubuntu-latest
    outputs:
      build-change: ${{ steps.changes.outputs.build-change }}
      sanity-test-change: ${{ steps.changes.outputs.sanity-test-change }}
      telemetry-test-change: ${{ steps.changes.outputs.telemetry-test-change }}
      upstream-test-change: ${{ steps.changes.outputs.upstream-test-change }}
      model-test-change: ${{ steps.changes.outputs.model-test-change }}
      sagemaker-test-change: ${{ steps.changes.outputs.sagemaker-test-change }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            build-change:
              - ".github/config/image/sglang/sagemaker-amzn2023.yml"
              - "docker/sglang/Dockerfile.amzn2023"
              - "scripts/docker/common/**"
              - "scripts/docker/sglang/**"
            sanity-test-change:
              - "test/sanity/**"
            telemetry-test-change:
              - "test/telemetry/**"
            upstream-test-change:
              - "test/sglang/scripts/**"
            model-test-change:
              - ".github/config/model-tests/sglang-model-tests.yml"
              - "test/sglang/scripts/**"
            sagemaker-test-change:
              - "test/sglang/sagemaker/**"

  pipeline:
    needs: [check-changes]
    uses: ./.github/workflows/sglang.pipeline.yml
    with:
      config-file: .github/config/image/sglang/sagemaker-amzn2023.yml
      tag-suffix: pr-${{ github.event.pull_request.number }}
      build: ${{ needs.check-changes.outputs.build-change == 'true' }}
      run-sanity-test: ${{ needs.check-changes.outputs.build-change == 'true' || needs.check-changes.outputs.sanity-test-change == 'true' }}
      run-telemetry-test: ${{ needs.check-changes.outputs.build-change == 'true' || needs.check-changes.outputs.telemetry-test-change == 'true' }}
      run-upstream-test: ${{ needs.check-changes.outputs.build-change == 'true' || needs.check-changes.outputs.upstream-test-change == 'true' }}
      run-model-test: ${{ needs.check-changes.outputs.build-change == 'true' || needs.check-changes.outputs.model-test-change == 'true' }}
      run-sagemaker-test: ${{ needs.check-changes.outputs.build-change == 'true' || needs.check-changes.outputs.sagemaker-test-change == 'true' }}
      release: false
    secrets: inherit
