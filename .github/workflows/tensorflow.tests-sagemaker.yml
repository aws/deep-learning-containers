name: Reusable TensorFlow SageMaker Tests

on:
  workflow_call:
    inputs:
      config-file:
        description: "Path to image config YAML"
        required: true
        type: string
      image-uri:
        description: "Image URI to test. If empty, derives prod URI from config."
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  preflight:
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    outputs:
      image-uri: ${{ steps.image.outputs.image-uri }}
      aws-account-id: ${{ steps.image.outputs.aws-account-id }}
      image-exists: ${{ steps.check.outputs.exists }}
      device-type: ${{ steps.parse.outputs.device-type }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve image URI
        id: image
        uses: ./.github/actions/resolve-image-uri
        with:
          image-uri: ${{ inputs.image-uri }}
          ci-aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
          prod-aws-account-id: ${{ vars.PROD_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          config-file: ${{ inputs.config-file }}

      - name: Check image exists
        id: check
        uses: ./.github/actions/check-image-exists
        with:
          image-uri: ${{ steps.image.outputs.image-uri }}

      - name: Parse config
        id: parse
        run: |
          echo "device-type=$(yq '.metadata.device_type' '${{ inputs.config-file }}')" >> $GITHUB_OUTPUT

  sagemaker-test:
    if: ${{ needs.preflight.outputs.image-exists == 'true' }}
    needs: [preflight]
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    steps:
      - uses: actions/checkout@v6

      - name: ECR login
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ needs.preflight.outputs.aws-account-id }}
          aws-region: ${{ vars.AWS_REGION }}
          image-uri: ${{ needs.preflight.outputs.image-uri }}

      - name: Install test dependencies
        run: |
          pip install -r test/tensorflow/integration/sagemaker/requirements.txt

      - name: Run SageMaker training tests
        env:
          PYTHONPATH: ${{ github.workspace }}/test
          TEST_IMAGE_URI: ${{ needs.preflight.outputs.image-uri }}
          SM_ROLE_ARN: arn:aws:iam::${{ needs.preflight.outputs.aws-account-id }}:role/SageMakerRole
        run: |
          if [ "${{ needs.preflight.outputs.device-type }}" = "gpu" ]; then
            pytest test/tensorflow/integration/sagemaker/test_mnist_cuda.py -v
          else
            pytest \
              test/tensorflow/integration/sagemaker/test_mnist_cpu.py \
              test/tensorflow/integration/sagemaker/test_experiments_cpu.py \
              test/tensorflow/integration/sagemaker/test_tuning_cpu.py \
              -v
          fi
