name: Upload ECR Allowlists to Scanner S3

on:
  schedule:
    # 4 AM UTC daily
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Print what would be uploaded without writing to S3'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      image:
        description: 'Target a single image (repo:tag), e.g. vllm:omni-cuda-v1. Leave empty for all.'
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:
  upload:
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v6

      - name: Upload allowlists
        uses: ./.github/actions/upload-ecr-allowlists
        with:
          aws-account-id: ${{ vars.PROD_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          s3-bucket: ${{ vars.SCANNER_ALLOWLIST_S3_BUCKET }}
          dry-run: ${{ inputs.dry-run || 'false' }}
          image: ${{ inputs.image || '' }}
