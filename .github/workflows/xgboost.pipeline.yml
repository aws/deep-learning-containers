name: "Pipeline - XGBoost"

on:
  workflow_call:
    inputs:
      config-file:
        description: "Path to image config YAML"
        required: true
        type: string
      tag-suffix:
        description: "CI tag suffix (run_id or pr-NUMBER)"
        required: true
        type: string
      build:
        description: "Whether to build the image (false = skip build, test against prod)"
        required: false
        type: boolean
        default: true
      run-sanity-test:
        description: "Run sanity tests"
        required: false
        type: boolean
        default: true
      run-security-test:
        description: "Run security tests"
        required: false
        type: boolean
        default: true
      run-telemetry-test:
        description: "Run telemetry tests"
        required: false
        type: boolean
        default: true
      run-unit-test:
        description: "Run unit tests (clones sagemaker-xgboost-container)"
        required: false
        type: boolean
        default: true
      run-integ-test:
        description: "Run integration tests (local Docker + SageMaker e2e)"
        required: false
        type: boolean
        default: true
      release:
        description: "Run release job after tests pass"
        required: false
        type: boolean
        default: false
    outputs:
      image-uri:
        description: "Built image URI (empty if build was skipped)"
        value: ${{ jobs.build.outputs.image-uri }}

jobs:
  build:
    if: ${{ inputs.build }}
    concurrency:
      group: ${{ github.workflow }}-build-${{ inputs.config-file }}-${{ github.ref }}
      cancel-in-progress: true
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-build-runner
        buildspec-override:true
    timeout-minutes: 60
    outputs:
      image-uri: ${{ steps.build.outputs.image-uri }}
    steps:
      - uses: actions/checkout@v6
      - id: build
        uses: ./.github/actions/build-image
        with:
          config-file: ${{ inputs.config-file }}
          aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          tag-suffix: ${{ inputs.tag-suffix }}

  sanity-test:
    if: ${{ always() && !failure() && !cancelled() && inputs.run-sanity-test }}
    needs: [build]
    concurrency:
      group: ${{ github.workflow }}-sanity-test-${{ inputs.config-file }}-${{ github.ref }}
      cancel-in-progress: true
    uses: ./.github/workflows/_reusable.sanity-tests.yml
    with:
      config-file: ${{ inputs.config-file }}
      image-uri: ${{ needs.build.outputs.image-uri || '' }}

  security-test:
    if: ${{ always() && !failure() && !cancelled() && inputs.run-security-test }}
    needs: [build]
    concurrency:
      group: ${{ github.workflow }}-security-test-${{ inputs.config-file }}-${{ github.ref }}
      cancel-in-progress: true
    uses: ./.github/workflows/_reusable.security-tests.yml
    with:
      config-file: ${{ inputs.config-file }}
      image-uri: ${{ needs.build.outputs.image-uri || '' }}

  telemetry-test:
    if: ${{ always() && !failure() && !cancelled() && inputs.run-telemetry-test }}
    needs: [build]
    concurrency:
      group: ${{ github.workflow }}-telemetry-test-${{ inputs.config-file }}-${{ github.ref }}
      cancel-in-progress: false
    uses: ./.github/workflows/_reusable.telemetry-tests.yml
    with:
      config-file: ${{ inputs.config-file }}
      image-uri: ${{ needs.build.outputs.image-uri || '' }}

  # Unit tests — clones sagemaker-xgboost-container, builds test image, runs pytest
  unit-test:
    if: ${{ always() && !failure() && !cancelled() && inputs.run-unit-test }}
    needs: [build]
    concurrency:
      group: ${{ github.workflow }}-unit-test-${{ inputs.config-file }}-${{ github.ref }}
      cancel-in-progress: true
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Resolve image URI
        id: image
        uses: ./.github/actions/resolve-image-uri
        with:
          image-uri: ${{ needs.build.outputs.image-uri || '' }}
          ci-aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
          prod-aws-account-id: ${{ vars.PROD_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          config-file: ${{ inputs.config-file }}

      - name: Check image exists
        id: check
        uses: ./.github/actions/check-image-exists
        with:
          image-uri: ${{ steps.image.outputs.image-uri }}

      - name: ECR login
        if: steps.check.outputs.exists == 'true'
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ steps.image.outputs.aws-account-id }}
          aws-region: ${{ vars.AWS_REGION }}
          image-uri: ${{ steps.image.outputs.image-uri }}

      - name: Parse config
        if: steps.check.outputs.exists == 'true'
        id: config
        run: |
          CONFIG_FILE="${{ inputs.config-file }}"
          echo "xgboost-branch=$(yq '.build.xgboost_container_branch // "master"' "$CONFIG_FILE")" >> $GITHUB_OUTPUT

      - name: Clone sagemaker-xgboost-container
        if: steps.check.outputs.exists == 'true'
        run: |
          rm -rf /tmp/xgboost-unit
          git clone --depth 1 --branch ${{ steps.config.outputs.xgboost-branch }} \
            https://github.com/aws/sagemaker-xgboost-container.git /tmp/xgboost-unit

      - name: Build test image
        if: steps.check.outputs.exists == 'true'
        run: |
          CI_IMAGE_URI="${{ steps.image.outputs.image-uri }}"
          cd /tmp/xgboost-unit
          printf "FROM ${CI_IMAGE_URI}\nADD . /app\nWORKDIR /app\nRUN pip install --no-deps -e . && pip install black coverage docker flake8 isort mock pytest pytest-cov pytest-xdist 'sagemaker>=2.0,<3.0' 'protobuf>=3.20.0,<=3.20.3' tox setuptools" > Dockerfile.test
          docker build -t test-xgboost -f Dockerfile.test .

      - name: Run unit tests
        if: steps.check.outputs.exists == 'true'
        run: |
          docker run --rm test-xgboost sh -c \
            'python3 -m pytest --cov=sagemaker_xgboost_container --cov-fail-under=60 test/unit'

      - name: Run flake8
        if: steps.check.outputs.exists == 'true'
        run: |
          docker run --rm test-xgboost sh -c 'python3 -m flake8 setup.py src test'

      - name: Skip notice
        if: steps.check.outputs.exists != 'true'
        run: echo "Image not found in ECR — skipping tests (first release scenario)"

  # Integration tests — local Docker compose + SageMaker e2e
  integ-test:
    if: ${{ always() && !failure() && !cancelled() && inputs.run-integ-test }}
    needs: [build]
    concurrency:
      group: ${{ github.workflow }}-integ-test-${{ inputs.config-file }}-${{ github.ref }}
      cancel-in-progress: true
    uses: ./.github/workflows/xgboost.tests-integ.yml
    with:
      config-file: ${{ inputs.config-file }}
      image-uri: ${{ needs.build.outputs.image-uri || '' }}

  release-gate:
    if: ${{ always() && !failure() && !cancelled() && inputs.release && needs.build.result == 'success' }}
    needs: [build, sanity-test, security-test, telemetry-test, unit-test, integ-test]
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.check.outputs.environment }}
      release-spec: ${{ steps.spec.outputs.release-spec }}
      should-release: ${{ steps.check.outputs.should-release }}
    steps:
      - uses: actions/checkout@v6
      - id: check
        run: |
          SHOULD_RELEASE=$(yq '.release.release' "${{ inputs.config-file }}")
          ENVIRONMENT=$(yq '.release.environment' "${{ inputs.config-file }}")
          echo "should-release=${SHOULD_RELEASE}" >> $GITHUB_OUTPUT
          echo "environment=${ENVIRONMENT}" >> $GITHUB_OUTPUT
      - id: spec
        if: steps.check.outputs.should-release == 'true'
        uses: ./.github/actions/generate-release-spec
        with:
          config-file: ${{ inputs.config-file }}

  release:
    if: ${{ needs.release-gate.outputs.should-release == 'true' }}
    needs: [build, release-gate]
    uses: ./.github/workflows/_reusable.release-image.yml
    with:
      source-image-uri: ${{ needs.build.outputs.image-uri }}
      release-spec: ${{ needs.release-gate.outputs.release-spec }}
      environment: ${{ needs.release-gate.outputs.environment }}
      aws-region: ${{ vars.AWS_REGION }}
    secrets: inherit
