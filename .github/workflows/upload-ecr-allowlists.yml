name: Upload ECR Allowlists to Scanner S3

on:
  schedule:
    # 4 AM UTC daily
    - cron: '0 4 * * *'
  pull_request:
    paths:
      - ".github/scripts/upload_ecr_allowlists.py"
      - ".github/workflows/upload-ecr-allowlists.yml"
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Print what would be uploaded without writing to S3'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      image:
        description: 'Target a single image (repo:tag), e.g. vllm:omni-cuda-v1. Leave empty for all.'
        required: false
        default: ''
        type: string

permissions:
  contents: read

env:
  ECR_ACCOUNT_ID: ${{ vars.PROD_AWS_ACCOUNT_ID }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  SCANNER_ALLOWLIST_S3_BUCKET: ${{ vars.SCANNER_ALLOWLIST_S3_BUCKET }}

jobs:
  upload:
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          python3 -m pip install boto3 pyyaml

      - name: Upload allowlists
        run: |
          ARGS=""
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ inputs.image }}" ]; then
            ARGS="$ARGS --image ${{ inputs.image }}"
          fi
          python3 .github/scripts/upload_ecr_allowlists.py $ARGS
