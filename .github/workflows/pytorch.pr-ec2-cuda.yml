name: "PR - PyTorch EC2 CUDA"

on:
  # TEMP: Enable after all frameworks are refactored
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - ".github/config/image/pytorch/*-ec2-cuda.yml"
      - ".github/workflows/pytorch.pipeline.yml"
      - ".github/workflows/pytorch.pr-ec2-cuda.yml"
      - "docker/pytorch/*/Dockerfile.cuda"
      - "scripts/docker/common/**"
      - "scripts/docker/pytorch/**"
      - "test/efa/**"
      - "test/pytorch/**"
      - "test/sanity/**"
      - "test/telemetry/**"
      - "!docs/**"

permissions:
  contents: read
  pull-requests: read

jobs:
  gatekeeper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1
      - uses: ./.github/actions/pr-permission-gate

  discover:
    needs: [gatekeeper]
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.discover.outputs.configs }}
    steps:
      - uses: actions/checkout@v6
      - id: discover
        uses: ./.github/actions/discover-configs
        with:
          pattern: ".github/config/image/pytorch/*-ec2-cuda.yml"

  check-changes:
    needs: [gatekeeper]
    runs-on: ubuntu-latest
    outputs:
      build-change: ${{ steps.changes.outputs.build-change }}
      efa-test-change: ${{ steps.changes.outputs.efa-test-change }}
      multi-gpu-test-change: ${{ steps.changes.outputs.multi-gpu-test-change }}
      multi-node-test-change: ${{ steps.changes.outputs.multi-node-test-change }}
      sanity-test-change: ${{ steps.changes.outputs.sanity-test-change }}
      single-gpu-test-change: ${{ steps.changes.outputs.single-gpu-test-change }}
      telemetry-test-change: ${{ steps.changes.outputs.telemetry-test-change }}
      unit-test-change: ${{ steps.changes.outputs.unit-test-change }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            build-change:
              - ".github/config/image/pytorch/*-ec2-cuda.yml"
              - "docker/pytorch/*/Dockerfile.cuda"
              - "scripts/docker/common/**"
              - "scripts/docker/pytorch/**"
            efa-test-change:
              - "test/efa/**"
            multi-gpu-test-change:
              - "test/pytorch/multi_gpu/**"
            multi-node-test-change:
              - "test/pytorch/multi_node/**"
            single-gpu-test-change:
              - "test/pytorch/single_gpu/**"
            sanity-test-change:
              - "test/sanity/**"
            telemetry-test-change:
              - "test/telemetry/**"
            unit-test-change:
              - "test/pytorch/unit/**"

  pipeline:
    needs: [discover, check-changes]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.configs) }}
    uses: ./.github/workflows/pytorch.pipeline.yml
    with:
      config-file: ${{ matrix.config_file }}
      tag-suffix: pr-${{ github.event.pull_request.number }}
      build: ${{ needs.check-changes.outputs.build-change == 'true' }}
      run-efa-test: ${{ needs.check-changes.outputs.build-change == 'true' || needs.check-changes.outputs.efa-test-change == 'true' }}
      run-multi-gpu-test: false   # NOTE: Temporarily disable test due to CI resource contention
      run-multi-node-test: false  # NOTE: Temporarily disable test due to CI resource contention
      run-sanity-test: ${{ needs.check-changes.outputs.build-change == 'true' || needs.check-changes.outputs.sanity-test-change == 'true' }}
      run-security-test: ${{ needs.check-changes.outputs.build-change == 'true' }}
      run-single-gpu-test: ${{ needs.check-changes.outputs.build-change == 'true' || needs.check-changes.outputs.single-gpu-test-change == 'true' }}
      run-telemetry-test: ${{ needs.check-changes.outputs.build-change == 'true' || needs.check-changes.outputs.telemetry-test-change == 'true' }}
      run-unit-test: ${{ needs.check-changes.outputs.build-change == 'true' || needs.check-changes.outputs.unit-test-change == 'true' }}
      release: false
    secrets: inherit
