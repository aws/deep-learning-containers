name: Reusable XGBoost Local Integration Tests

on:
  workflow_call:
    inputs:
      config-file:
        description: "Path to image config YAML"
        required: true
        type: string
      image-uri:
        description: "Image URI to test. If empty, derives prod URI from config."
        required: false
        type: string
        default: ""

permissions:
  contents: read

env:
  XGBOOST_CONTAINER_REPO: "https://github.com/aws/sagemaker-xgboost-container.git"

jobs:
  local-integration-test:
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Resolve image URI
        id: image
        uses: ./.github/actions/resolve-image-uri
        with:
          image-uri: ${{ inputs.image-uri }}
          ci-aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
          prod-aws-account-id: ${{ vars.PROD_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          config-file: ${{ inputs.config-file }}

      - name: Check image exists
        id: check
        uses: ./.github/actions/check-image-exists
        with:
          image-uri: ${{ steps.image.outputs.image-uri }}

      - name: ECR login
        if: steps.check.outputs.exists == 'true'
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ steps.image.outputs.aws-account-id }}
          aws-region: ${{ vars.AWS_REGION }}
          image-uri: ${{ steps.image.outputs.image-uri }}

      - name: Parse config
        if: steps.check.outputs.exists == 'true'
        id: config
        run: |
          CONFIG_FILE="${{ inputs.config-file }}"
          echo "framework-version=$(yq '.metadata.framework_version' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "xgboost-branch=$(yq '.build.xgboost_container_branch // "master"' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "python-version=$(yq '.build.python_version' "$CONFIG_FILE")" >> $GITHUB_OUTPUT

      - name: Clone sagemaker-xgboost-container (tests + source)
        if: steps.check.outputs.exists == 'true'
        run: |
          rm -rf /tmp/xgboost-integ
          git clone --depth 1 --branch ${{ steps.config.outputs.xgboost-branch }} \
            ${{ env.XGBOOST_CONTAINER_REPO }} /tmp/xgboost-integ

      - name: Setup test environment
        if: steps.check.outputs.exists == 'true'
        run: |
          cd /tmp/xgboost-integ
          uv venv /tmp/xgboost-integ/.venv --python ${{ steps.config.outputs.python-version }}
          . /tmp/xgboost-integ/.venv/bin/activate
          # Override the flask pin sagemaker-containers forces, as the image build does.
          uv pip install --overrides requirements.txt .[test]
          uv pip install --upgrade boto3 botocore
          docker compose version || (curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 -o /usr/local/bin/docker-compose && chmod +x /usr/local/bin/docker-compose)
          sed -i 's/collections\.Mapping/collections.abc.Mapping/g' \
            .venv/lib/python*/site-packages/sagemaker_containers/_mapping.py

      - name: Run local integration tests
        if: steps.check.outputs.exists == 'true'
        env:
          CI_IMAGE_URI: ${{ steps.image.outputs.image-uri }}
          FRAMEWORK_VERSION: ${{ steps.config.outputs.framework-version }}
        run: |
          . /tmp/xgboost-integ/.venv/bin/activate
          cd /tmp/xgboost-integ
          pytest test/integration/local \
            --ignore=test/integration/local/test_multiple_model_endpoint.py \
            --docker-base-name "${CI_IMAGE_URI%:*}" \
            --tag "${CI_IMAGE_URI##*:}" \
            --py-version 3 \
            --framework-version ${FRAMEWORK_VERSION}

      - name: Skip notice
        if: steps.check.outputs.exists != 'true'
        run: echo "Image not found in ECR — skipping tests (first release scenario)"
