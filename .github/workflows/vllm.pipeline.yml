name: "Pipeline - vLLM"

on:
  workflow_call:
    inputs:
      config-file:
        description: "Path to image config YAML"
        required: true
        type: string
      tag-suffix:
        description: "CI tag suffix (run_id or pr-NUMBER)"
        required: true
        type: string
      build:
        description: "Whether to build the image (false = skip build, test against prod)"
        required: false
        type: boolean
        default: true
      run-sanity-test:
        description: "Run sanity tests"
        required: false
        type: boolean
        default: true
      run-security-test:
        description: "Run security tests"
        required: false
        type: boolean
        default: true
      run-telemetry-test:
        description: "Run telemetry tests"
        required: false
        type: boolean
        default: true
      run-upstream-test:
        description: "Run upstream tests"
        required: false
        type: boolean
        default: true
      run-model-test:
        description: "Run model tests"
        required: false
        type: boolean
        default: true
      run-sagemaker-test:
        description: "Run SageMaker endpoint tests"
        required: false
        type: boolean
        default: true
      run-efa-test:
        description: "Run EFA integration tests"
        required: false
        type: boolean
        default: false
      release:
        description: "Run release job after tests pass"
        required: false
        type: boolean
        default: false
    outputs:
      image-uri:
        description: "Built image URI (empty if build was skipped)"
        value: ${{ jobs.build.outputs.image-uri }}

jobs:
  ci-config:
    runs-on: ubuntu-latest
    outputs:
      customer-type: ${{ steps.parse.outputs.customer-type }}
    steps:
      - uses: actions/checkout@v6
      - id: parse
        run: |
          echo "customer-type=$(yq '.metadata.customer_type' '${{ inputs.config-file }}')" >> $GITHUB_OUTPUT

  build:
    if: ${{ inputs.build }}
    concurrency:
      group: ${{ github.workflow }}-build-${{ inputs.config-file }}-${{ github.ref }}
      cancel-in-progress: true
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-vllm-build-runner
        buildspec-override:true
    timeout-minutes: 720
    env:
      WHEELS_BUCKET: ${{ vars.WHEELS_BUCKET }}
    outputs:
      image-uri: ${{ steps.build.outputs.image-uri }}
    steps:
      - uses: actions/checkout@v6
      - id: build
        uses: ./.github/actions/build-image
        with:
          config-file: ${{ inputs.config-file }}
          aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          tag-suffix: ${{ inputs.tag-suffix }}

  sanity-test:
    if: ${{ always() && !failure() && !cancelled() && inputs.run-sanity-test }}
    needs: [build]
    concurrency:
      group: ${{ github.workflow }}-sanity-test-${{ inputs.config-file }}-${{ github.ref }}
      cancel-in-progress: true
    uses: ./.github/workflows/_reusable.sanity-tests.yml
    with:
      config-file: ${{ inputs.config-file }}
      image-uri: ${{ needs.build.outputs.image-uri || '' }}

  security-test:
    if: ${{ always() && !failure() && !cancelled() && inputs.run-security-test }}
    needs: [build]
    concurrency:
      group: ${{ github.workflow }}-security-test-${{ inputs.config-file }}-${{ github.ref }}
      cancel-in-progress: true
    uses: ./.github/workflows/_reusable.security-tests.yml
    with:
      config-file: ${{ inputs.config-file }}
      image-uri: ${{ needs.build.outputs.image-uri || '' }}

  telemetry-test:
    if: ${{ always() && !failure() && !cancelled() && inputs.run-telemetry-test }}
    needs: [build]
    concurrency:
      group: ${{ github.workflow }}-telemetry-test-${{ inputs.config-file }}-${{ github.ref }}
      cancel-in-progress: false
    uses: ./.github/workflows/_reusable.telemetry-tests.yml
    with:
      config-file: ${{ inputs.config-file }}
      image-uri: ${{ needs.build.outputs.image-uri || '' }}

  upstream-tests:
    if: ${{ always() && !failure() && !cancelled() && inputs.run-upstream-test }}
    needs: [build]
    concurrency:
      group: ${{ github.workflow }}-upstream-tests-${{ inputs.config-file }}-${{ github.ref }}
      cancel-in-progress: true
    uses: ./.github/workflows/vllm.tests-upstream.yml
    with:
      config-file: ${{ inputs.config-file }}
      image-uri: ${{ needs.build.outputs.image-uri || '' }}
    secrets: inherit

  model-tests:
    if: ${{ always() && !failure() && !cancelled() && inputs.run-model-test }}
    needs: [build]
    concurrency:
      group: ${{ github.workflow }}-model-tests-${{ inputs.config-file }}-${{ github.ref }}
      cancel-in-progress: true
    uses: ./.github/workflows/vllm.tests-model.yml
    with:
      config-file: ${{ inputs.config-file }}
      image-uri: ${{ needs.build.outputs.image-uri || '' }}
    secrets: inherit

  sagemaker-tests:
    if: ${{ always() && !failure() && !cancelled() && inputs.run-sagemaker-test && needs.ci-config.outputs.customer-type == 'sagemaker' }}
    needs: [build, ci-config]
    concurrency:
      group: ${{ github.workflow }}-sagemaker-tests-${{ inputs.config-file }}-${{ github.ref }}
      cancel-in-progress: false
    uses: ./.github/workflows/vllm.tests-sagemaker.yml
    with:
      config-file: ${{ inputs.config-file }}
      image-uri: ${{ needs.build.outputs.image-uri || '' }}

  efa-test:
    if: ${{ always() && !failure() && !cancelled() && inputs.run-efa-test }}
    needs: [build, sanity-test, security-test]
    uses: ./.github/workflows/_reusable.efa-tests.yml
    with:
      config-file: ${{ inputs.config-file }}
      image-uri: ${{ needs.build.outputs.image-uri || '' }}
      run-nixl-tests: true
      container-entrypoint: "/bin/bash"
      container-cmd: "-c 'sleep infinity'"

  release:
    if: ${{ inputs.release && !failure() && !cancelled() }}
    needs: [build, sanity-test, security-test, telemetry-test, upstream-tests, model-tests, sagemaker-tests, efa-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - id: check
        run: |
          SHOULD_RELEASE=$(yq '.release.release' "${{ inputs.config-file }}")
          echo "should-release=${SHOULD_RELEASE}" >> $GITHUB_OUTPUT
      - id: spec
        if: steps.check.outputs.should-release == 'true'
        uses: ./.github/actions/generate-release-spec
        with:
          config-file: ${{ inputs.config-file }}
      - name: Release image
        if: steps.check.outputs.should-release == 'true'
        run: echo "RELEASE placeholder - would call reusable-release-image.yml with spec"
