name: Reusable vLLM Model Tests

on:
  workflow_call:
    inputs:
      config-file:
        description: "Path to image config YAML"
        required: true
        type: string
      image-uri:
        description: "Image URI to test. If empty, derives prod URI from config."
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  preflight:
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    outputs:
      image-uri: ${{ steps.image.outputs.image-uri }}
      aws-account-id: ${{ steps.image.outputs.aws-account-id }}
      image-exists: ${{ steps.check.outputs.exists }}
      codebuild-fleet-matrix: ${{ steps.parse.outputs.codebuild-fleet }}
      runner-scale-sets-matrix: ${{ steps.parse.outputs.runner-scale-sets }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve image URI
        id: image
        uses: ./.github/actions/resolve-image-uri
        with:
          image-uri: ${{ inputs.image-uri }}
          ci-aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
          prod-aws-account-id: ${{ vars.PROD_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          config-file: ${{ inputs.config-file }}

      - name: Check image exists
        id: check
        uses: ./.github/actions/check-image-exists
        with:
          image-uri: ${{ steps.image.outputs.image-uri }}

      - name: Parse model config
        if: steps.check.outputs.exists == 'true'
        id: parse
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install pyyaml
          python3 scripts/ci/parse_model_config.py --config .github/config/model-tests/vllm-model-tests.yml

  test-model-codebuild-fleet:
    name: test-model (${{ matrix.name }})
    if: ${{ needs.preflight.outputs.image-exists == 'true' && fromJson(needs.preflight.outputs.codebuild-fleet-matrix)[0] != null }}
    needs: [preflight]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.preflight.outputs.codebuild-fleet-matrix) }}
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:${{ matrix.fleet }}
        buildspec-override:true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: ECR authenticate
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ needs.preflight.outputs.aws-account-id }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Download model from S3
        uses: ./.github/actions/download-model
        id: model
        with:
          s3-path: ${{ matrix.s3_path }}
          model-name: ${{ matrix.name }}

      - name: Start container
        run: |
          docker pull ${{ needs.preflight.outputs.image-uri }}
          CONTAINER_ID=$(docker run -d -it --gpus all --entrypoint /bin/bash \
            --ipc=host --shm-size=10g \
            -v /dlc-models:/models \
            ${{ needs.preflight.outputs.image-uri }})
          echo "CONTAINER_ID=$CONTAINER_ID" >> $GITHUB_ENV

      - name: Copy scripts into container
        run: |
          docker cp test/vllm/scripts/amzn2023/vllm_model_smoke_test.sh ${CONTAINER_ID}:/models/
          if [ -f "test/vllm/scripts/amzn2023/${{ matrix.test_script || '' }}" ]; then
            docker cp "test/vllm/scripts/amzn2023/${{ matrix.test_script }}" ${CONTAINER_ID}:/models/
          fi
          for f in test/vllm/scripts/amzn2023/*.jinja; do
            [ -e "$f" ] && docker cp "$f" ${CONTAINER_ID}:/models/
          done

      - name: Download and copy test fixtures
        if: ${{ matrix.test_fixtures_paths != '' }}
        run: |
          mkdir -p /tmp/test-fixtures
          for s3_path in ${{ matrix.test_fixtures_paths }}; do
            aws s3 cp "${s3_path}" /tmp/test-fixtures/
          done
          docker cp /tmp/test-fixtures ${CONTAINER_ID}:/models/test-fixtures

      - name: Run model smoke test
        run: |
          TEST_SCRIPT="${{ matrix.test_script || 'vllm_model_smoke_test.sh' }}"
          docker exec \
            -e TEST_CASES_JSON='${{ matrix.test_cases_json || '' }}' \
            ${CONTAINER_ID} bash "/models/${TEST_SCRIPT}" \
            "/models/${{ matrix.name }}" \
            "${{ matrix.name }}" \
            ${{ matrix.extra_args }}

      - name: Cleanup
        if: always()
        run: |
          docker stop ${CONTAINER_ID} 2>/dev/null || true
          docker rm -f ${CONTAINER_ID} 2>/dev/null || true
          docker rmi ${{ needs.preflight.outputs.image-uri }} 2>/dev/null || true
          rm -rf /dlc-models

  test-model-runner-scale-sets:
    name: test-model (${{ matrix.name }})
    if: ${{ needs.preflight.outputs.image-exists == 'true' && fromJson(needs.preflight.outputs.runner-scale-sets-matrix)[0] != null }}
    needs: [preflight]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.preflight.outputs.runner-scale-sets-matrix) }}
    runs-on: ${{ matrix.runner_label }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: ECR authenticate
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ needs.preflight.outputs.aws-account-id }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Download model from S3
        run: |
          MODEL_DIR="/dlc-models/${{ matrix.name }}"
          mkdir -p "${MODEL_DIR}"
          aws s3 cp "${{ matrix.s3_path }}" "/dlc-models/${{ matrix.name }}.tar.gz"
          tar xzf "/dlc-models/${{ matrix.name }}.tar.gz" -C "${MODEL_DIR}"
          rm -f "/dlc-models/${{ matrix.name }}.tar.gz"
          SUBDIRS=("${MODEL_DIR}"/*)
          if [ ${#SUBDIRS[@]} -eq 1 ] && [ -d "${SUBDIRS[0]}" ]; then
            shopt -s dotglob
            mv "${SUBDIRS[0]}"/* "${MODEL_DIR}"/
            shopt -u dotglob
            rm -rf "${SUBDIRS[0]}"
          fi

      - name: Start container
        run: |
          POD_GPUS=$(nvidia-smi --query-gpu=uuid --format=csv,noheader | paste -sd,)
          echo "Pod GPU UUIDs: ${POD_GPUS}"
          docker pull ${{ needs.preflight.outputs.image-uri }}
          CONTAINER_ID=$(docker run -d -it --gpus "\"device=${POD_GPUS}\"" --entrypoint /bin/bash \
            --ipc=host --shm-size=10g \
            ${{ needs.preflight.outputs.image-uri }})
          echo "CONTAINER_ID=$CONTAINER_ID" >> $GITHUB_ENV

      - name: Copy files into container
        run: |
          docker exec ${CONTAINER_ID} mkdir -p /models
          docker cp /dlc-models/${{ matrix.name }} ${CONTAINER_ID}:/models/${{ matrix.name }}
          docker cp test/vllm/scripts/amzn2023/vllm_model_smoke_test.sh ${CONTAINER_ID}:/models/
          if [ -f "test/vllm/scripts/amzn2023/${{ matrix.test_script || '' }}" ]; then
            docker cp "test/vllm/scripts/amzn2023/${{ matrix.test_script }}" ${CONTAINER_ID}:/models/
          fi
          for f in test/vllm/scripts/amzn2023/*.jinja; do
            [ -e "$f" ] && docker cp "$f" ${CONTAINER_ID}:/models/
          done

      - name: Download and copy test fixtures
        if: ${{ matrix.test_fixtures_paths != '' }}
        run: |
          mkdir -p /tmp/test-fixtures
          for s3_path in ${{ matrix.test_fixtures_paths }}; do
            aws s3 cp "${s3_path}" /tmp/test-fixtures/
          done
          docker cp /tmp/test-fixtures ${CONTAINER_ID}:/models/test-fixtures

      - name: Run model smoke test
        run: |
          TEST_SCRIPT="${{ matrix.test_script || 'vllm_model_smoke_test.sh' }}"
          docker exec \
            -e TEST_CASES_JSON='${{ matrix.test_cases_json || '' }}' \
            ${CONTAINER_ID} bash "/models/${TEST_SCRIPT}" \
            "/models/${{ matrix.name }}" \
            "${{ matrix.name }}" \
            ${{ matrix.extra_args }}

      - name: Cleanup
        if: always()
        run: |
          docker stop ${CONTAINER_ID} 2>/dev/null || true
          docker rm -f ${CONTAINER_ID} 2>/dev/null || true
