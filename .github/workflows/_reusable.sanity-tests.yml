name: Reusable Sanity Tests

on:
  workflow_call:
    inputs:
      config-file:
        description: "Path to image config YAML"
        required: true
        type: string
      image-uri:
        description: "Image URI to test. If empty, derives prod URI from config."
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  sanity-test:
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    steps:
      - uses: actions/checkout@v6

      - name: Resolve image URI
        id: image
        uses: ./.github/actions/resolve-image-uri
        with:
          image-uri: ${{ inputs.image-uri }}
          ci-aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
          prod-aws-account-id: ${{ vars.PROD_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          config-file: ${{ inputs.config-file }}

      - name: Check image exists
        id: check
        uses: ./.github/actions/check-image-exists
        with:
          image-uri: ${{ steps.image.outputs.image-uri }}

      - name: ECR login
        if: steps.check.outputs.exists == 'true'
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ steps.image.outputs.aws-account-id }}
          aws-region: ${{ vars.AWS_REGION }}
          image-uri: ${{ steps.image.outputs.image-uri }}

      - name: Parse config
        if: steps.check.outputs.exists == 'true'
        id: config
        run: |
          CONFIG_FILE="${{ inputs.config-file }}"
          echo "framework=$(yq '.metadata.framework' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "framework-version=$(yq '.metadata.framework_version' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "os-version=$(yq '.metadata.os_version' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "customer-type=$(yq '.metadata.customer_type' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "arch-type=$(yq '.metadata.arch_type' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "device-type=$(yq '.metadata.device_type' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "job-type=$(yq '.metadata.job_type' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "python-version=$(yq '.build.python_version' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "cuda-version=$(yq '.build.cuda_version // ""' "$CONFIG_FILE")" >> $GITHUB_OUTPUT

      - name: Setup test dependencies
        if: steps.check.outputs.exists == 'true'
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install -r test/requirements.txt

      - name: Start container
        if: steps.check.outputs.exists == 'true'
        run: |
          CONTAINER_ID=$(docker run -d -it --rm --entrypoint /bin/bash \
            -v $(pwd):/workdir --workdir /workdir \
            ${{ steps.image.outputs.image-uri }})
          echo "CONTAINER_ID=$CONTAINER_ID" >> $GITHUB_ENV

      - name: Check filesystem
        if: steps.check.outputs.exists == 'true'
        run: |
          docker exec ${CONTAINER_ID} bash /workdir/test/sanity/scripts/check_filesystem.sh

      - name: Check for embedded credentials and secrets
        if: steps.check.outputs.exists == 'true'
        run: |
          docker exec ${CONTAINER_ID} bash /workdir/test/sanity/scripts/check_credentials.sh

      - name: Check no conda packages from repo.anaconda.com
        if: steps.check.outputs.exists == 'true'
        run: |
          docker exec ${CONTAINER_ID} bash /workdir/test/sanity/scripts/check_anaconda.sh

      - name: Check container labels
        if: steps.check.outputs.exists == 'true'
        run: |
          source .venv/bin/activate
          PYTHONPATH=$(pwd)/test:$PYTHONPATH python3 test/sanity/scripts/inspect_docker.py \
            ${{ steps.image.outputs.image-uri }}

      - name: Run inference engine sanity tests
        if: steps.check.outputs.exists == 'true' && (contains(steps.config.outputs.framework, 'vllm') || contains(steps.config.outputs.framework, 'sglang'))
        run: |
          docker exec \
            -e EXPECTED_FRAMEWORK_VERSION=${{ steps.config.outputs.framework-version }} \
            -e EXPECTED_PYTHON_VERSION=${{ steps.config.outputs.python-version }} \
            -e EXPECTED_CUDA_VERSION=${{ steps.config.outputs.cuda-version }} \
            ${CONTAINER_ID} python3 /workdir/test/sanity/scripts/test_sanity_vllm_sglang.py

      - name: Run OSS compliance check
        if: steps.check.outputs.exists == 'true'
        run: |
          docker exec ${CONTAINER_ID} /usr/local/bin/testOSSCompliance /root

      - name: Copy OSS compliance artifacts
        if: steps.check.outputs.exists == 'true'
        run: |
          docker cp ${CONTAINER_ID}:/root/THIRD_PARTY_SOURCE_CODE_URLS ./THIRD_PARTY_SOURCE_CODE_URLS

      - name: Upload third-party source code to S3
        if: steps.check.outputs.exists == 'true'
        run: |
          source .venv/bin/activate
          PYTHONPATH=$(pwd)/test:$PYTHONPATH python3 test/sanity/scripts/upload_oss_source.py THIRD_PARTY_SOURCE_CODE_URLS

  sagemaker-only:
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    steps:
      - uses: actions/checkout@v6

      - name: Resolve image URI
        id: image
        uses: ./.github/actions/resolve-image-uri
        with:
          image-uri: ${{ inputs.image-uri }}
          ci-aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
          prod-aws-account-id: ${{ vars.PROD_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          config-file: ${{ inputs.config-file }}

      - name: Check image exists
        id: check
        uses: ./.github/actions/check-image-exists
        with:
          image-uri: ${{ steps.image.outputs.image-uri }}

      - name: Parse config
        if: steps.check.outputs.exists == 'true'
        id: config
        run: |
          CONFIG_FILE="${{ inputs.config-file }}"
          echo "customer-type=$(yq '.metadata.customer_type' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "framework=$(yq '.metadata.framework' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "framework-version=$(yq '.metadata.framework_version' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "device-type=$(yq '.metadata.device_type' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "arch-type=$(yq '.metadata.arch_type' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "os-version=$(yq '.metadata.os_version' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "job-type=$(yq '.metadata.job_type' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "python-version=$(yq '.build.python_version' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "cuda-version=$(yq '.build.cuda_version // ""' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "contributor=$(yq '.metadata.contributor // ""' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "transformers-version=$(yq '.build.transformers_version // ""' "$CONFIG_FILE")" >> $GITHUB_OUTPUT

      - name: ECR login
        if: steps.check.outputs.exists == 'true' && steps.config.outputs.customer-type == 'sagemaker'
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ steps.image.outputs.aws-account-id }}
          aws-region: ${{ vars.AWS_REGION }}
          image-uri: ${{ steps.image.outputs.image-uri }}

      - name: Setup test dependencies
        if: steps.check.outputs.exists == 'true' && steps.config.outputs.customer-type == 'sagemaker'
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install -r test/requirements.txt

      - name: Check standard SageMaker labels
        if: steps.check.outputs.exists == 'true' && steps.config.outputs.customer-type == 'sagemaker'
        run: |
          source .venv/bin/activate
          PYTHON_SHORT="py$(echo '${{ steps.config.outputs.python-version }}' | tr -d '.')"
          CUDA_SHORT=""
          if [ -n "${{ steps.config.outputs.cuda-version }}" ]; then
            CUDA_SHORT="cu$(echo '${{ steps.config.outputs.cuda-version }}' | tr -d '.' | cut -c1-3)"
          fi
          PYTHONPATH=$(pwd)/test:$PYTHONPATH python3 test/sanity/scripts/check_labels.py \
            ${{ steps.image.outputs.image-uri }} \
            --framework "${{ steps.config.outputs.framework }}" \
            --framework-version "${{ steps.config.outputs.framework-version }}" \
            --device-type "${{ steps.config.outputs.device-type }}" \
            --cuda-version "${CUDA_SHORT}" \
            --arch-type "${{ steps.config.outputs.arch-type }}" \
            --python-version "${PYTHON_SHORT}" \
            --os-version "${{ steps.config.outputs.os-version }}" \
            --container-type "${{ steps.config.outputs.job-type }}" \
            --contributor "${{ steps.config.outputs.contributor }}" \
            --transformers-version "${{ steps.config.outputs.transformers-version }}"

