name: SGLANG_EC2_AUTO_RELEASE

on:
  # schedule run must be on the default branch
  # https://docs.github.com/en/actions/reference/workflows-and-actions/events-that-trigger-workflows#schedule
  schedule:
    # Runs at 10:00 AM PST/PDT on Monday and Wednesday
    # Note: GitHub Actions uses UTC time. PST is UTC-8, PDT is UTC-7
    # Using 17:00 UTC = 10:00 AM PDT (most of the year) / 9:00 AM PST (winter)
    - cron: '00 17 * * 2,4' # Tuesday and Thursday at 10:00 AM PDT / 9:00 AM PST

  # PR triggers for testing
  pull_request:
    paths:
      - 'docker/sglang/**'
      - '.github/workflows/sglang-ec2-auto-release.yml'
      - '.github/config/sglang-ec2.yml'
      - 'scripts/sglang/**'

  # Manual trigger
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  # CI environment configuration
  FORCE_COLOR: "1"

  # Config file paths
  CONFIG_FILE: ".github/config/sglang-ec2.yml"


jobs:
  load-config:
    runs-on: ubuntu-latest
    outputs:
      config: ${{ steps.load.outputs.config }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Load configuration
        id: load
        uses: ./.github/actions/load-config
        with:
          config-file: ${{ env.CONFIG_FILE }}

  parse-config:
    needs: [load-config]
    if: success()
    runs-on: ubuntu-latest
    outputs:
      framework: ${{ steps.parse.outputs.framework }}
      framework-version: ${{ steps.parse.outputs.framework-version }}
      python-version: ${{ steps.parse.outputs.python-version }}
      cuda-version: ${{ steps.parse.outputs.cuda-version }}
      os-version: ${{ steps.parse.outputs.os-version }}
      container-type: ${{ steps.parse.outputs.container-type }}
      device-type: ${{ steps.parse.outputs.device-type }}
      arch-type: ${{ steps.parse.outputs.arch-type }}
      contributor: ${{ steps.parse.outputs.contributor }}
      customer-type: ${{ steps.parse.outputs.customer-type }}
      prod-image: ${{ steps.parse.outputs.prod-image }}
    steps:
      - name: Parse configuration
        id: parse
        run: |
          echo '${{ needs.load-config.outputs.config }}' > config.json
          echo "framework=$(jq -r '.common.framework' config.json)" >> $GITHUB_OUTPUT
          echo "framework-version=$(jq -r '.common.framework_version' config.json)" >> $GITHUB_OUTPUT
          echo "python-version=$(jq -r '.common.python_version' config.json)" >> $GITHUB_OUTPUT
          echo "cuda-version=$(jq -r '.common.cuda_version' config.json)" >> $GITHUB_OUTPUT
          echo "os-version=$(jq -r '.common.os_version' config.json)" >> $GITHUB_OUTPUT
          echo "container-type=$(jq -r '.common.job_type' config.json)" >> $GITHUB_OUTPUT
          echo "device-type=$(jq -r '.common.device_type // "gpu"' config.json)" >> $GITHUB_OUTPUT
          echo "arch-type=$(jq -r '.common.arch_type // "x86"' config.json)" >> $GITHUB_OUTPUT
          echo "contributor=$(jq -r '.common.contributor // "None"' config.json)" >> $GITHUB_OUTPUT
          echo "customer-type=$(jq -r '.common.customer_type // ""' config.json)" >> $GITHUB_OUTPUT
          echo "prod-image=$(jq -r '.common.prod_image' config.json)" >> $GITHUB_OUTPUT

  # ===================================================
  # =============== SGLang EC2 jobs ===================
  # ===================================================
  build-sglang-ec2-image:
    needs: [parse-config]
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-build-runner
        buildspec-override:true
    concurrency:
      group: ${{ github.workflow }}-build-sglang-ec2-image-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    outputs:
      ci-image: ${{ steps.build.outputs.image-uri }}
    steps:
      - uses: actions/checkout@v5

      - name: Build image
        id: build
        uses: ./.github/actions/build-image
        with:
          framework: ${{ needs.parse-config.outputs.framework }}
          target: sglang-ec2
          base-image: lmsysorg/sglang:v${{ needs.parse-config.outputs.framework-version }}-cu129
          framework-version: ${{ needs.parse-config.outputs.framework-version }}
          container-type: ${{ needs.parse-config.outputs.container-type }}
          aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          tag-pr: ${{ needs.parse-config.outputs.framework }}-${{ needs.parse-config.outputs.framework-version }}-${{ needs.parse-config.outputs.device-type }}-${{ needs.parse-config.outputs.python-version }}-${{ needs.parse-config.outputs.cuda-version }}-${{ needs.parse-config.outputs.os-version }}-ec2-pr-${{ github.event.pull_request.number }}
          dockerfile-path: docker/${{ needs.parse-config.outputs.framework }}/Dockerfile
          arch-type: ${{ needs.parse-config.outputs.arch-type }}
          device-type: ${{ needs.parse-config.outputs.device-type }}
          cuda-version: ${{ needs.parse-config.outputs.cuda-version }}
          python-version: ${{ needs.parse-config.outputs.python-version }}
          os-version: ${{ needs.parse-config.outputs.os-version }}
          contributor: ${{ needs.parse-config.outputs.contributor }}
          customer-type: ${{ needs.parse-config.outputs.customer-type }}

  sglang-ec2-regression-test:
    needs: [build-sglang-ec2-image, parse-config]
    if: success()
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-g6xl-runner
        buildspec-override:true
    concurrency:
      group: ${{ github.workflow }}-sglang-ec2-regression-test-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v5

      - name: Container pull
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ needs.build-sglang-ec2-image.result == 'success' && vars.CI_AWS_ACCOUNT_ID || vars.PROD_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          image-uri: ${{ needs.build-sglang-ec2-image.result == 'success' && needs.build-sglang-ec2-image.outputs.ci-image || format('{0}.dkr.ecr.{1}.amazonaws.com/{2}', vars.PROD_AWS_ACCOUNT_ID, vars.AWS_REGION, needs.parse-config.outputs.prod-image) }}

      - name: Checkout SGLang tests
        uses: actions/checkout@v5
        with:
          repository: sgl-project/sglang
          ref: v${{ needs.parse-config.outputs.framework-version }}
          path: sglang_source

      - name: Start container
        run: |
          CONTAINER_ID=$(docker run -d -it --rm --gpus=all --entrypoint /bin/bash \
            -v ${HOME}/.cache/huggingface:/root/.cache/huggingface \
            -v ${HOME}/.cache/sglang:/root/.cache/sglang \
            -v .:/workdir --workdir /workdir \
            -e HF_TOKEN=${{ secrets.HUGGING_FACE_HUB_TOKEN }} \
            ${{ needs.build-sglang-ec2-image.result == 'success' && needs.build-sglang-ec2-image.outputs.ci-image || format('{0}.dkr.ecr.{1}.amazonaws.com/{2}', vars.PROD_AWS_ACCOUNT_ID, vars.AWS_REGION, needs.parse-config.outputs.prod-image) }})
          echo "CONTAINER_ID=$CONTAINER_ID" >> $GITHUB_ENV

      - name: Setup for SGLang tests
        run: |
          docker exec ${CONTAINER_ID} scripts/sglang/sglang_test_setup.sh

      - name: Run SGLang tests
        run: |
          docker exec ${CONTAINER_ID} scripts/sglang/sglang_regression_test.sh

  sglang-ec2-cuda-test:
    needs: [build-sglang-ec2-image, parse-config]
    if: success()
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-g6xl-runner
        buildspec-override:true
    concurrency:
      group: ${{ github.workflow }}-sglang-ec2-cuda-test-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v5

      - name: Container pull
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ needs.build-sglang-ec2-image.result == 'success' && vars.CI_AWS_ACCOUNT_ID || vars.PROD_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          image-uri: ${{ needs.build-sglang-ec2-image.result == 'success' && needs.build-sglang-ec2-image.outputs.ci-image || format('{0}.dkr.ecr.{1}.amazonaws.com/{2}', vars.PROD_AWS_ACCOUNT_ID, vars.AWS_REGION, needs.parse-config.outputs.prod-image) }}

      - name: Checkout SGLang tests
        uses: actions/checkout@v5
        with:
          repository: sgl-project/sglang
          ref: v${{ needs.parse-config.outputs.framework-version }}
          path: sglang_source

      - name: Start container
        run: |
          CONTAINER_ID=$(docker run -d -it --rm --gpus=all --entrypoint /bin/bash \
            -v ${HOME}/.cache/huggingface:/root/.cache/huggingface \
            -v ${HOME}/.cache/sglang:/root/.cache/sglang \
            -v .:/workdir --workdir /workdir \
            -e HF_TOKEN=${{ secrets.HUGGING_FACE_HUB_TOKEN }} \
            ${{ needs.build-sglang-ec2-image.result == 'success' && needs.build-sglang-ec2-image.outputs.ci-image || format('{0}.dkr.ecr.{1}.amazonaws.com/{2}', vars.PROD_AWS_ACCOUNT_ID, vars.AWS_REGION, needs.parse-config.outputs.prod-image) }})
          echo "CONTAINER_ID=$CONTAINER_ID" >> $GITHUB_ENV

      - name: Setup for SGLang tests
        run: |
          docker exec ${CONTAINER_ID} scripts/sglang/sglang_test_setup.sh

      - name: Run SGLang tests
        run: |
          docker exec ${CONTAINER_ID} scripts/sglang/sglang_cuda_test.sh

  sglang-ec2-example-test:
    needs: [build-sglang-ec2-image, parse-config]
    if: success()
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-g6xl-runner
        buildspec-override:true
    concurrency:
      group: ${{ github.workflow }}-sglang-ec2-example-test-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v5

      - name: Container pull
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ needs.build-sglang-ec2-image.result == 'success' && vars.CI_AWS_ACCOUNT_ID || vars.PROD_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          image-uri: ${{ needs.build-sglang-ec2-image.result == 'success' && needs.build-sglang-ec2-image.outputs.ci-image || format('{0}.dkr.ecr.{1}.amazonaws.com/{2}', vars.PROD_AWS_ACCOUNT_ID, vars.AWS_REGION, needs.parse-config.outputs.prod-image) }}

      - name: Checkout SGLang tests
        uses: actions/checkout@v5
        with:
          repository: sgl-project/sglang
          ref: v${{ needs.parse-config.outputs.framework-version }}
          path: sglang_source

      - name: Start container
        run: |
          CONTAINER_ID=$(docker run -d -it --rm --gpus=all --entrypoint /bin/bash \
            -v ${HOME}/.cache/huggingface:/root/.cache/huggingface \
            -v ${HOME}/.cache/sglang:/root/.cache/sglang \
            -v .:/workdir --workdir /workdir \
            -e HF_TOKEN=${{ secrets.HUGGING_FACE_HUB_TOKEN }} \
            ${{ needs.build-sglang-ec2-image.result == 'success' && needs.build-sglang-ec2-image.outputs.ci-image || format('{0}.dkr.ecr.{1}.amazonaws.com/{2}', vars.PROD_AWS_ACCOUNT_ID, vars.AWS_REGION, needs.parse-config.outputs.prod-image) }})
          echo "CONTAINER_ID=$CONTAINER_ID" >> $GITHUB_ENV

      - name: Setup for SGLang tests
        run: |
          docker exec ${CONTAINER_ID} scripts/sglang/sglang_test_setup.sh

      - name: Run SGLang tests
        run: |
          docker exec ${CONTAINER_ID} scripts/sglang/sglang_examples_test.sh

  generate-ec2-release-spec:
    needs: [load-config, parse-config, build-sglang-ec2-image, sglang-ec2-regression-test, sglang-ec2-cuda-test, sglang-ec2-example-test]
    if: |
      always() && !failure() && !cancelled() &&
      needs.build-sglang-ec2-image.result == 'success' &&
      needs.sglang-ec2-regression-test.result == 'success' &&
      needs.sglang-ec2-cuda-test.result == 'success' &&
      needs.sglang-ec2-example-test.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      release-spec: ${{ steps.generate.outputs.release-spec }}
      should-release: ${{ steps.check-release.outputs.should-release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check if release is enabled
        id: check-release
        run: |
          echo '${{ needs.load-config.outputs.config }}' > config.json
          RELEASE_ENABLED=$(jq -r '.release.release // false' config.json)
          echo "Release enabled: ${RELEASE_ENABLED}"
          echo "should-release=${RELEASE_ENABLED}" >> $GITHUB_OUTPUT

      - name: Generate release spec
        id: generate
        if: steps.check-release.outputs.should-release == 'true'
        uses: ./.github/actions/generate-release-spec
        with:
          config-json: ${{ needs.load-config.outputs.config }}

  release-ec2-image:
    needs: [load-config, build-sglang-ec2-image, generate-ec2-release-spec]
    if: needs.generate-ec2-release-spec.outputs.should-release == 'true'
    uses: ./.github/workflows/reusable-release-image.yml
    with:
      source-image-uri: ${{ needs.build-sglang-ec2-image.outputs.ci-image }}
      release-spec: ${{ needs.generate-ec2-release-spec.outputs.release-spec }}
      environment: ${{ fromJson(needs.load-config.outputs.config).release.environment }}
      aws-region: ${{ vars.AWS_REGION }}
      runner-fleet: default-runner
