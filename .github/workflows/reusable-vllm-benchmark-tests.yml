name: Reusable vLLM Benchmark Tests

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      image-uri:
        description: "Image URI to test"
        required: true
        type: string
      aws-account-id:
        description: "AWS account ID for ECR authentication"
        required: true
        type: string
      aws-region:
        description: "AWS region for ECR authentication"
        required: true
        type: string

jobs:
  load-benchmarks:
    runs-on: ubuntu-latest
    outputs:
      codebuild-fleet-matrix: ${{ steps.parse.outputs.codebuild-fleet }}
      runner-scale-sets-matrix: ${{ steps.parse.outputs.runner-scale-sets }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Parse benchmark config
        id: parse
        run: |
          python3 -c "
          import yaml, json
          with open('.github/config/vllm-model-tests.yml') as f:
              cfg = yaml.safe_load(f)
          bm = cfg.get('benchmark', {})
          prefix = cfg.get('s3_prefix', '')
          for m in bm.get('codebuild-fleet', []) + bm.get('runner-scale-sets', []):
              m['s3_path'] = m['s3_path'].replace('{s3_prefix}', prefix)
          print('codebuild-fleet=' + json.dumps(bm.get('codebuild-fleet', [])))
          print('runner-scale-sets=' + json.dumps(bm.get('runner-scale-sets', [])))
          " > parsed.txt
          grep '^codebuild-fleet=' parsed.txt | sed 's/^codebuild-fleet=//' > cb.json
          grep '^runner-scale-sets=' parsed.txt | sed 's/^runner-scale-sets=//' > rss.json
          echo "codebuild-fleet=$(cat cb.json)" >> $GITHUB_OUTPUT
          echo "runner-scale-sets=$(cat rss.json)" >> $GITHUB_OUTPUT

  benchmark-codebuild-fleet:
    name: benchmark (${{ matrix.name }})
    if: ${{ fromJson(needs.load-benchmarks.outputs.codebuild-fleet-matrix)[0] != null }}
    needs: [load-benchmarks]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.load-benchmarks.outputs.codebuild-fleet-matrix) }}
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:${{ matrix.fleet }}
        buildspec-override:true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: ECR authenticate
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ inputs.aws-account-id }}
          aws-region: ${{ inputs.aws-region }}

      - name: Download model from S3
        run: |
          MODEL_DIR="/dlc-models/${{ matrix.name }}"
          mkdir -p "${MODEL_DIR}"
          aws s3 cp "${{ matrix.s3_path }}" "/dlc-models/${{ matrix.name }}.tar.gz"
          tar xzf "/dlc-models/${{ matrix.name }}.tar.gz" -C "${MODEL_DIR}"
          rm -f "/dlc-models/${{ matrix.name }}.tar.gz"
          SUBDIRS=("${MODEL_DIR}"/*)
          if [ ${#SUBDIRS[@]} -eq 1 ] && [ -d "${SUBDIRS[0]}" ]; then
            mv "${SUBDIRS[0]}"/* "${MODEL_DIR}"/
            rmdir "${SUBDIRS[0]}"
          fi

      - name: Start container
        run: |
          docker pull ${{ inputs.image-uri }}
          CONTAINER_ID=$(docker run -d -it --gpus all --entrypoint /bin/bash \
            -v /dlc-models:/models \
            ${{ inputs.image-uri }})
          echo "CONTAINER_ID=$CONTAINER_ID" >> $GITHUB_ENV

      - name: Copy scripts into container
        run: |
          docker cp scripts/vllm/amzn2023/vllm_benchmark_test.sh ${CONTAINER_ID}:/models/

      - name: Run benchmark
        run: |
          docker exec \
            -e MIN_THROUGHPUT_TOKENS_PER_SEC=${{ matrix.min_throughput || 100 }} \
            -e MIN_REQUESTS_PER_SEC=${{ matrix.min_rps || 1 }} \
            -e BENCHMARK_NUM_PROMPTS=${{ matrix.num_prompts || 64 }} \
            -e BENCHMARK_INPUT_LEN=${{ matrix.input_len || 512 }} \
            -e BENCHMARK_OUTPUT_LEN=${{ matrix.output_len || 128 }} \
            -e BENCHMARK_BATCH_SIZE=${{ matrix.batch_size || 4 }} \
            ${CONTAINER_ID} bash /models/vllm_benchmark_test.sh \
              "/models/${{ matrix.name }}" \
              "${{ matrix.name }}" \
              ${{ matrix.extra_args }}

      - name: Extract results
        if: always()
        run: |
          docker cp ${CONTAINER_ID}:/tmp/benchmark_results/. ./benchmark_results/ 2>/dev/null || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.name }}
          path: benchmark_results/
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          docker stop ${CONTAINER_ID} 2>/dev/null || true
          docker rm -f ${CONTAINER_ID} 2>/dev/null || true
          docker rmi ${{ inputs.image-uri }} 2>/dev/null || true
          rm -rf /dlc-models

  benchmark-runner-scale-sets:
    name: benchmark (${{ matrix.name }})
    if: ${{ fromJson(needs.load-benchmarks.outputs.runner-scale-sets-matrix)[0] != null }}
    needs: [load-benchmarks]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.load-benchmarks.outputs.runner-scale-sets-matrix) }}
    runs-on: gpu-efa-runners
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: ECR authenticate
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ inputs.aws-account-id }}
          aws-region: ${{ inputs.aws-region }}

      - name: Download model from S3
        run: |
          MODEL_DIR="/dlc-models/${{ matrix.name }}"
          mkdir -p "${MODEL_DIR}"
          aws s3 cp "${{ matrix.s3_path }}" "/dlc-models/${{ matrix.name }}.tar.gz"
          tar xzf "/dlc-models/${{ matrix.name }}.tar.gz" -C "${MODEL_DIR}"
          rm -f "/dlc-models/${{ matrix.name }}.tar.gz"
          SUBDIRS=("${MODEL_DIR}"/*)
          if [ ${#SUBDIRS[@]} -eq 1 ] && [ -d "${SUBDIRS[0]}" ]; then
            mv "${SUBDIRS[0]}"/* "${MODEL_DIR}"/
            rmdir "${SUBDIRS[0]}"
          fi

      - name: Start container
        run: |
          docker pull ${{ inputs.image-uri }}
          CONTAINER_ID=$(docker run -d -it --gpus all --entrypoint /bin/bash \
            --ipc=host --shm-size=10g \
            ${{ inputs.image-uri }})
          echo "CONTAINER_ID=$CONTAINER_ID" >> $GITHUB_ENV

      - name: Copy files into container
        run: |
          docker exec ${CONTAINER_ID} mkdir -p /models
          docker cp /dlc-models/${{ matrix.name }} ${CONTAINER_ID}:/models/${{ matrix.name }}
          docker cp scripts/vllm/amzn2023/vllm_benchmark_test.sh ${CONTAINER_ID}:/models/
          rm -rf /dlc-models

      - name: Run benchmark
        run: |
          docker exec \
            -e MIN_THROUGHPUT_TOKENS_PER_SEC=${{ matrix.min_throughput || 100 }} \
            -e MIN_REQUESTS_PER_SEC=${{ matrix.min_rps || 1 }} \
            -e BENCHMARK_NUM_PROMPTS=${{ matrix.num_prompts || 64 }} \
            -e BENCHMARK_INPUT_LEN=${{ matrix.input_len || 512 }} \
            -e BENCHMARK_OUTPUT_LEN=${{ matrix.output_len || 128 }} \
            -e BENCHMARK_BATCH_SIZE=${{ matrix.batch_size || 4 }} \
            ${CONTAINER_ID} bash /models/vllm_benchmark_test.sh \
              "/models/${{ matrix.name }}" \
              "${{ matrix.name }}" \
              ${{ matrix.extra_args }}

      - name: Extract results
        if: always()
        run: |
          docker cp ${CONTAINER_ID}:/tmp/benchmark_results/. ./benchmark_results/ 2>/dev/null || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.name }}
          path: benchmark_results/
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          docker stop ${CONTAINER_ID} 2>/dev/null || true
          docker rm -f ${CONTAINER_ID} 2>/dev/null || true
          docker rmi ${{ inputs.image-uri }} 2>/dev/null || true
          rm -rf /dlc-models

  benchmark-report:
    name: benchmark-report
    if: always()
    needs: [benchmark-codebuild-fleet, benchmark-runner-scale-sets]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download all benchmark artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: benchmark-*
          path: results/

      - name: Generate report
        run: |
          python3 -c "
          import json, glob, os, yaml

          with open('.github/config/vllm-model-tests.yml') as f:
              cfg = yaml.safe_load(f)
          bm = cfg.get('benchmark', {})
          runners = {}
          for m in bm.get('codebuild-fleet', []):
              runners[m['name']] = m
              runners[m['name']]['runner'] = m.get('fleet', '')
          for m in bm.get('runner-scale-sets', []):
              runners[m['name']] = m
              runners[m['name']]['runner'] = 'runner-scale-sets'

          def get_tp(extra_args):
              parts = extra_args.split()
              for i, p in enumerate(parts):
                  if p == '--tensor-parallel-size' and i + 1 < len(parts):
                      return parts[i + 1]
              return '1'

          print('# vLLM Benchmark Report\n')

          print('## Throughput\n')
          print('| Model | Runner | TP | Input Len | Output Len | Prompts | Tokens/s | Requests/s | Elapsed (s) |')
          print('|-------|--------|----|-----------|------------|---------|----------|------------|-------------|')
          for f in sorted(glob.glob('results/**/throughput_*.json', recursive=True)):
              name = os.path.basename(f).replace('throughput_', '').replace('.json', '')
              c = runners.get(name, {})
              tp = get_tp(c.get('extra_args', ''))
              with open(f) as fh:
                  r = json.load(fh)
              print(f'| {name} | {c.get(\"runner\", \"unknown\")} | {tp} | {c.get(\"input_len\", \"\")} | {c.get(\"output_len\", \"\")} | {c.get(\"num_prompts\", \"\")} | {r[\"tokens_per_second\"]:.2f} | {r[\"requests_per_second\"]:.2f} | {r[\"elapsed_time\"]:.2f} |')

          print('\n## Latency\n')
          print('| Model | Runner | TP | Batch Size | Avg (s) | p50 (s) | p90 (s) | p99 (s) |')
          print('|-------|--------|----|------------|---------|---------|---------|---------|')
          for f in sorted(glob.glob('results/**/latency_*.json', recursive=True)):
              name = os.path.basename(f).replace('latency_', '').replace('.json', '')
              c = runners.get(name, {})
              tp = get_tp(c.get('extra_args', ''))
              with open(f) as fh:
                  r = json.load(fh)
              p = r.get('percentiles', {})
              print(f'| {name} | {c.get(\"runner\", \"unknown\")} | {tp} | {c.get(\"batch_size\", \"\")} | {r[\"avg_latency\"]:.4f} | {p.get(\"50\", 0):.4f} | {p.get(\"90\", 0):.4f} | {p.get(\"99\", 0):.4f} |')
          " >> "$GITHUB_STEP_SUMMARY"
