name: Reusable PyTorch SageMaker Tests

on:
  workflow_call:
    inputs:
      config-file:
        description: "Path to image config YAML"
        required: true
        type: string
      image-uri:
        description: "Image URI to test. If empty, derives prod URI from config."
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  sagemaker-test:
    # Launches remote SageMaker training jobs — no GPU needed on the runner.
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Resolve image URI
        id: image
        uses: ./.github/actions/resolve-image-uri
        with:
          image-uri: ${{ inputs.image-uri }}
          ci-aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
          prod-aws-account-id: ${{ vars.PROD_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          config-file: ${{ inputs.config-file }}

      - name: Check image exists
        id: check
        uses: ./.github/actions/check-image-exists
        with:
          image-uri: ${{ steps.image.outputs.image-uri }}

      - name: ECR login
        if: steps.check.outputs.exists == 'true'
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ steps.image.outputs.aws-account-id }}
          aws-region: ${{ vars.AWS_REGION }}
          image-uri: ${{ steps.image.outputs.image-uri }}

      - name: Select test file by device type
        if: steps.check.outputs.exists == 'true'
        id: select
        run: |
          DEVICE=$(yq '.metadata.device_type' '${{ inputs.config-file }}')
          if [ "${DEVICE}" = "gpu" ]; then
            echo "test-file=pytorch/integration/sagemaker/test_sm_training_cuda.py" >> $GITHUB_OUTPUT
          else
            echo "test-file=pytorch/integration/sagemaker/test_sm_training_cpu.py" >> $GITHUB_OUTPUT
          fi

      - name: Run SageMaker training tests
        if: steps.check.outputs.exists == 'true'
        env:
          TEST_IMAGE_URI: ${{ steps.image.outputs.image-uri }}
          SM_ROLE_ARN: arn:aws:iam::${{ vars.CI_AWS_ACCOUNT_ID }}:role/SageMakerRole
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install -r test/requirements.txt
          uv pip install -r test/pytorch/integration/sagemaker/requirements.txt
          cd test/
          PYTHONPATH=$(pwd):$PYTHONPATH python3 -m pytest -v --tb=short -rA --log-cli-level=INFO \
            ${{ steps.select.outputs.test-file }}

      - name: Skip notice
        if: steps.check.outputs.exists != 'true'
        run: echo "Image not found in ECR — skipping tests (first release scenario)"
