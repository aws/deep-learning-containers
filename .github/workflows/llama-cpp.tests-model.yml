name: Reusable llama.cpp Model Tests

on:
  workflow_call:
    inputs:
      config-file:
        description: "Path to image config YAML"
        required: true
        type: string
      image-uri:
        description: "Image URI to test. If empty, derives prod URI from config."
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  preflight:
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    outputs:
      image-uri: ${{ steps.image.outputs.image-uri }}
      aws-account-id: ${{ steps.image.outputs.aws-account-id }}
      image-exists: ${{ steps.check.outputs.exists }}
      codebuild-fleet-matrix: ${{ steps.parse.outputs.codebuild-fleet }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve image URI
        id: image
        uses: ./.github/actions/resolve-image-uri
        with:
          image-uri: ${{ inputs.image-uri }}
          ci-aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
          prod-aws-account-id: ${{ vars.PROD_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          config-file: ${{ inputs.config-file }}

      - name: Check image exists
        id: check
        uses: ./.github/actions/check-image-exists
        with:
          image-uri: ${{ steps.image.outputs.image-uri }}

      - name: Parse model config
        if: steps.check.outputs.exists == 'true'
        id: parse
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install pyyaml
          python3 scripts/ci/parse_model_config.py --config .github/config/model-tests/llama-cpp-model-tests.yml --image-config "${{ inputs.config-file }}"

  test-model-codebuild-fleet:
    name: test-model (${{ matrix.name }})
    if: ${{ needs.preflight.outputs.image-exists == 'true' && fromJson(needs.preflight.outputs.codebuild-fleet-matrix)[0] != null }}
    needs: [preflight]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.preflight.outputs.codebuild-fleet-matrix) }}
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:${{ matrix.fleet }}
        buildspec-override:true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: ECR authenticate
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ needs.preflight.outputs.aws-account-id }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Download model from S3
        uses: ./.github/actions/download-model
        id: model
        with:
          s3-path: ${{ matrix.s3_path }}
          model-name: ${{ matrix.name }}

      - name: Start container
        run: |
          docker pull ${{ needs.preflight.outputs.image-uri }}
          # CPU-only container (ARM64/Graviton) — no --gpus.
          CONTAINER_ID=$(docker run -d -it --entrypoint /bin/bash \
            --ipc=host --shm-size=10g \
            -v /dlc-models:/models \
            ${{ needs.preflight.outputs.image-uri }})
          echo "CONTAINER_ID=$CONTAINER_ID" >> $GITHUB_ENV

      - name: Copy test script into container
        run: |
          TEST_SCRIPT="${{ matrix.test_script || 'llama_cpp_model_smoke_test.sh' }}"
          docker cp "test/llama_cpp/scripts/${TEST_SCRIPT}" ${CONTAINER_ID}:/models/

      - name: Run model smoke test
        run: |
          TEST_SCRIPT="${{ matrix.test_script || 'llama_cpp_model_smoke_test.sh' }}"
          docker exec ${CONTAINER_ID} bash "/models/${TEST_SCRIPT}" \
            "/models/${{ matrix.name }}" \
            "${{ matrix.name }}" \
            ${{ matrix.extra_args }}

      - name: Cleanup
        if: always()
        run: |
          docker stop ${CONTAINER_ID} 2>/dev/null || true
          docker rm -f ${CONTAINER_ID} 2>/dev/null || true
