name: "Dispatch Release - TEI"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.discover.outputs.configs }}
    steps:
      - uses: actions/checkout@v6
      - id: discover
        uses: ./.github/actions/discover-configs
        with:
          pattern: ".github/config/image/tei/sagemaker-1.9.3-*.yml"

  pipeline:
    needs: [discover]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.configs) }}
    uses: ./.github/workflows/tei.pipeline.yml
    with:
      config-file: ${{ matrix.config_file }}
      tag-suffix: ${{ github.run_id }}
      build: true
      run-sanity-test: true
      run-security-test: true
      run-sagemaker-test: true
      release: true
    secrets: inherit
