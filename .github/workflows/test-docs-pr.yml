name: Test - Docs PR (step4)

# TEST ONLY — this workflow will never be merged to main.
# It isolates step4-docs-pr from reusable-release-image.yml
# so we can test the docs PR creation flow end-to-end.

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  test-docs-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Decode the GitHub App Private Key
        id: decode
        run: |
          private_key=$(echo "${{ secrets.ASIMOVBOT_APP_PRIVATE_KEY }}" | base64 -d | awk 'BEGIN {ORS="\\n"} {print}' | head -c -2) &> /dev/null
          echo "::add-mask::$private_key"
          echo "private-key=$private_key" >> "$GITHUB_OUTPUT"

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.ASIMOVBOT_APP_ID }}
          private-key: ${{ steps.decode.outputs.private-key }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Create docs PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # Hardcoded release spec for sglang 0.5.9 sagemaker
          cat > /tmp/release-spec.yml <<'EOF'
          framework: "sglang"
          version: "0.5.9"
          device_type: "gpu"
          python_version: "py312"
          cuda_version: "cu129"
          os_version: "ubuntu24.04"
          customer_type: "sagemaker"
          public_registry: true
          EOF

          bash scripts/autocurrency/docs-pr.sh /tmp/release-spec.yml
