name: "PR - vLLM-Omni EC2"

on:
  # TEMP: Enable after all frameworks are refactored
  workflow_dispatch:
  # pull_request:
  #   branches: [main]
  #   types: [opened, reopened, synchronize]
  #   paths:
  #     - ".github/config/image/vllm-omni/ec2-amzn2023.yml"
  #     - ".github/config/model-tests/vllm-omni-model-tests.yml"
  #     - "docker/vllm_omni/**"
  #     - "scripts/common/**"
  #     - "scripts/vllm/omni_*"
  #     - "test/vllm-omni/**"
  #     - "test/sanity/**"
  #     - "test/telemetry/**"
  #     - ".github/workflows/vllm-omni.pr-ec2.yml"
  #     - ".github/workflows/vllm-omni.pipeline.yml"
  #     - "!docs/**"

permissions:
  contents: read
  pull-requests: read

jobs:
  gatekeeper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1
      - uses: ./.github/actions/pr-permission-gate

  check-changes:
    needs: [gatekeeper]
    runs-on: ubuntu-latest
    outputs:
      build-change: ${{ steps.changes.outputs.build-change }}
      sanity-test-change: ${{ steps.changes.outputs.sanity-test-change }}
      telemetry-test-change: ${{ steps.changes.outputs.telemetry-test-change }}
      model-test-change: ${{ steps.changes.outputs.model-test-change }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            build-change:
              - ".github/config/image/vllm-omni/ec2-amzn2023.yml"
              - "docker/vllm_omni/Dockerfile.amzn2023"
              - "scripts/common/**"
              - "scripts/vllm/omni_*"
              - "test/vllm-omni/**"
            sanity-test-change:
              - "test/sanity/**"
            telemetry-test-change:
              - "test/telemetry/**"
            model-test-change:
              - ".github/config/model-tests/vllm-omni-model-tests.yml"
              - "test/vllm-omni/**"

  pipeline:
    needs: [check-changes]
    uses: ./.github/workflows/vllm-omni.pipeline.yml
    with:
      config-file: .github/config/image/vllm-omni/ec2-amzn2023.yml
      tag-suffix: pr-${{ github.event.pull_request.number }}
      build: ${{ needs.check-changes.outputs.build-change == 'true' }}
      run-sanity-test: ${{ needs.check-changes.outputs.build-change == 'true' || needs.check-changes.outputs.sanity-test-change == 'true' }}
      run-security-test: ${{ needs.check-changes.outputs.build-change == 'true' }}
      run-telemetry-test: ${{ needs.check-changes.outputs.build-change == 'true' || needs.check-changes.outputs.telemetry-test-change == 'true' }}
      run-model-test: ${{ needs.check-changes.outputs.build-change == 'true' || needs.check-changes.outputs.model-test-change == 'true' }}
      run-sagemaker-test: false
      release: false
    secrets: inherit
