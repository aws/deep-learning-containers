name: PR - Documentations  # Workflow name

on:
  pull_request:
    branches: [disabled-for-release-testing]  # Run only for this branch
    types: [opened, reopened, synchronize]   # Trigger on PR events
    paths:
      - "**docs**"  # Run only when docs-related files change

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_COLOR: "1"  # Enable colored logs

jobs:
  gatekeeper:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-gate-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1

      - name: Run permission gate
        uses: ./.github/actions/pr-permission-gate  # Custom permission check

  check-changes:
    needs: [gatekeeper]
    if: success()
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-check-changes-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    outputs:
      docs-change: ${{ steps.changes.outputs.docs-change }}  # Output flag

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run pre-commit checks
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files

      - name: Detect documentation changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs-change:
              - "docs/**"
              - "test/docs/**"
              - ".github/workflows/pr-docs*"

  documentation-test:
    needs: [check-changes]
    if: needs.check-changes.outputs.docs-change == 'true'  # Run only if docs changed
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    concurrency:
      group: ${{ github.workflow }}-docs-test-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install -r test/requirements.txt

      - name: Build documentation
        run: |
          source .venv/bin/activate
          uv pip install -r docs/requirements.txt
          mkdocs build

      - name: Run documentation tests
        run: |
          source .venv/bin/activate
          cd test/
          python3 -m pytest -vs -rA doc
