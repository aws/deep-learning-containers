name: Reusable PyTorch Multi-Node GPU Tests

on:
  workflow_call:
    inputs:
      config-file:
        description: "Path to image config YAML"
        required: true
        type: string
      image-uri:
        description: "Image URI to test. If empty, derives prod URI from config."
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  multi-node-test:
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-g6e12xl-runner
        buildspec-override:true
    steps:
      - uses: actions/checkout@v6

      - name: Resolve image URI
        id: image
        uses: ./.github/actions/resolve-image-uri
        with:
          image-uri: ${{ inputs.image-uri }}
          ci-aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
          prod-aws-account-id: ${{ vars.PROD_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          config-file: ${{ inputs.config-file }}

      - name: Check image exists
        id: check
        uses: ./.github/actions/check-image-exists
        with:
          image-uri: ${{ steps.image.outputs.image-uri }}

      - name: ECR login
        if: steps.check.outputs.exists == 'true'
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ steps.image.outputs.aws-account-id }}
          aws-region: ${{ vars.AWS_REGION }}
          image-uri: ${{ steps.image.outputs.image-uri }}

      - name: Setup Docker network
        if: steps.check.outputs.exists == 'true'
        run: docker network create testnet

      - name: Start node containers
        if: steps.check.outputs.exists == 'true'
        run: |
          IMAGE="${{ steps.image.outputs.image-uri }}"
          NODE0=$(docker run -d --rm --gpus '"device=0"' --shm-size=2g \
            --network=testnet --hostname=node0 --name=node0 \
            --entrypoint /bin/bash \
            -v $(pwd):/workdir --workdir /workdir \
            ${IMAGE} -c 'sleep infinity')
          NODE1=$(docker run -d --rm --gpus '"device=1"' --shm-size=2g \
            --network=testnet --hostname=node1 --name=node1 \
            --entrypoint /bin/bash \
            -v $(pwd):/workdir --workdir /workdir \
            ${IMAGE} -c 'sleep infinity')
          echo "NODE0=$NODE0" >> $GITHUB_ENV
          echo "NODE1=$NODE1" >> $GITHUB_ENV

      - name: Run DDP multi-node test
        if: steps.check.outputs.exists == 'true'
        run: |
          docker exec node0 torchrun --nnodes=2 --nproc_per_node=1 --node_rank=0 \
            --master_addr=node0 --master_port=29400 \
            /workdir/test/pytorch/multi_node/test_multinode_ddp.py &
          docker exec node1 torchrun --nnodes=2 --nproc_per_node=1 --node_rank=1 \
            --master_addr=node0 --master_port=29400 \
            /workdir/test/pytorch/multi_node/test_multinode_ddp.py &
          wait

      - name: Run NCCL all_reduce test
        if: steps.check.outputs.exists == 'true'
        run: |
          docker exec node0 torchrun --nnodes=2 --nproc_per_node=1 --node_rank=0 \
            --master_addr=node0 --master_port=29401 \
            /workdir/test/pytorch/multi_node/test_nccl_efa.py &
          docker exec node1 torchrun --nnodes=2 --nproc_per_node=1 --node_rank=1 \
            --master_addr=node0 --master_port=29401 \
            /workdir/test/pytorch/multi_node/test_nccl_efa.py &
          wait

      - name: Cleanup
        if: always()
        run: |
          docker kill node0 node1 2>/dev/null || true
          docker network rm testnet 2>/dev/null || true

      - name: Skip notice
        if: steps.check.outputs.exists != 'true'
        run: echo "Image not found in ECR — skipping tests (first release scenario)"
