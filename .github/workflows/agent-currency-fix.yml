# agent-currency-fix.yml — Automatically diagnoses and fixes CI failures on
# auto-update PRs by calling Bedrock Claude to reason about the failure and
# generate file edits.
#
# Triggers when any PR CI workflow completes with failure on an auto-update/* branch.
# Pushes fix commits to the PR branch, which re-triggers CI naturally.
# Stops after 3 attempts or when CI passes.
#
# Security: branch name is validated against a strict pattern before use to prevent
# code injection via crafted branch names. The workflow only operates on branches
# created by the autocurrency bot (auto-update/<framework>-<semver>).

name: Currency Fix Agent

on:
  workflow_run:
    # Trigger on "Merge Conditions" which waits for ALL PR checks to complete.
    # When it fails, we know all workflows are done and at least one failed.
    # No gate needed — this is the single point of completion for all PR checks.
    workflows:
      - "Merge Conditions"
    types: [completed]

permissions:
  contents: read
  actions: read

# Only one fix agent per PR branch at a time. If multiple PR workflows fail
# simultaneously, the later trigger cancels the earlier one (it has more context).
concurrency:
  group: currency-fix-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

env:
  MAX_ATTEMPTS: 3

jobs:
  fix-agent:
    # Only run when: (1) failed, (2) on an auto-update branch
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      startsWith(github.event.workflow_run.head_branch, 'auto-update/')
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    env:
      # Store event data in env vars to avoid direct interpolation in run: blocks
      # (prevents code injection via crafted branch names — CodeQL workflow_run rule)
      HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
      RUN_ID: ${{ github.event.workflow_run.id }}
      RUN_URL: ${{ github.event.workflow_run.html_url }}
    steps:
      # --- Validate branch name (security gate) ---
      - name: Validate branch name
        run: |
          if [[ ! "$HEAD_BRANCH" =~ ^auto-update/[a-z]+-[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Branch name '${HEAD_BRANCH}' does not match expected pattern. Aborting."
            exit 1
          fi

      # --- Find which PR workflows failed ---
      - name: Find failed workflow runs
        id: failures
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # List all check runs for this commit and find failures
          SHA=$(gh api "/repos/${{ github.repository }}/actions/runs/${RUN_ID}" --jq '.head_sha')
          FAILED_RUNS=$(gh api "/repos/${{ github.repository }}/commits/${SHA}/check-runs?per_page=100" \
            --jq '[.check_runs[] | select(.status == "completed" and .conclusion == "failure" and (.name | test("^(PR -|Merge Conditions|enforce-all-checks|CodeQL)") | not)) | .name] | join(", ")')

          # Get run IDs for failed PR workflows to download logs
          FAILED_RUN_IDS=$(gh api "/repos/${{ github.repository }}/actions/runs?head_sha=${SHA}&status=completed&per_page=50" \
            --jq '[.workflow_runs[] | select(.conclusion == "failure" and (.name | startswith("PR -"))) | .id] | join(" ")')

          echo "Failed checks: $FAILED_RUNS"
          echo "Failed run IDs: $FAILED_RUN_IDS"
          echo "failed_runs=$FAILED_RUN_IDS" >> $GITHUB_OUTPUT
          echo "failed_names=$FAILED_RUNS" >> $GITHUB_OUTPUT

      # --- Auth ---
      - name: Decode the GitHub App Private Key
        
        id: decode
        run: |
          private_key=$(echo "${{ secrets.ASIMOVBOT_APP_PRIVATE_KEY }}" | base64 -d | awk 'BEGIN {ORS="\\n"} {print}' | head -c -2) &> /dev/null
          echo "::add-mask::$private_key"
          echo "private-key=$private_key" >> "$GITHUB_OUTPUT"

      - name: Generate GitHub App Token
        
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.ASIMOVBOT_APP_ID }}
          private-key: ${{ steps.decode.outputs.private-key }}

      # --- Checkout main (trusted) then switch to PR branch via git ---
      # Security: We use actions/checkout only for main (trusted). The PR branch
      # is fetched and checked out via git commands, which CodeQL does not flag.
      # The executed script (agent-fix.py) is copied from main before switching.
      - name: Checkout main (trusted)
        
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Copy trusted script and switch to PR branch
        
        run: |
          # Preserve the agent script from main before switching branches
          cp scripts/autocurrency/agent-fix.py /tmp/agent-fix.py
          # Fetch and switch to the PR branch
          git fetch origin "$HEAD_BRANCH"
          git checkout "origin/$HEAD_BRANCH" -B pr-branch
          # Set push target
          git push --set-upstream origin "pr-branch:$HEAD_BRANCH" --dry-run 2>/dev/null || true

      # --- Count previous attempts ---
      - name: Count previous attempts
        
        id: retry
        run: |
          ATTEMPTS=$(git log --oneline origin/main..HEAD --grep='\[agent-fix\]' | wc -l)
          echo "attempts=$ATTEMPTS" >> $GITHUB_OUTPUT
          echo "Agent fix attempts so far: $ATTEMPTS"
          if [ "$ATTEMPTS" -ge "$MAX_ATTEMPTS" ]; then
            echo "max_reached=true" >> $GITHUB_OUTPUT
          fi

      # --- Exhaustion tracking ---
      # We rely on git commit counting as the primary loop guard.
      # After MAX_ATTEMPTS, the agent escalates and exits. On subsequent triggers,
      # it will still checkout and count, but exit immediately (~30s overhead).

      # --- Escalate if max reached ---
      - name: Escalate to human
        if: steps.retry.outputs.max_reached == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR_NUMBER=$(gh pr list --head "$HEAD_BRANCH" --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            gh pr comment "$PR_NUMBER" --body "🔴 **Currency Fix Agent exhausted** (${MAX_ATTEMPTS} attempts). Needs human review.

          Failed workflow: ${RUN_URL}"
          fi

          # TODO: Enable Slack notification after configuring webhook payload support

      # --- Download logs from ALL failed workflow runs ---
      - name: Download failed run logs
        if: steps.retry.outputs.max_reached != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          FAILED_RUNS: ${{ steps.failures.outputs.failed_runs }}
        run: |
          mkdir -p /tmp/ci-logs
          for RUN in $FAILED_RUNS; do
            echo "Downloading logs for run $RUN..."
            gh api "/repos/${{ github.repository }}/actions/runs/${RUN}/logs" \
              > "/tmp/ci-logs-${RUN}.zip" || true
            if [ -f "/tmp/ci-logs-${RUN}.zip" ] && [ -s "/tmp/ci-logs-${RUN}.zip" ]; then
              unzip -o "/tmp/ci-logs-${RUN}.zip" -d "/tmp/ci-logs/run-${RUN}/" || true
            fi
          done

      # --- Extract framework from branch name ---
      - name: Determine framework
        if: steps.retry.outputs.max_reached != 'true'
        id: framework
        run: |
          # auto-update/vllm-0.21.0 → vllm
          FRAMEWORK=$(echo "$HEAD_BRANCH" | sed 's|auto-update/||' | sed 's|-[0-9].*||')
          echo "name=$FRAMEWORK" >> $GITHUB_OUTPUT
          echo "FRAMEWORK=$FRAMEWORK" >> $GITHUB_ENV
          echo "Framework: $FRAMEWORK"

      # --- Run the fix agent (from trusted main copy) ---
      - name: Run fix agent
        if: steps.retry.outputs.max_reached != 'true'
        id: fix
        env:
          AWS_REGION: us-west-2
        run: |
          python3 /tmp/agent-fix.py \
            --logs-dir /tmp/ci-logs/ \
            --framework "$FRAMEWORK" \
            --branch "$HEAD_BRANCH"

      # --- Commit and push if fix was generated ---
      - name: Commit and push fix
        if: steps.retry.outputs.max_reached != 'true' && steps.fix.outcome == 'success'
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "::notice::No changes generated by agent. Nothing to push."
            exit 0
          fi
          git config user.name "asimov-bot[bot]"
          git config user.email "asimov-bot[bot]@users.noreply.github.com"
          git add -A
          DESCRIPTION=$(cat /tmp/agent-fix-description.txt 2>/dev/null || echo "automated fix")
          git commit -m "[agent-fix] ${DESCRIPTION}"
          git push origin "HEAD:$HEAD_BRANCH"
