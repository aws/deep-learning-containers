name: Reusable SGLang Upstream Tests

on:
  workflow_call:
    inputs:
      config-file:
        description: "Path to image config YAML"
        required: true
        type: string
      image-uri:
        description: "Image URI to test. If empty, derives prod URI from config."
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  upstream-test:
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-g6xl-runner
        buildspec-override:true
    steps:
      - uses: actions/checkout@v6

      - name: Resolve image URI
        id: image
        uses: ./.github/actions/resolve-image-uri
        with:
          image-uri: ${{ inputs.image-uri }}
          config-file: ${{ inputs.config-file }}

      - name: Check image exists
        id: check
        uses: ./.github/actions/check-image-exists
        with:
          image-uri: ${{ steps.image.outputs.image-uri }}

      - name: ECR login
        if: steps.check.outputs.exists == 'true'
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ steps.image.outputs.aws-account-id }}
          aws-region: ${{ vars.AWS_REGION }}
          image-uri: ${{ steps.image.outputs.image-uri }}

      - name: Parse config
        if: steps.check.outputs.exists == 'true'
        id: config
        run: |
          CONFIG_FILE="${{ inputs.config-file }}"
          echo "framework-version=$(yq '.metadata.framework_version' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "sglang-ref=$(yq '.build.sglang_ref' "$CONFIG_FILE")" >> $GITHUB_OUTPUT

      - name: Run upstream tests
        if: steps.check.outputs.exists == 'true'
        run: |
          echo "SGLANG UPSTREAM TEST placeholder"
          echo "  image-uri: ${{ steps.image.outputs.image-uri }}"
          echo "  framework-version: ${{ steps.config.outputs.framework-version }}"
          echo "  sglang-ref: ${{ steps.config.outputs.sglang-ref }}"

      - name: Skip notice
        if: steps.check.outputs.exists != 'true'
        run: echo "Image not found in ECR — skipping tests (first release scenario)"
