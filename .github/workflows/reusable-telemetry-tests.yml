name: Reusable Telemetry Tests

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      image-uri:
        description: 'Image URI to test'
        required: true
        type: string
      aws-account-id:
        description: 'AWS account ID for ECR authentication'
        required: true
        type: string
      aws-region:
        description: 'AWS region for ECR authentication'
        required: true
        type: string
      framework:
        description: 'Framework name (e.g., vllm, sglang, pytorch)'
        required: true
        type: string
      framework-version:
        description: 'Framework version (e.g., 0.15.1, 0.5.8)'
        required: true
        type: string
      container-type:
        description: 'Container/job type (e.g., general, training, inference)'
        required: true
        type: string
jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      image-exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v5
      - name: Check image exists
        id: check
        uses: ./.github/actions/check-image-exists
        with:
          image-uri: ${{ inputs.image-uri }}

  telemetry-environment:
    needs: preflight
    if: needs.preflight.outputs.image-exists == 'true'
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v5

      - name: Container pull
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ inputs.aws-account-id }}
          aws-region: ${{ inputs.aws-region }}
          image-uri: ${{ inputs.image-uri }}

      - name: Start container
        run: |
          CONTAINER_ID=$(docker run -d -it --rm --entrypoint /bin/bash \
            -v $(pwd):/workdir --workdir /workdir \
            ${{ inputs.image-uri }})
          echo "CONTAINER_ID=$CONTAINER_ID" >> $GITHUB_ENV

      - name: Check telemetry environment
        run: |
          docker exec ${CONTAINER_ID} test -f /usr/local/bin/deep_learning_container.py
          docker exec ${CONTAINER_ID} test -f /usr/local/bin/bash_telemetry.sh
          docker exec ${CONTAINER_ID} bash -c '! grep -q "{{" /usr/local/bin/bash_telemetry.sh'
          docker exec ${CONTAINER_ID} bash -c "grep -q 'bash_telemetry.sh' /etc/bash.bashrc 2>/dev/null || grep -q 'bash_telemetry.sh' /etc/bashrc"
          ACTUAL=$(docker exec ${CONTAINER_ID} printenv DLC_CONTAINER_TYPE)
          if [ "$ACTUAL" != "${{ inputs.container-type }}" ]; then
            echo "DLC_CONTAINER_TYPE expected '${{ inputs.container-type }}' but got '$ACTUAL'"
            exit 1
          fi

  telemetry-instance:
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v5

      - name: Setup for test dependencies on host machine
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install -r test/requirements.txt
          uv pip install -r test/telemetry/requirements.txt

      - name: Run instance telemetry tests
        run: |
          source .venv/bin/activate
          # PYTHONPATH=$(pwd)/test:$(pwd)/scripts/telemetry:$PYTHONPATH pytest test/telemetry/test_telemetry.py -v \
          cd test/
          PYTHONPATH=$(pwd)/../scripts/telemetry:$PYTHONPATH pytest -vs -rA telemetry \
            --image-uri "${{ inputs.image-uri }}" \
            --framework "${{ inputs.framework }}" \
            --framework-version "${{ inputs.framework-version }}" \
            --container-type "${{ inputs.container-type }}" \
            --region "${{ inputs.aws-region }}"
