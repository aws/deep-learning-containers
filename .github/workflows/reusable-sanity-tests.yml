name: Reusable Sanity Tests

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      image-uri:
        description: 'Image URI to test'
        required: true
        type: string
      aws-account-id:
        description: 'AWS account ID for ECR authentication'
        required: true
        type: string
      aws-region:
        description: 'AWS region for ECR authentication'
        required: true
        type: string
      framework:
        description: 'Framework name (e.g., vllm, sglang, pytorch, tensorflow, base)'
        required: true
        type: string
      framework-version:
        description: 'Framework version (e.g., 0.15.1, 0.5.8)'
        required: true
        type: string
      python-version:
        description: 'Python version in pyXYZ format (e.g., py312)'
        required: true
        type: string
      os-version:
        description: 'OS version (e.g., ubuntu22.04, ubuntu24.04)'
        required: true
        type: string
      cuda-version:
        description: 'CUDA version in cuXYZ format (e.g., cu129). Empty for CPU images.'
        required: false
        type: string
        default: ''

jobs:
  filesystem-checks:
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v5

      - name: Container pull
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ inputs.aws-account-id }}
          aws-region: ${{ inputs.aws-region }}
          image-uri: ${{ inputs.image-uri }}

      - name: Check for stray .py artifacts
        run: |
          docker run --rm -v $(pwd)/test/sanity/scripts:/sanity --entrypoint bash \
            ${{ inputs.image-uri }} /sanity/check_stray_artifacts.sh

      - name: Check /tmp and /var/tmp are clean
        run: |
          docker run --rm -v $(pwd)/test/sanity/scripts:/sanity --entrypoint bash \
            ${{ inputs.image-uri }} /sanity/check_tmp_clean.sh

      - name: Check cache dir is clean
        run: |
          docker run --rm -v $(pwd)/test/sanity/scripts:/sanity --entrypoint bash \
            ${{ inputs.image-uri }} /sanity/check_cache_clean.sh

      - name: Check no viminfo or bash history
        run: |
          docker run --rm -v $(pwd)/test/sanity/scripts:/sanity --entrypoint bash \
            ${{ inputs.image-uri }} /sanity/check_no_history.sh

      - name: Check no conda packages from repo.anaconda.com
        run: |
          docker run --rm -v $(pwd)/test/sanity/scripts:/sanity --entrypoint bash \
            ${{ inputs.image-uri }} /sanity/check_anaconda.sh

  version-checks:
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v5

      - name: Container pull
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ inputs.aws-account-id }}
          aws-region: ${{ inputs.aws-region }}
          image-uri: ${{ inputs.image-uri }}

      - name: Check Python version
        run: |
          docker run --rm -v $(pwd)/test/sanity/scripts:/sanity --entrypoint bash \
            ${{ inputs.image-uri }} /sanity/check_python_version.sh "${{ inputs.python-version }}"

      - name: Check OS version
        run: |
          docker run --rm -v $(pwd)/test/sanity/scripts:/sanity --entrypoint bash \
            ${{ inputs.image-uri }} /sanity/check_os_version.sh "${{ inputs.os-version }}"

      - name: Check framework version
        if: inputs.framework != 'base'
        run: |
          docker run --rm -v $(pwd)/test/sanity/scripts:/sanity --entrypoint bash \
            ${{ inputs.image-uri }} /sanity/check_framework_version.sh \
              "${{ inputs.framework }}" "${{ inputs.framework-version }}"

  package-compatibility-checks:
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v5

      - name: Container pull
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ inputs.aws-account-id }}
          aws-region: ${{ inputs.aws-region }}
          image-uri: ${{ inputs.image-uri }}

      - name: Run pip check
        run: |
          docker run --rm -v $(pwd):/workdir --workdir /workdir --entrypoint python3 \
            ${{ inputs.image-uri }} test/sanity/scripts/pip_check.py \
              --image-uri "${{ inputs.image-uri }}" \
              --allowlist-dir test/data/allowlists

  oss-compliance:
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v5

      - name: Container pull
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ inputs.aws-account-id }}
          aws-region: ${{ inputs.aws-region }}
          image-uri: ${{ inputs.image-uri }}

      - name: Start container
        run: |
          CONTAINER_ID=$(docker run -d -it --rm --entrypoint /bin/bash \
            ${{ inputs.image-uri }})
          echo "CONTAINER_ID=$CONTAINER_ID" >> $GITHUB_ENV

      - name: Run OSS compliance check
        run: |
          docker exec ${CONTAINER_ID} /usr/local/bin/testOSSCompliance /root

      - name: Copy OSS compliance artifacts
        run: |
          docker cp ${CONTAINER_ID}:/root/THIRD_PARTY_SOURCE_CODE_URLS ./THIRD_PARTY_SOURCE_CODE_URLS 2>/dev/null || true

      - name: Upload OSS compliance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oss-compliance-${{ github.run_id }}
          path: THIRD_PARTY_SOURCE_CODE_URLS
          if-no-files-found: ignore

  label-checks:
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v5

      - name: Container pull
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ inputs.aws-account-id }}
          aws-region: ${{ inputs.aws-region }}
          image-uri: ${{ inputs.image-uri }}

      - name: Check container labels
        run: |
          python3 test/sanity/scripts/check_labels.py ${{ inputs.image-uri }}

      - name: Check license file exists
        run: |
          docker run --rm --entrypoint bash ${{ inputs.image-uri }} -c \
            'test -f /license.txt && echo "License file exists" || (echo "WARNING: /license.txt not found" && exit 1)'

  cuda-version-check:
    if: inputs.cuda-version != ''
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-g6xl-runner
        buildspec-override:true
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v5

      - name: Container pull
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ inputs.aws-account-id }}
          aws-region: ${{ inputs.aws-region }}
          image-uri: ${{ inputs.image-uri }}

      - name: Check CUDA version
        run: |
          docker run --rm --gpus=all \
            -v $(pwd)/test/sanity/scripts:/sanity --entrypoint bash \
            ${{ inputs.image-uri }} /sanity/check_cuda.sh "${{ inputs.cuda-version }}"
