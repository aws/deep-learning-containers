name: PR - SGLang SageMaker

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - "**sglang**"
      - "!docs/**"

permissions:
  contents: read
  pull-requests: read

env:
  # CI environment configuration
  FORCE_COLOR: "1"
  TEST_ARTIFACTS_DIRECTORY: "/test_artifacts/sglang"

  # Config file path
  CONFIG_FILE: ".github/config/sglang-sagemaker.yml"

jobs:
  gatekeeper:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-gate-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout base branch (safe)
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1

      - name: Run permission gate (from base)
        uses: ./.github/actions/pr-permission-gate

  load-config:
    needs: [gatekeeper]
    if: success()
    runs-on: ubuntu-latest
    outputs:
      config: ${{ steps.load.outputs.config }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Load configuration
        id: load
        uses: ./.github/actions/load-config
        with:
          config-file: ${{ env.CONFIG_FILE }}

  parse-config:
    needs: [load-config]
    if: success()
    runs-on: ubuntu-latest
    outputs:
      framework: ${{ steps.parse.outputs.framework }}
      framework-version: ${{ steps.parse.outputs.framework-version }}
      python-version: ${{ steps.parse.outputs.python-version }}
      cuda-version: ${{ steps.parse.outputs.cuda-version }}
      os-version: ${{ steps.parse.outputs.os-version }}
      container-type: ${{ steps.parse.outputs.container-type }}
      device-type: ${{ steps.parse.outputs.device-type }}
      arch-type: ${{ steps.parse.outputs.arch-type }}
      contributor: ${{ steps.parse.outputs.contributor }}
      customer-type: ${{ steps.parse.outputs.customer-type }}
      prod-image: ${{ steps.parse.outputs.prod-image }}
    steps:
      - name: Parse configuration
        id: parse
        run: |
          echo '${{ needs.load-config.outputs.config }}' > config.json
          echo "framework=$(jq -r '.common.framework' config.json)" >> $GITHUB_OUTPUT
          echo "framework-version=$(jq -r '.common.framework_version' config.json)" >> $GITHUB_OUTPUT
          echo "python-version=$(jq -r '.common.python_version' config.json)" >> $GITHUB_OUTPUT
          echo "cuda-version=$(jq -r '.common.cuda_version' config.json)" >> $GITHUB_OUTPUT
          echo "os-version=$(jq -r '.common.os_version' config.json)" >> $GITHUB_OUTPUT
          echo "container-type=$(jq -r '.common.job_type' config.json)" >> $GITHUB_OUTPUT
          echo "device-type=$(jq -r '.common.device_type // "gpu"' config.json)" >> $GITHUB_OUTPUT
          echo "arch-type=$(jq -r '.common.arch_type // "x86"' config.json)" >> $GITHUB_OUTPUT
          echo "contributor=$(jq -r '.common.contributor // "None"' config.json)" >> $GITHUB_OUTPUT
          echo "customer-type=$(jq -r '.common.customer_type // ""' config.json)" >> $GITHUB_OUTPUT
          echo "prod-image=$(jq -r '.common.prod_image' config.json)" >> $GITHUB_OUTPUT

  check-changes:
    needs: [load-config, parse-config]
    if: success()
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-check-changes-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    outputs:
      build-change: ${{ steps.changes.outputs.build-change }}
      test-change: ${{ steps.changes.outputs.test-change }}
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v5

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files

      - name: Detect file changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            build-change:
              - "docker/sglang/**"
              - "scripts/sglang/**"
              - "scripts/common/**"
              - "scripts/telemetry/**"
              - ".github/workflows/pr-sglang*"
            test-change:
              - "test/sanity/**"
              - "test/sglang/**"

  build-sagemaker-image:
    needs: [check-changes, parse-config]
    if: needs.check-changes.outputs.build-change == 'true'
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-build-runner
        buildspec-override:true
    concurrency:
      group: ${{ github.workflow }}-build-sagemaker-image-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    outputs:
      ci-image: ${{ steps.build.outputs.image-uri }}
    steps:
      - uses: actions/checkout@v5

      - name: Build image
        id: build
        uses: ./.github/actions/build-image
        with:
          framework: ${{ needs.parse-config.outputs.framework }}
          target: sglang-sagemaker
          base-image: lmsysorg/sglang:v${{ needs.parse-config.outputs.framework-version }}-${{ needs.parse-config.outputs.cuda-version }}-amd64
          framework-version: ${{ needs.parse-config.outputs.framework-version }}
          container-type: ${{ needs.parse-config.outputs.container-type }}
          aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          tag-pr: ${{ needs.parse-config.outputs.framework }}-${{ needs.parse-config.outputs.framework-version }}-gpu-${{ needs.parse-config.outputs.python-version }}-${{ needs.parse-config.outputs.cuda-version }}-${{ needs.parse-config.outputs.os-version }}-sagemaker-pr-${{ github.event.pull_request.number }}
          dockerfile-path: docker/${{ needs.parse-config.outputs.framework }}/Dockerfile
          arch-type: ${{ needs.parse-config.outputs.arch-type }}
          device-type: ${{ needs.parse-config.outputs.device-type }}
          cuda-version: ${{ needs.parse-config.outputs.cuda-version }}
          python-version: ${{ needs.parse-config.outputs.python-version }}
          os-version: ${{ needs.parse-config.outputs.os-version }}
          contributor: ${{ needs.parse-config.outputs.contributor }}
          customer-type: ${{ needs.parse-config.outputs.customer-type }}

  sagemaker-sanity-test:
    needs: [check-changes, build-sagemaker-image, parse-config]
    if: |
      always() && !failure() && !cancelled() &&
      (needs.check-changes.outputs.build-change == 'true' || needs.check-changes.outputs.test-change == 'true')
    concurrency:
      group: ${{ github.workflow }}-sagemaker-sanity-test-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    uses: ./.github/workflows/reusable-sanity-tests.yml
    with:
      image-uri: ${{ needs.build-sagemaker-image.result == 'success' && needs.build-sagemaker-image.outputs.ci-image || format('{0}.dkr.ecr.{1}.amazonaws.com/{2}', vars.PROD_AWS_ACCOUNT_ID, vars.AWS_REGION, needs.parse-config.outputs.prod-image) }}
      aws-account-id: ${{ needs.build-sagemaker-image.result == 'success' && vars.CI_AWS_ACCOUNT_ID || vars.PROD_AWS_ACCOUNT_ID }}
      aws-region: ${{ vars.AWS_REGION }}
      framework: ${{ needs.parse-config.outputs.framework }}
      framework-version: ${{ needs.parse-config.outputs.framework-version }}
      python-version: ${{ needs.parse-config.outputs.python-version }}
      cuda-version: ${{ needs.parse-config.outputs.cuda-version }}
      os-version: ${{ needs.parse-config.outputs.os-version }}

  sagemaker-local-benchmark-test:
    needs: [check-changes, build-sagemaker-image, parse-config]
    if: |
      always() && !failure() && !cancelled() &&
      (needs.check-changes.outputs.build-change == 'true' || needs.check-changes.outputs.test-change == 'true')
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-g6xl-runner
        buildspec-override:true
    concurrency:
      group: ${{ github.workflow }}-sagemaker-local-benchmark-test-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v5

      - name: Container pull
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ needs.build-sagemaker-image.result == 'success' && vars.CI_AWS_ACCOUNT_ID || vars.PROD_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          image-uri: ${{ needs.build-sagemaker-image.result == 'success' && needs.build-sagemaker-image.outputs.ci-image || format('{0}.dkr.ecr.{1}.amazonaws.com/{2}', vars.PROD_AWS_ACCOUNT_ID, vars.AWS_REGION, needs.parse-config.outputs.prod-image) }}

      - name: Setup for SGLang datasets
        run: |
          mkdir -p ${TEST_ARTIFACTS_DIRECTORY}/dataset
          if [ ! -f ${TEST_ARTIFACTS_DIRECTORY}/dataset/ShareGPT_V3_unfiltered_cleaned_split.json ]; then
              echo "Downloading ShareGPT dataset..."
              wget -P ${TEST_ARTIFACTS_DIRECTORY}/dataset https://huggingface.co/datasets/anon8231489123/ShareGPT_Vicuna_unfiltered/resolve/main/ShareGPT_V3_unfiltered_cleaned_split.json
          else
              echo "ShareGPT dataset already exists. Skipping download."
          fi

      - name: Start container
        run: |
          CONTAINER_ID=$(docker run -d -it --rm --gpus=all \
            -v ${HOME}/.cache/huggingface:/root/.cache/huggingface \
            -v ${TEST_ARTIFACTS_DIRECTORY}/dataset:/dataset \
            -p 30000:30000 \
            -e SM_SGLANG_MODEL_PATH=Qwen/Qwen3-0.6B \
            -e SM_SGLANG_REASONING_PARSER=qwen3 \
            -e SM_SGLANG_HOST=127.0.0.1 \
            -e SM_SGLANG_PORT=30000 \
            -e HF_TOKEN=${{ secrets.HUGGING_FACE_HUB_TOKEN }} \
            ${{ needs.build-sagemaker-image.result == 'success' && needs.build-sagemaker-image.outputs.ci-image || format('{0}.dkr.ecr.{1}.amazonaws.com/{2}', vars.PROD_AWS_ACCOUNT_ID, vars.AWS_REGION, needs.parse-config.outputs.prod-image) }})
          echo "CONTAINER_ID=${CONTAINER_ID}" >> ${GITHUB_ENV}
          echo "Waiting for serving endpoint startup ..."
          sleep 120s
          docker logs ${CONTAINER_ID}

      - name: Run SGLang tests
        run: |
          docker exec ${CONTAINER_ID} python3 -m sglang.bench_serving \
          --backend sglang \
          --host 127.0.0.1 --port 30000 \
          --num-prompts 1000 \
          --model Qwen/Qwen3-0.6B \
          --dataset-name sharegpt \
          --dataset-path /dataset/ShareGPT_V3_unfiltered_cleaned_split.json

  sagemaker-upstream-test:
    needs: [check-changes, build-sagemaker-image, parse-config]
    if: |
      always() && !failure() && !cancelled() &&
      (needs.check-changes.outputs.build-change == 'true' || needs.check-changes.outputs.test-change == 'true')
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-g6exl-runner
        buildspec-override:true
    concurrency:
      group: ${{ github.workflow }}-sagemaker-upstream-test-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v5

      - name: Container pull
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ needs.build-sagemaker-image.result == 'success' && vars.CI_AWS_ACCOUNT_ID || vars.PROD_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          image-uri: ${{ needs.build-sagemaker-image.result == 'success' && needs.build-sagemaker-image.outputs.ci-image || format('{0}.dkr.ecr.{1}.amazonaws.com/{2}', vars.PROD_AWS_ACCOUNT_ID, vars.AWS_REGION, needs.parse-config.outputs.prod-image) }}

      - name: Checkout SGLang tests
        uses: actions/checkout@v5
        with:
          repository: sgl-project/sglang
          ref: v${{ needs.parse-config.outputs.framework-version }}
          path: sglang_source

      - name: Start container
        run: |
          CONTAINER_ID=$(docker run -d -it --rm --gpus=all --entrypoint /bin/bash \
            -v ${HOME}/.cache/huggingface:/root/.cache/huggingface \
            -v ./sglang_source:/workdir --workdir /workdir \
            -e HF_TOKEN=${{ secrets.HUGGING_FACE_HUB_TOKEN }} \
            ${{ needs.build-sagemaker-image.result == 'success' && needs.build-sagemaker-image.outputs.ci-image || format('{0}.dkr.ecr.{1}.amazonaws.com/{2}', vars.PROD_AWS_ACCOUNT_ID, vars.AWS_REGION, needs.parse-config.outputs.prod-image) }})
          echo "CONTAINER_ID=${CONTAINER_ID}" >> ${GITHUB_ENV}

      - name: Setup for SGLang tests
        run: |
          docker exec ${CONTAINER_ID} sh -c '
            set -eux
            # https://github.com/sgl-project/sglang/blob/v0.5.7/scripts/ci/ci_install_dependency.sh#L78C8-L80
            # our CI suffers the same issue
            export IS_BLACKWELL=1

            bash scripts/ci/cuda/ci_install_dependency.sh
          '

      - name: Run SGLang tests
        run: |
          docker exec ${CONTAINER_ID} sh -c '
            set -eux
            nvidia-smi

            # SRT backend Test with increased timeout
            cd /workdir/test
            export SGLANG_TIMEOUT=600
            python3 run_suite.py --hw cuda --suite stage-a-test-1
          '

  sagemaker-endpoint-test:
    needs: [check-changes, build-sagemaker-image, parse-config]
    if: |
      always() && !failure() && !cancelled() &&
      (needs.check-changes.outputs.build-change == 'true' || needs.check-changes.outputs.test-change == 'true')
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    concurrency:
      group: ${{ github.workflow }}-sagemaker-endpoint-test-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v5

      - name: Install test dependencies
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install -r test/requirements.txt
          uv pip install -r test/sglang/sagemaker/requirements.txt

      - name: Run sagemaker tests
        run: |
          source .venv/bin/activate
          cd test/
          python3 -m pytest -vs -rA --image-uri ${{ needs.build-sagemaker-image.result == 'success' && needs.build-sagemaker-image.outputs.ci-image || format('{0}.dkr.ecr.{1}.amazonaws.com/{2}', vars.PROD_AWS_ACCOUNT_ID, vars.AWS_REGION, needs.parse-config.outputs.prod-image) }} sglang/sagemaker
