name: Reusable vLLM Upstream Tests

on:
  workflow_call:
    inputs:
      config-file:
        description: "Path to image config YAML"
        required: true
        type: string
      image-uri:
        description: "Image URI to test. If empty, derives prod URI from config."
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  preflight:
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    outputs:
      image-uri: ${{ steps.image.outputs.image-uri }}
      aws-account-id: ${{ steps.image.outputs.aws-account-id }}
      image-exists: ${{ steps.check.outputs.exists }}
      framework-version: ${{ steps.parse.outputs.framework-version }}
      vllm-ref: ${{ steps.parse.outputs.vllm-ref }}
      customer-type: ${{ steps.parse.outputs.customer-type }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve image URI
        id: image
        uses: ./.github/actions/resolve-image-uri
        with:
          image-uri: ${{ inputs.image-uri }}
          ci-aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
          prod-aws-account-id: ${{ vars.PROD_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          config-file: ${{ inputs.config-file }}

      - name: Check image exists
        id: check
        uses: ./.github/actions/check-image-exists
        with:
          image-uri: ${{ steps.image.outputs.image-uri }}

      - name: Parse config
        if: steps.check.outputs.exists == 'true'
        id: parse
        run: |
          CONFIG_FILE="${{ inputs.config-file }}"
          echo "framework-version=$(yq '.metadata.framework_version' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "vllm-ref=$(yq '.build.vllm_ref // ""' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "customer-type=$(yq '.metadata.customer_type' "$CONFIG_FILE")" >> $GITHUB_OUTPUT

  regression-test:
    if: ${{ needs.preflight.outputs.image-exists == 'true' }}
    needs: [preflight]
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-g6xl-runner
        buildspec-override:true
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v6

      - name: Free /tmp from stale test leftovers
        run: |
          df -h /tmp
          find /tmp -mindepth 1 -maxdepth 1 \
            \( -name 'ray-ec2-*' -o -name 'agent-log' -o -name 'mcetmp*' -o -name 'ray_test_images' \) \
            -exec rm -rf {} + 2>/dev/null || true
          df -h /tmp

      - name: ECR login
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ needs.preflight.outputs.aws-account-id }}
          aws-region: ${{ vars.AWS_REGION }}
          image-uri: ${{ needs.preflight.outputs.image-uri }}

      - name: Checkout vLLM tests
        uses: actions/checkout@v6
        with:
          repository: vllm-project/vllm
          ref: ${{ needs.preflight.outputs.vllm-ref != '' && needs.preflight.outputs.vllm-ref || format('v{0}', needs.preflight.outputs.framework-version) }}
          path: vllm_source
          sparse-checkout: |
            tests
            examples
            requirements
            vllm

      - name: Start container
        run: |
          CONTAINER_ID=$(docker run -d -it --rm --gpus=all --entrypoint /bin/bash \
            -v ${HOME}/.cache/huggingface:/root/.cache/huggingface \
            -v ${HOME}/.cache/vllm:/root/.cache/vllm \
            -v .:/workdir --workdir /workdir \
            -e HF_TOKEN=${{ secrets.HUGGING_FACE_HUB_TOKEN }} \
            ${{ needs.preflight.outputs.image-uri }})
          echo "CONTAINER_ID=$CONTAINER_ID" >> $GITHUB_ENV

      - name: Setup for vLLM tests
        run: |
          docker exec ${CONTAINER_ID} test/vllm/scripts/vllm_test_setup.sh

      - name: Run vLLM regression tests
        run: |
          docker exec ${CONTAINER_ID} test/vllm/scripts/vllm_regression_test.sh

  cuda-test:
    if: ${{ needs.preflight.outputs.image-exists == 'true' }}
    needs: [preflight]
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-g6xl-runner
        buildspec-override:true
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v6

      - name: Free /tmp from stale test leftovers
        run: |
          df -h /tmp
          find /tmp -mindepth 1 -maxdepth 1 \
            \( -name 'ray-ec2-*' -o -name 'agent-log' -o -name 'mcetmp*' -o -name 'ray_test_images' \) \
            -exec rm -rf {} + 2>/dev/null || true
          df -h /tmp

      - name: ECR login
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ needs.preflight.outputs.aws-account-id }}
          aws-region: ${{ vars.AWS_REGION }}
          image-uri: ${{ needs.preflight.outputs.image-uri }}

      - name: Checkout vLLM tests
        uses: actions/checkout@v6
        with:
          repository: vllm-project/vllm
          ref: ${{ needs.preflight.outputs.vllm-ref != '' && needs.preflight.outputs.vllm-ref || format('v{0}', needs.preflight.outputs.framework-version) }}
          path: vllm_source
          sparse-checkout: |
            tests
            examples
            requirements
            vllm

      - name: Start container
        run: |
          CONTAINER_ID=$(docker run -d -it --rm --gpus=all --entrypoint /bin/bash \
            -v ${HOME}/.cache/huggingface:/root/.cache/huggingface \
            -v ${HOME}/.cache/vllm:/root/.cache/vllm \
            -v .:/workdir --workdir /workdir \
            -e HF_TOKEN=${{ secrets.HUGGING_FACE_HUB_TOKEN }} \
            ${{ needs.preflight.outputs.image-uri }})
          echo "CONTAINER_ID=$CONTAINER_ID" >> $GITHUB_ENV

      - name: Setup for vLLM tests
        run: |
          docker exec ${CONTAINER_ID} test/vllm/scripts/vllm_test_setup.sh

      - name: Run vLLM CUDA tests
        run: |
          docker exec ${CONTAINER_ID} test/vllm/scripts/vllm_cuda_test.sh

  example-test:
    if: ${{ needs.preflight.outputs.image-exists == 'true' }}
    needs: [preflight]
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-g6xl-runner
        buildspec-override:true
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v6

      - name: Free /tmp from stale test leftovers
        run: |
          df -h /tmp
          find /tmp -mindepth 1 -maxdepth 1 \
            \( -name 'ray-ec2-*' -o -name 'agent-log' -o -name 'mcetmp*' -o -name 'ray_test_images' \) \
            -exec rm -rf {} + 2>/dev/null || true
          df -h /tmp

      - name: ECR login
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ needs.preflight.outputs.aws-account-id }}
          aws-region: ${{ vars.AWS_REGION }}
          image-uri: ${{ needs.preflight.outputs.image-uri }}

      - name: Checkout vLLM tests
        uses: actions/checkout@v6
        with:
          repository: vllm-project/vllm
          ref: ${{ needs.preflight.outputs.vllm-ref != '' && needs.preflight.outputs.vllm-ref || format('v{0}', needs.preflight.outputs.framework-version) }}
          path: vllm_source
          sparse-checkout: |
            tests
            examples
            requirements
            vllm

      - name: Start container
        run: |
          CONTAINER_ID=$(docker run -d -it --rm --gpus=all --entrypoint /bin/bash \
            -v ${HOME}/.cache/huggingface:/root/.cache/huggingface \
            -v ${HOME}/.cache/vllm:/root/.cache/vllm \
            -v .:/workdir --workdir /workdir \
            -e HF_TOKEN=${{ secrets.HUGGING_FACE_HUB_TOKEN }} \
            ${{ needs.preflight.outputs.image-uri }})
          echo "CONTAINER_ID=$CONTAINER_ID" >> $GITHUB_ENV

      - name: Setup for vLLM tests
        run: |
          docker exec ${CONTAINER_ID} test/vllm/scripts/vllm_test_setup.sh

      - name: Run vLLM example tests
        run: |
          CUSTOMER_TYPE="${{ needs.preflight.outputs.customer-type }}"
          if [ "$CUSTOMER_TYPE" = "sagemaker" ]; then
            docker exec ${CONTAINER_ID} test/vllm/scripts/amzn2023/vllm_sagemaker_examples_test.sh
          else
            docker exec ${CONTAINER_ID} test/vllm/scripts/amzn2023/vllm_ec2_examples_test.sh
          fi
