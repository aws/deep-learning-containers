name: XGBoost SageMaker Integration Tests

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      image-uri:
        description: 'Image URI to test'
        required: true
        type: string
      aws-account-id:
        description: 'AWS account ID for ECR authentication'
        required: true
        type: string
      aws-region:
        description: 'AWS region for ECR authentication'
        required: true
        type: string

env:
  FORCE_COLOR: "1"

jobs:
  # ===========================================================================
  # Container tests
  # ===========================================================================
  generate-models:
    timeout-minutes: 15
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install xgboost==3.0.5 boto3 numpy

      - name: Generate and upload models
        run: |
          source .venv/bin/activate
          python3 test/xgboost/container/generate_models.py

  container-test-training:
    timeout-minutes: 90
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-g6xl-runner
        buildspec-override:true
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v6

      - name: ECR login
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ inputs.aws-account-id }}
          aws-region: ${{ inputs.aws-region }}
          image-uri: ${{ inputs.image-uri }}

      - name: Pull image
        run: docker pull ${{ inputs.image-uri }}

      - name: Install test dependencies
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install -r test/requirements.txt docker pytest boto3 requests

      - name: Run training container tests
        run: |
          source .venv/bin/activate
          cd test/
          python3 -m pytest -v --tb=short -rA --log-cli-level=INFO \
            --image ${{ inputs.image-uri }} \
            xgboost/container/test_training.py

  container-test-scoring:
    needs: [generate-models]
    timeout-minutes: 60
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-g6xl-runner
        buildspec-override:true
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v6

      - name: ECR login
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ inputs.aws-account-id }}
          aws-region: ${{ inputs.aws-region }}
          image-uri: ${{ inputs.image-uri }}

      - name: Pull image
        run: docker pull ${{ inputs.image-uri }}

      - name: Install test dependencies
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install -r test/requirements.txt docker pytest boto3 requests

      - name: Run scoring container tests
        run: |
          source .venv/bin/activate
          cd test/
          python3 -m pytest -v --tb=short -rA --log-cli-level=INFO \
            --image ${{ inputs.image-uri }} \
            xgboost/container/test_scoring.py

  container-test-batch-transform:
    needs: [generate-models]
    timeout-minutes: 60
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-g6xl-runner
        buildspec-override:true
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v6

      - name: ECR login
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ inputs.aws-account-id }}
          aws-region: ${{ inputs.aws-region }}
          image-uri: ${{ inputs.image-uri }}

      - name: Pull image
        run: docker pull ${{ inputs.image-uri }}

      - name: Install test dependencies
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install -r test/requirements.txt docker pytest boto3 requests

      - name: Run batch transform container tests
        run: |
          source .venv/bin/activate
          cd test/
          python3 -m pytest -v --tb=short -rA --log-cli-level=INFO \
            --image ${{ inputs.image-uri }} \
            xgboost/container/test_batch_transform.py

  # ===========================================================================
  # E2E tests — SageMaker training/inference/transform jobs
  # ===========================================================================
  e2e-test:
    needs: [container-test-training, container-test-scoring, container-test-batch-transform]
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        test-module:
          - test_training_libsvm
          - test_training_csv
          - test_training_pb
          - test_training_pq
          - test_e2e
          - test_e2e_selectable
          - test_inference
          - test_inference_mme
          - test_transform
          - test_hpo
          - test_script_mode_e2e
          - test_network_isolation
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v6

      - name: Install test dependencies
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install -r test/requirements.txt
          uv pip install -r test/xgboost/requirements.txt

      - name: Run ${{ matrix.test-module }}
        run: |
          source .venv/bin/activate
          cd test/
          python3 -m pytest -v --tb=short -rA --log-cli-level=INFO \
            --image-uri ${{ inputs.image-uri }} \
            xgboost/e2e/${{ matrix.test-module }}.py

  # ===========================================================================
  # Benchmark tests
  # ===========================================================================
  benchmark-test:
    needs: [e2e-test]
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        test-module:
          - test_training_objective
          - test_training_tree_method
          - test_training_max_depth
          - test_training_num_round
          - test_training_data_size
          - test_training_instance_type
          - test_training_content_type
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v6

      - name: Install test dependencies
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install -r test/requirements.txt
          uv pip install -r test/xgboost/requirements.txt

      - name: Run ${{ matrix.test-module }}
        run: |
          source .venv/bin/activate
          cd test/
          python3 -m pytest -v --tb=short -rA --log-cli-level=INFO \
            --image-uri ${{ inputs.image-uri }} \
            xgboost/benchmarks/${{ matrix.test-module }}.py
