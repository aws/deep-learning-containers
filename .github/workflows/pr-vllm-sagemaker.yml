name: PR - vLLM SageMaker

on:
  # Direct execution on pull requests
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
    paths:
      - "**vllm**"
      - "!docs/**"

  # Allow calling as a reusable workflow
  workflow_call:
    inputs:
      config-file:
        description: 'Path to config file'
        required: false
        type: string
        default: ".github/config/vllm-sagemaker.yml"
      skip-gatekeeper:
        description: 'Skip gatekeeper check (for auto-release)'
        required: false
        type: boolean
        default: false
      skip-change-detection:
        description: 'Skip change detection (for auto-release)'
        required: false
        type: boolean
        default: false
    outputs:
      ci-image:
        description: 'Built CI image URI'
        value: ${{ jobs.build-image.outputs.ci-image }}

permissions:
  contents: read
  pull-requests: read

env:
  # CI environment configuration
  FORCE_COLOR: "1"

  # Config file path - use input if provided (workflow_call), otherwise use default
  CONFIG_FILE: ${{ inputs.config-file || '.github/config/vllm-sagemaker.yml' }}

jobs:
  gatekeeper:
    # Skip gatekeeper when called from auto-release workflow
    if: ${{ !inputs.skip-gatekeeper }}
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-gate-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true
    steps:
      - name: Checkout base branch (safe)
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1

      - name: Run permission gate (from base)
        uses: ./.github/actions/pr-permission-gate

  load-config:
    needs: [gatekeeper]
    # Run if gatekeeper succeeded OR was skipped
    if: always() && (needs.gatekeeper.result == 'success' || needs.gatekeeper.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      framework: ${{ steps.parse.outputs.framework }}
      framework-version: ${{ steps.parse.outputs.framework-version }}
      python-version: ${{ steps.parse.outputs.python-version }}
      cuda-version: ${{ steps.parse.outputs.cuda-version }}
      os-version: ${{ steps.parse.outputs.os-version }}
      container-type: ${{ steps.parse.outputs.container-type }}
      device-type: ${{ steps.parse.outputs.device-type }}
      arch-type: ${{ steps.parse.outputs.arch-type }}
      contributor: ${{ steps.parse.outputs.contributor }}
      customer-type: ${{ steps.parse.outputs.customer-type }}
      prod-image: ${{ steps.parse.outputs.prod-image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Load configuration
        id: load
        uses: ./.github/actions/load-config
        with:
          config-file: ${{ env.CONFIG_FILE }}

      - name: Parse configuration
        id: parse
        run: |
          echo '${{ steps.load.outputs.config }}' > config.json
          echo "framework=$(jq -r '.common.framework' config.json)" >> $GITHUB_OUTPUT
          echo "framework-version=$(jq -r '.common.framework_version' config.json)" >> $GITHUB_OUTPUT
          echo "python-version=$(jq -r '.common.python_version' config.json)" >> $GITHUB_OUTPUT
          echo "cuda-version=$(jq -r '.common.cuda_version' config.json)" >> $GITHUB_OUTPUT
          echo "os-version=$(jq -r '.common.os_version' config.json)" >> $GITHUB_OUTPUT
          echo "container-type=$(jq -r '.common.job_type' config.json)" >> $GITHUB_OUTPUT
          echo "device-type=$(jq -r '.common.device_type // "gpu"' config.json)" >> $GITHUB_OUTPUT
          echo "arch-type=$(jq -r '.common.arch_type // "x86"' config.json)" >> $GITHUB_OUTPUT
          echo "contributor=$(jq -r '.common.contributor // "None"' config.json)" >> $GITHUB_OUTPUT
          echo "customer-type=$(jq -r '.common.customer_type // ""' config.json)" >> $GITHUB_OUTPUT
          echo "prod-image=$(jq -r '.common.prod_image' config.json)" >> $GITHUB_OUTPUT

  check-changes:
    needs: [gatekeeper]
    if: ${{ !inputs.skip-change-detection && (needs.gatekeeper.result == 'success') }}
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-check-changes-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true
    outputs:
      build-change: ${{ steps.changes.outputs.build-change }}
      test-change: ${{ steps.changes.outputs.test-change }}
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v5

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files

      - name: Detect file changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            build-change:
              - "docker/vllm/**"
              - "scripts/vllm/**"
              - "scripts/common/**"
              - "scripts/telemetry/**"
              - ".github/config/vllm-sagemaker.yml"
            test-change:
              - "test/sanity/**"
              - "test/vllm/**"

  build-image:
    needs: [check-changes, load-config]
    if: always() && !failure() && !cancelled() && (needs.check-changes.outputs.build-change == 'true' || needs.check-changes.result == 'skipped')
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-build-runner
        buildspec-override:true
    concurrency:
      group: ${{ github.workflow }}-build-image-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true
    outputs:
      ci-image: ${{ steps.build.outputs.image-uri }}
    steps:
      - uses: actions/checkout@v5

      - name: Build image
        id: build
        uses: ./.github/actions/build-image
        with:
          framework: ${{ needs.load-config.outputs.framework }}
          target: vllm-sagemaker
          base-image: vllm/vllm-openai:v${{ needs.load-config.outputs.framework-version }}
          framework-version: ${{ needs.load-config.outputs.framework-version }}
          container-type: ${{ needs.load-config.outputs.container-type }}
          aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          tag-pr: ${{ needs.load-config.outputs.framework }}-${{ needs.load-config.outputs.framework-version }}-gpu-${{ needs.load-config.outputs.python-version }}-${{ needs.load-config.outputs.cuda-version }}-${{ needs.load-config.outputs.os-version }}-sagemaker-pr-${{ github.event.pull_request.number }}
          dockerfile-path: docker/${{ needs.load-config.outputs.framework }}/Dockerfile
          arch-type: ${{ needs.load-config.outputs.arch-type }}
          device-type: ${{ needs.load-config.outputs.device-type }}
          cuda-version: ${{ needs.load-config.outputs.cuda-version }}
          python-version: ${{ needs.load-config.outputs.python-version }}
          os-version: ${{ needs.load-config.outputs.os-version }}
          contributor: ${{ needs.load-config.outputs.contributor }}
          customer-type: ${{ needs.load-config.outputs.customer-type }}

  sanity-test:
    needs: [check-changes, build-image, load-config]
    if: |
      always() && !failure() && !cancelled() &&
      (needs.check-changes.outputs.build-change == 'true' || needs.check-changes.outputs.test-change == 'true' || needs.check-changes.result == 'skipped' )
    concurrency:
      group: ${{ github.workflow }}-sanity-test-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    uses: ./.github/workflows/reusable-sanity-tests.yml
    with:
      image-uri: ${{ needs.build-image.result == 'success' && needs.build-image.outputs.ci-image || format('{0}.dkr.ecr.{1}.amazonaws.com/{2}', vars.PROD_AWS_ACCOUNT_ID, vars.AWS_REGION, needs.load-config.outputs.prod-image) }}
      aws-account-id: ${{ needs.build-image.result == 'success' && vars.CI_AWS_ACCOUNT_ID || vars.PROD_AWS_ACCOUNT_ID }}
      aws-region: ${{ vars.AWS_REGION }}
      framework: ${{ needs.load-config.outputs.framework }}
      framework-version: ${{ needs.load-config.outputs.framework-version }}
      python-version: ${{ needs.load-config.outputs.python-version }}
      cuda-version: ${{ needs.load-config.outputs.cuda-version }}
      os-version: ${{ needs.load-config.outputs.os-version }}

  security-test:
    needs: [check-changes, build-image, load-config]
    if: |
      always() && !failure() && !cancelled() &&
      (needs.check-changes.outputs.build-change == 'true' || needs.check-changes.outputs.test-change == 'true')
    concurrency:
      group: ${{ github.workflow }}-security-test-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    uses: ./.github/workflows/reusable-security-tests.yml
    with:
      image-uri: ${{ needs.build-image.result == 'success' && needs.build-image.outputs.ci-image || format('{0}.dkr.ecr.{1}.amazonaws.com/{2}', vars.PROD_AWS_ACCOUNT_ID, vars.AWS_REGION, needs.load-config.outputs.prod-image) }}
      aws-account-id: ${{ needs.build-image.result == 'success' && vars.CI_AWS_ACCOUNT_ID || vars.PROD_AWS_ACCOUNT_ID }}
      aws-region: ${{ vars.AWS_REGION }}
      framework: ${{ needs.load-config.outputs.framework }}
      framework-version: ${{ needs.load-config.outputs.framework-version }}

  regression-test:
    needs: [check-changes, build-image, load-config]
    if: |
      always() && !failure() && !cancelled() &&
      (needs.check-changes.outputs.build-change == 'true' || needs.check-changes.outputs.test-change == 'true' || needs.check-changes.result == 'skipped')
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-g6xl-runner
        buildspec-override:true
    concurrency:
      group: ${{ github.workflow }}-regression-test-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v5

      - name: Container pull
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ needs.build-image.result == 'success' && vars.CI_AWS_ACCOUNT_ID || vars.PROD_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          image-uri: ${{ needs.build-image.result == 'success' && needs.build-image.outputs.ci-image || format('{0}.dkr.ecr.{1}.amazonaws.com/{2}', vars.PROD_AWS_ACCOUNT_ID, vars.AWS_REGION, needs.load-config.outputs.prod-image) }}

      - name: Checkout vLLM tests
        uses: actions/checkout@v5
        with:
          repository: vllm-project/vllm
          ref: v${{ needs.load-config.outputs.framework-version }}
          path: vllm_source

      - name: Start container
        run: |
          CONTAINER_ID=$(docker run -d -it --rm --gpus=all --entrypoint /bin/bash \
            -v ${HOME}/.cache/huggingface:/root/.cache/huggingface \
            -v ${HOME}/.cache/vllm:/root/.cache/vllm \
            -v .:/workdir --workdir /workdir \
            -e HF_TOKEN=${{ secrets.HUGGING_FACE_HUB_TOKEN }} \
            ${{ needs.build-image.result == 'success' && needs.build-image.outputs.ci-image || format('{0}.dkr.ecr.{1}.amazonaws.com/{2}', vars.PROD_AWS_ACCOUNT_ID, vars.AWS_REGION, needs.load-config.outputs.prod-image) }})
          echo "CONTAINER_ID=$CONTAINER_ID" >> $GITHUB_ENV

      - name: Setup for vLLM tests
        run: |
          docker exec ${CONTAINER_ID} scripts/vllm/vllm_0_15_1_test_setup.sh

      - name: Run vLLM tests
        run: |
          docker exec ${CONTAINER_ID} scripts/vllm/vllm_regression_test.sh

  cuda-test:
    needs: [check-changes, build-image, load-config]
    if: |
      always() && !failure() && !cancelled() &&
      (needs.check-changes.outputs.build-change == 'true' || needs.check-changes.outputs.test-change == 'true' || needs.check-changes.result == 'skipped')
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-g6xl-runner
        buildspec-override:true
    concurrency:
      group: ${{ github.workflow }}-cuda-test-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v5

      - name: Container pull
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ needs.build-image.result == 'success' && vars.CI_AWS_ACCOUNT_ID || vars.PROD_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          image-uri: ${{ needs.build-image.result == 'success' && needs.build-image.outputs.ci-image || format('{0}.dkr.ecr.{1}.amazonaws.com/{2}', vars.PROD_AWS_ACCOUNT_ID, vars.AWS_REGION, needs.load-config.outputs.prod-image) }}

      - name: Checkout vLLM tests
        uses: actions/checkout@v5
        with:
          repository: vllm-project/vllm
          ref: v${{ needs.load-config.outputs.framework-version }}
          path: vllm_source

      - name: Start container
        run: |
          CONTAINER_ID=$(docker run -d -it --rm --gpus=all --entrypoint /bin/bash \
            -v ${HOME}/.cache/huggingface:/root/.cache/huggingface \
            -v ${HOME}/.cache/vllm:/root/.cache/vllm \
            -v .:/workdir --workdir /workdir \
            -e HF_TOKEN=${{ secrets.HUGGING_FACE_HUB_TOKEN }} \
            ${{ needs.build-image.result == 'success' && needs.build-image.outputs.ci-image || format('{0}.dkr.ecr.{1}.amazonaws.com/{2}', vars.PROD_AWS_ACCOUNT_ID, vars.AWS_REGION, needs.load-config.outputs.prod-image) }})
          echo "CONTAINER_ID=$CONTAINER_ID" >> $GITHUB_ENV

      - name: Setup for vLLM tests
        run: |
          docker exec ${CONTAINER_ID} scripts/vllm/vllm_0_15_1_test_setup.sh

      - name: Run vLLM tests
        run: |
          docker exec ${CONTAINER_ID} scripts/vllm/vllm_cuda_test.sh

  example-test:
    needs: [check-changes, build-image, load-config]
    if: |
      always() && !failure() && !cancelled() &&
      (needs.check-changes.outputs.build-change == 'true' || needs.check-changes.outputs.test-change == 'true' || needs.check-changes.result == 'skipped')
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-g6xl-runner
        buildspec-override:true
    concurrency:
      group: ${{ github.workflow }}-example-test-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v5

      - name: Container pull
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ needs.build-image.result == 'success' && vars.CI_AWS_ACCOUNT_ID || vars.PROD_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          image-uri: ${{ needs.build-image.result == 'success' && needs.build-image.outputs.ci-image || format('{0}.dkr.ecr.{1}.amazonaws.com/{2}', vars.PROD_AWS_ACCOUNT_ID, vars.AWS_REGION, needs.load-config.outputs.prod-image) }}

      - name: Checkout vLLM tests
        uses: actions/checkout@v5
        with:
          repository: vllm-project/vllm
          ref: v${{ needs.load-config.outputs.framework-version }}
          path: vllm_source

      - name: Start container
        run: |
          CONTAINER_ID=$(docker run -d -it --rm --gpus=all --entrypoint /bin/bash \
            -v ${HOME}/.cache/huggingface:/root/.cache/huggingface \
            -v ${HOME}/.cache/vllm:/root/.cache/vllm \
            -v .:/workdir --workdir /workdir \
            -e HF_TOKEN=${{ secrets.HUGGING_FACE_HUB_TOKEN }} \
            ${{ needs.build-image.result == 'success' && needs.build-image.outputs.ci-image || format('{0}.dkr.ecr.{1}.amazonaws.com/{2}', vars.PROD_AWS_ACCOUNT_ID, vars.AWS_REGION, needs.load-config.outputs.prod-image) }})
          echo "CONTAINER_ID=$CONTAINER_ID" >> $GITHUB_ENV

      - name: Setup for vLLM tests
        run: |
          docker exec ${CONTAINER_ID} scripts/vllm/vllm_0_15_1_test_setup.sh

      - name: Run vLLM tests
        run: |
          docker exec ${CONTAINER_ID} scripts/vllm/vllm_sagemaker_examples_test.sh

  endpoint-test:
    needs: [check-changes, build-image, load-config]
    if: |
      always() && !failure() && !cancelled() &&
      (needs.check-changes.outputs.build-change == 'true' || needs.check-changes.outputs.test-change == 'true' || needs.check-changes.result == 'skipped')
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    concurrency:
      group: ${{ github.workflow }}-endpoint-test-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: false
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v5

      - name: Install test dependencies
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install -r test/requirements.txt
          uv pip install -r test/vllm/sagemaker/requirements.txt

      - name: Run sagemaker endpoint test
        run: |
          source .venv/bin/activate
          cd test/
          python3 -m pytest -vs -rA --image-uri ${{ needs.build-image.result == 'success' && needs.build-image.outputs.ci-image || format('{0}.dkr.ecr.{1}.amazonaws.com/{2}', vars.PROD_AWS_ACCOUNT_ID, vars.AWS_REGION, needs.load-config.outputs.prod-image) }} vllm/sagemaker
