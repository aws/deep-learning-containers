name: SGLang Benchmark Tests

permissions:
  contents: read

on:
  # TEMPORARY: auto-trigger on PR 6179 for debugging [Errno 98] port-in-use
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  workflow_dispatch:
    inputs:
      image-uri:
        description: "Image URI to benchmark (ECR URI)"
        required: true
        type: string
      aws-account-id:
        description: "AWS account ID for ECR auth (defaults to CI account)"
        required: false
        type: string
        default: ""
      aws-region:
        description: "AWS region for ECR auth (defaults to repo var)"
        required: false
        type: string
        default: ""

env:
  # TEMPORARY: hardcoded image for PR 6179 debugging
  IMAGE_URI: "${{ vars.CI_AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/ci:sglang_server-0.5.12.dlc1-gpu-py312-cu130-amzn2023-sagemaker-pr-6179"
  ACCOUNT_ID: ${{ inputs.aws-account-id || vars.CI_AWS_ACCOUNT_ID }}
  REGION: ${{ inputs.aws-region || vars.AWS_REGION }}

jobs:
  load-benchmarks:
    # TEMPORARY: only auto-trigger on PR 6179, always run on workflow_dispatch
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.number == 6179 }}
    runs-on: ubuntu-latest
    outputs:
      codebuild-fleet-matrix: ${{ steps.parse.outputs.codebuild-fleet }}
      runner-scale-sets-matrix: ${{ steps.parse.outputs.runner-scale-sets }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Parse benchmark config
        id: parse
        run: |
          python3 -c "
          import yaml, json
          with open('.github/config/model-tests/sglang-model-tests.yml') as f:
              cfg = yaml.safe_load(f)
          bm = cfg.get('benchmark', {})
          prefix = cfg.get('s3_prefix', '')
          for m in bm.get('codebuild-fleet', []) + bm.get('runner-scale-sets', []):
              m['s3_path'] = prefix + '/' + m.pop('s3_model')
          print('codebuild-fleet=' + json.dumps(bm.get('codebuild-fleet', [])))
          print('runner-scale-sets=' + json.dumps(bm.get('runner-scale-sets', [])))
          " > parsed.txt
          grep '^codebuild-fleet=' parsed.txt | sed 's/^codebuild-fleet=//' > cb.json
          grep '^runner-scale-sets=' parsed.txt | sed 's/^runner-scale-sets=//' > rss.json
          echo "codebuild-fleet=$(cat cb.json)" >> $GITHUB_OUTPUT
          echo "runner-scale-sets=$(cat rss.json)" >> $GITHUB_OUTPUT

  benchmark-codebuild-fleet:
    name: benchmark (${{ matrix.name }} / ${{ matrix.fleet }})
    if: ${{ fromJson(needs.load-benchmarks.outputs.codebuild-fleet-matrix)[0] != null }}
    needs: [load-benchmarks]
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include: ${{ fromJson(needs.load-benchmarks.outputs.codebuild-fleet-matrix) }}
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:${{ matrix.fleet }}
        buildspec-override:true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: ECR authenticate
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ env.ACCOUNT_ID }}
          aws-region: ${{ env.REGION }}

      - name: GPU cleanup and status
        run: |
          echo "=== Pre-cleanup GPU state ==="
          nvidia-smi
          echo ""
          echo "=== Stopping stale containers ==="
          docker ps -q | xargs -r docker stop 2>/dev/null || true
          docker ps -aq | xargs -r docker rm -f 2>/dev/null || true
          echo "=== Killing stale sglang/python processes ==="
          pkill -9 -f "sglang" 2>/dev/null || true
          pkill -9 -f "uvicorn" 2>/dev/null || true
          echo "=== Clearing GPU memory ==="
          nvidia-smi --gpu-reset 2>/dev/null || true
          echo ""
          echo "=== Post-cleanup GPU state ==="
          nvidia-smi

      - name: Download model from S3
        uses: ./.github/actions/download-model
        id: model
        with:
          s3-path: ${{ matrix.s3_path }}
          model-name: ${{ matrix.name }}

      - name: Start container
        run: |
          docker pull ${{ env.IMAGE_URI }}
          CONTAINER_ID=$(docker run -d -it --gpus all --entrypoint /bin/bash \
            --ipc=host \
            -v /dlc-models:/models \
            ${{ env.IMAGE_URI }})
          echo "CONTAINER_ID=$CONTAINER_ID" >> $GITHUB_ENV

      - name: Copy scripts into container
        run: |
          docker cp test/sglang/scripts/sglang_benchmark_test.sh ${CONTAINER_ID}:/models/
          if [ -f "test/sglang/scripts/benchmark/${{ matrix.test_script || '' }}" ]; then
            docker cp "test/sglang/scripts/benchmark/${{ matrix.test_script }}" ${CONTAINER_ID}:/models/
          fi

      - name: Run benchmark
        run: |
          TEST_SCRIPT="${{ matrix.test_script || 'sglang_benchmark_test.sh' }}"
          docker exec \
            -e SGLANG_ENV_VARS="${{ matrix.env_vars || '' }}" \
            ${CONTAINER_ID} bash "/models/${TEST_SCRIPT}" \
              "/models/${{ matrix.name }}" \
              "${{ matrix.name }}" \
              "${{ matrix.fleet }}" \
              ${{ matrix.extra_args }}

      - name: Extract results
        if: always()
        run: |
          docker cp ${CONTAINER_ID}:/tmp/benchmark_results/. ./benchmark_results/ 2>/dev/null || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-${{ matrix.name }}-${{ matrix.fleet }}
          path: benchmark_results/
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          docker stop ${CONTAINER_ID} 2>/dev/null || true
          docker rm -f ${CONTAINER_ID} 2>/dev/null || true
          kill ${{ steps.model.outputs.lock-pid }} 2>/dev/null || true

  benchmark-runner-scale-sets:
    name: benchmark (${{ matrix.name }} / ${{ matrix.runner_label || 'gpu-efa-runners' }})
    if: ${{ fromJson(needs.load-benchmarks.outputs.runner-scale-sets-matrix)[0] != null }}
    needs: [load-benchmarks]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.load-benchmarks.outputs.runner-scale-sets-matrix) }}
    runs-on: ${{ matrix.runner_label || 'gpu-efa-runners' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: ECR authenticate
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ env.ACCOUNT_ID }}
          aws-region: ${{ env.REGION }}

      - name: GPU cleanup and status
        run: |
          echo "=== Stopping stale containers ==="
          docker ps -q | xargs -r docker stop 2>/dev/null || true
          docker ps -aq | xargs -r docker rm -f 2>/dev/null || true
          echo "=== Killing stale sglang/python processes ==="
          pkill -9 -f "sglang" 2>/dev/null || true
          pkill -9 -f "uvicorn" 2>/dev/null || true
          sleep 2
          echo "=== GPU state ==="
          nvidia-smi

      - name: "[DEBUG] Host port state before container start"
        run: |
          SERVING_PORT=$(echo "${{ matrix.env_vars }}" | grep -oE 'SGLANG_PORT=[0-9]+' | cut -d= -f2)
          SERVING_PORT=${SERVING_PORT:-30000}
          echo "=== Detected SERVING_PORT=${SERVING_PORT} ==="
          echo ""
          echo "=== /proc/net/tcp (hex port $(printf '%04X' ${SERVING_PORT})) ==="
          cat /proc/net/tcp 2>/dev/null || echo "/proc/net/tcp not available"
          echo ""
          echo "=== All processes ==="
          ps aux
          echo ""
          echo "=== Running containers ==="
          docker ps

      - name: Download model from S3
        uses: ./.github/actions/download-model
        id: model
        with:
          s3-path: ${{ matrix.s3_path }}
          model-name: ${{ matrix.name }}

      - name: Start container
        run: |
          POD_GPUS=$(nvidia-smi --query-gpu=uuid --format=csv,noheader | paste -sd,)
          echo "Pod GPU UUIDs: ${POD_GPUS}"
          docker pull ${{ env.IMAGE_URI }}
          CONTAINER_ID=$(docker run -d -it --gpus "\"device=${POD_GPUS}\"" --entrypoint /bin/bash \
            --ipc=host \
            ${{ env.IMAGE_URI }})
          echo "CONTAINER_ID=$CONTAINER_ID" >> $GITHUB_ENV

      - name: "[DEBUG] Container port state before benchmark"
        run: |
          SERVING_PORT=$(echo "${{ matrix.env_vars }}" | grep -oE 'SGLANG_PORT=[0-9]+' | cut -d= -f2)
          SERVING_PORT=${SERVING_PORT:-30000}
          echo "=== Inside container: /proc/net/tcp and port check ==="
          docker exec ${CONTAINER_ID} python3 -c "
          import os, glob
          port = ${SERVING_PORT}
          hex_port = '%04X' % port
          print(f'Looking for port {port} (0x{hex_port}) in /proc/net/tcp:')
          with open('/proc/net/tcp') as f:
              lines = f.readlines()
              print(lines[0].strip())  # header
              found = [l for l in lines[1:] if ':' + hex_port + ' ' in l.split()[1]]
              if found:
                  for l in found: print(l.strip())
              else:
                  print(f'  Port {port} is NOT in use')
          print()
          print(f'Total TCP connections: {len(lines)-1}')
          print()
          print('All LISTEN sockets (state=0A):')
          for l in lines[1:]:
              if l.split()[3] == '0A':
                  local = l.split()[1]
                  lport = int(local.split(':')[1], 16)
                  print(f'  :{lport}')
          "
          echo ""
          echo "=== Inside container: all processes ==="
          docker exec ${CONTAINER_ID} ps aux

      - name: Copy files into container
        run: |
          docker exec ${CONTAINER_ID} mkdir -p /models
          docker cp ${{ steps.model.outputs.model-dir }} ${CONTAINER_ID}:/models/${{ matrix.name }}
          docker cp test/sglang/scripts/sglang_benchmark_test.sh ${CONTAINER_ID}:/models/
          if [ -f "test/sglang/scripts/benchmark/${{ matrix.test_script || '' }}" ]; then
            docker cp "test/sglang/scripts/benchmark/${{ matrix.test_script }}" ${CONTAINER_ID}:/models/
          fi

      - name: Run benchmark
        run: |
          TEST_SCRIPT="${{ matrix.test_script || 'sglang_benchmark_test.sh' }}"
          RUNNER_LABEL="${{ matrix.runner_label || 'gpu-efa-runners' }}"
          docker exec \
            -e SGLANG_ENV_VARS="${{ matrix.env_vars || '' }}" \
            ${CONTAINER_ID} bash "/models/${TEST_SCRIPT}" \
              "/models/${{ matrix.name }}" \
              "${{ matrix.name }}" \
              "${RUNNER_LABEL}" \
              ${{ matrix.extra_args }}

      - name: "[DEBUG] Port state during/after benchmark"
        if: always()
        run: |
          SERVING_PORT=$(echo "${{ matrix.env_vars }}" | grep -oE 'SGLANG_PORT=[0-9]+' | cut -d= -f2)
          SERVING_PORT=${SERVING_PORT:-30000}
          echo "=== Inside container: port and process state ==="
          docker exec ${CONTAINER_ID} python3 -c "
          import os, glob
          port = ${SERVING_PORT}
          hex_port = '%04X' % port
          print(f'Port {port} (0x{hex_port}) in /proc/net/tcp:')
          try:
              with open('/proc/net/tcp') as f:
                  lines = f.readlines()
              found = [l for l in lines[1:] if ':' + hex_port + ' ' in l.split()[1]]
              if found:
                  for l in found: print('  ' + l.strip())
              else:
                  print(f'  Port {port} is NOT in use')
              print()
              print('All LISTEN sockets (state=0A):')
              for l in lines[1:]:
                  if l.split()[3] == '0A':
                      lport = int(l.split()[1].split(':')[1], 16)
                      inode = l.split()[9]
                      print(f'  :{lport} (inode={inode})')
          except Exception as e:
              print(f'Error: {e}')
          " 2>/dev/null || true
          echo ""
          echo "=== Inside container: all processes ==="
          docker exec ${CONTAINER_ID} ps aux 2>/dev/null || true

      - name: Extract results
        if: always()
        run: |
          docker cp ${CONTAINER_ID}:/tmp/benchmark_results/. ./benchmark_results/ 2>/dev/null || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-${{ matrix.name }}-${{ matrix.runner_label || 'gpu-efa-runners' }}
          path: benchmark_results/
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          docker stop ${CONTAINER_ID} 2>/dev/null || true
          docker rm -f ${CONTAINER_ID} 2>/dev/null || true
          kill ${{ steps.model.outputs.lock-pid }} 2>/dev/null || true


  benchmark-report:
    name: benchmark-report
    if: always()
    needs: [benchmark-codebuild-fleet, benchmark-runner-scale-sets]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all benchmark artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: benchmark-*
          path: results/

      - name: Generate report
        run: python3 test/sglang/scripts/benchmark/benchmark_report.py results >> "$GITHUB_STEP_SUMMARY"
