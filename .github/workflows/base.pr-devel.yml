name: "PR - Base Devel"

on:
  # TEMP: Enable after all frameworks are refactored
  # pull_request:
  #   branches: [main]
  #   types: [opened, reopened, synchronize]
  #   paths:
  #     - ".github/config/image/base/cu*-devel.yml"
  #     - "docker/base/**"
  #     - "scripts/common/**"
  #     - "test/cuda/**"
  #     - "test/sanity/**"
  #     - "test/security/data/ecr_scan_allowlist/base/**"
  #     - ".github/workflows/base.pr-devel.yml"
  #     - ".github/workflows/base.pipeline.yml"
  #     - "!docs/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  gatekeeper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1
      - uses: ./.github/actions/pr-permission-gate

  discover:
    needs: [gatekeeper]
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.discover.outputs.configs }}
    steps:
      - uses: actions/checkout@v6
      - id: discover
        uses: ./.github/actions/discover-configs
        with:
          pattern: ".github/config/image/base/*-devel.yml"

  check-changes:
    needs: [gatekeeper]
    runs-on: ubuntu-latest
    outputs:
      build-change: ${{ steps.changes.outputs.build-change }}
      sanity-test-change: ${{ steps.changes.outputs.sanity-test-change }}
      cuda-test-change: ${{ steps.changes.outputs.cuda-test-change }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            build-change:
              - ".github/config/image/base/cu*-devel.yml"
              - "docker/base/**"
              - "scripts/common/**"
              - "test/security/data/ecr_scan_allowlist/base/**"
            sanity-test-change:
              - "test/sanity/**"
            cuda-test-change:
              - "test/cuda/**"

  pipeline:
    needs: [discover, check-changes]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.configs) }}
    uses: ./.github/workflows/base.pipeline.yml
    with:
      config-file: ${{ matrix.config_file }}
      tag-suffix: pr-${{ github.event.pull_request.number }}
      build: ${{ needs.check-changes.outputs.build-change == 'true' }}
      run-sanity-test: ${{ needs.check-changes.outputs.build-change == 'true' || needs.check-changes.outputs.sanity-test-change == 'true' }}
      run-security-test: ${{ needs.check-changes.outputs.build-change == 'true' }}
      run-cuda-test: ${{ needs.check-changes.outputs.build-change == 'true' || needs.check-changes.outputs.cuda-test-change == 'true' }}
      release: false
    secrets: inherit
