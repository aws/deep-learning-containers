name: "Auto Release - vLLM EC2 Ubuntu"

on:
  schedule:
    - cron: '00 19 * * 1,3'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  pipeline:
    uses: ./.github/workflows/vllm.pipeline.yml
    with:
      config-file: .github/config/image/vllm/ec2-ubuntu.yml
      tag-suffix: ${{ github.run_id }}
      release: true
    secrets: inherit
