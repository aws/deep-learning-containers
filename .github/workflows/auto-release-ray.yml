name: Auto Release - Ray

on:
  # schedule run must be on the default branch
  schedule:
    # Runs at 10:00 AM PST/PDT on Monday and Wednesday
    - cron: '00 17 * * 1,3'

  # Temporary PR trigger for gamma testing — remove after validation
  pull_request:
    paths:
      - "**ray**"
      - "!docs/**"

  # Manual trigger
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_COLOR: "1"

jobs:
  # ============================================================
  # Load configs for all 4 Ray image variants
  # ============================================================
  load-config-ec2-gpu:
    runs-on: ubuntu-latest
    outputs:
      config: ${{ steps.load.outputs.config }}
      build-target: ${{ steps.parse.outputs.build-target }}
      ci-tag: ${{ steps.parse.outputs.ci-tag }}
      dockerfile: ${{ steps.parse.outputs.dockerfile }}
    steps:
      - uses: actions/checkout@v5
      - id: load
        uses: ./.github/actions/load-config
        with:
          config-file: .github/config/ray-ec2-gpu.yml
      - id: parse
        run: |
          echo '${{ steps.load.outputs.config }}' > config.json
          echo "build-target=$(jq -r '.common.build_target' config.json)" >> $GITHUB_OUTPUT
          echo "ci-tag=$(jq -r '.common.ci_tag' config.json)" >> $GITHUB_OUTPUT
          echo "dockerfile=$(jq -r '.common.dockerfile' config.json)" >> $GITHUB_OUTPUT

  load-config-ec2-cpu:
    runs-on: ubuntu-latest
    outputs:
      config: ${{ steps.load.outputs.config }}
      build-target: ${{ steps.parse.outputs.build-target }}
      ci-tag: ${{ steps.parse.outputs.ci-tag }}
      dockerfile: ${{ steps.parse.outputs.dockerfile }}
    steps:
      - uses: actions/checkout@v5
      - id: load
        uses: ./.github/actions/load-config
        with:
          config-file: .github/config/ray-ec2-cpu.yml
      - id: parse
        run: |
          echo '${{ steps.load.outputs.config }}' > config.json
          echo "build-target=$(jq -r '.common.build_target' config.json)" >> $GITHUB_OUTPUT
          echo "ci-tag=$(jq -r '.common.ci_tag' config.json)" >> $GITHUB_OUTPUT
          echo "dockerfile=$(jq -r '.common.dockerfile' config.json)" >> $GITHUB_OUTPUT

  load-config-sagemaker-gpu:
    runs-on: ubuntu-latest
    outputs:
      config: ${{ steps.load.outputs.config }}
      build-target: ${{ steps.parse.outputs.build-target }}
      ci-tag: ${{ steps.parse.outputs.ci-tag }}
      dockerfile: ${{ steps.parse.outputs.dockerfile }}
    steps:
      - uses: actions/checkout@v5
      - id: load
        uses: ./.github/actions/load-config
        with:
          config-file: .github/config/ray-sagemaker-gpu.yml
      - id: parse
        run: |
          echo '${{ steps.load.outputs.config }}' > config.json
          echo "build-target=$(jq -r '.common.build_target' config.json)" >> $GITHUB_OUTPUT
          echo "ci-tag=$(jq -r '.common.ci_tag' config.json)" >> $GITHUB_OUTPUT
          echo "dockerfile=$(jq -r '.common.dockerfile' config.json)" >> $GITHUB_OUTPUT

  load-config-sagemaker-cpu:
    runs-on: ubuntu-latest
    outputs:
      config: ${{ steps.load.outputs.config }}
      build-target: ${{ steps.parse.outputs.build-target }}
      ci-tag: ${{ steps.parse.outputs.ci-tag }}
      dockerfile: ${{ steps.parse.outputs.dockerfile }}
    steps:
      - uses: actions/checkout@v5
      - id: load
        uses: ./.github/actions/load-config
        with:
          config-file: .github/config/ray-sagemaker-cpu.yml
      - id: parse
        run: |
          echo '${{ steps.load.outputs.config }}' > config.json
          echo "build-target=$(jq -r '.common.build_target' config.json)" >> $GITHUB_OUTPUT
          echo "ci-tag=$(jq -r '.common.ci_tag' config.json)" >> $GITHUB_OUTPUT
          echo "dockerfile=$(jq -r '.common.dockerfile' config.json)" >> $GITHUB_OUTPUT

  # ============================================================
  # Build all 4 Ray images
  # ============================================================
  build-ec2-gpu:
    needs: [load-config-ec2-gpu]
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-build-runner
        buildspec-override:true
    concurrency:
      group: ${{ github.workflow }}-build-ec2-gpu-${{ github.run_id }}
      cancel-in-progress: true
    outputs:
      ci-image: ${{ steps.build.outputs.image-uri }}
    steps:
      - uses: actions/checkout@v5
      - run: .github/scripts/buildkitd.sh
      - uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Build
        id: build
        run: |
          CI_IMAGE_URI="${{ vars.CI_AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/ci:${{ needs.load-config-ec2-gpu.outputs.ci-tag }}-${{ github.run_id }}"
          docker buildx build --progress plain \
            --build-arg CACHE_REFRESH="$(date +"%Y-%m-%d")" \
            --build-arg BASE_IMAGE="unused-ray-gpu-multistage" \
            --cache-to=type=inline \
            --cache-from=type=registry,ref=${CI_IMAGE_URI} \
            --tag ${CI_IMAGE_URI} \
            --push \
            --target ${{ needs.load-config-ec2-gpu.outputs.build-target }} \
            -f ${{ needs.load-config-ec2-gpu.outputs.dockerfile }} .
          echo "image-uri=${CI_IMAGE_URI}" >> $GITHUB_OUTPUT

  build-ec2-cpu:
    needs: [load-config-ec2-cpu]
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-build-runner
        buildspec-override:true
    concurrency:
      group: ${{ github.workflow }}-build-ec2-cpu-${{ github.run_id }}
      cancel-in-progress: true
    outputs:
      ci-image: ${{ steps.build.outputs.image-uri }}
    steps:
      - uses: actions/checkout@v5
      - run: .github/scripts/buildkitd.sh
      - uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Build
        id: build
        run: |
          CI_IMAGE_URI="${{ vars.CI_AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/ci:${{ needs.load-config-ec2-cpu.outputs.ci-tag }}-${{ github.run_id }}"
          docker buildx build --progress plain \
            --build-arg CACHE_REFRESH="$(date +"%Y-%m-%d")" \
            --build-arg BASE_IMAGE="unused-ray-cpu-multistage" \
            --cache-to=type=inline \
            --cache-from=type=registry,ref=${CI_IMAGE_URI} \
            --tag ${CI_IMAGE_URI} \
            --push \
            --target ${{ needs.load-config-ec2-cpu.outputs.build-target }} \
            -f ${{ needs.load-config-ec2-cpu.outputs.dockerfile }} .
          echo "image-uri=${CI_IMAGE_URI}" >> $GITHUB_OUTPUT

  build-sagemaker-gpu:
    needs: [load-config-sagemaker-gpu]
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-build-runner
        buildspec-override:true
    concurrency:
      group: ${{ github.workflow }}-build-sagemaker-gpu-${{ github.run_id }}
      cancel-in-progress: true
    outputs:
      ci-image: ${{ steps.build.outputs.image-uri }}
    steps:
      - uses: actions/checkout@v5
      - run: .github/scripts/buildkitd.sh
      - uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Build
        id: build
        run: |
          CI_IMAGE_URI="${{ vars.CI_AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/ci:${{ needs.load-config-sagemaker-gpu.outputs.ci-tag }}-${{ github.run_id }}"
          docker buildx build --progress plain \
            --build-arg CACHE_REFRESH="$(date +"%Y-%m-%d")" \
            --build-arg BASE_IMAGE="unused-ray-gpu-multistage" \
            --cache-to=type=inline \
            --cache-from=type=registry,ref=${CI_IMAGE_URI} \
            --tag ${CI_IMAGE_URI} \
            --push \
            --target ${{ needs.load-config-sagemaker-gpu.outputs.build-target }} \
            -f ${{ needs.load-config-sagemaker-gpu.outputs.dockerfile }} .
          echo "image-uri=${CI_IMAGE_URI}" >> $GITHUB_OUTPUT

  build-sagemaker-cpu:
    needs: [load-config-sagemaker-cpu]
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-build-runner
        buildspec-override:true
    concurrency:
      group: ${{ github.workflow }}-build-sagemaker-cpu-${{ github.run_id }}
      cancel-in-progress: true
    outputs:
      ci-image: ${{ steps.build.outputs.image-uri }}
    steps:
      - uses: actions/checkout@v5
      - run: .github/scripts/buildkitd.sh
      - uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Build
        id: build
        run: |
          CI_IMAGE_URI="${{ vars.CI_AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/ci:${{ needs.load-config-sagemaker-cpu.outputs.ci-tag }}-${{ github.run_id }}"
          docker buildx build --progress plain \
            --build-arg CACHE_REFRESH="$(date +"%Y-%m-%d")" \
            --build-arg BASE_IMAGE="unused-ray-cpu-multistage" \
            --cache-to=type=inline \
            --cache-from=type=registry,ref=${CI_IMAGE_URI} \
            --tag ${CI_IMAGE_URI} \
            --push \
            --target ${{ needs.load-config-sagemaker-cpu.outputs.build-target }} \
            -f ${{ needs.load-config-sagemaker-cpu.outputs.dockerfile }} .
          echo "image-uri=${CI_IMAGE_URI}" >> $GITHUB_OUTPUT

  # ============================================================
  # Sanity tests
  # ============================================================
  sanity-test:
    needs: [build-ec2-gpu, build-ec2-cpu, build-sagemaker-gpu, build-sagemaker-cpu]
    if: success()
    strategy:
      fail-fast: false
      matrix:
        include:
          - ci-image: ${{ needs.build-ec2-gpu.outputs.ci-image }}
            device-type: gpu
            cuda-version: cu129
            customer-type: ec2
          - ci-image: ${{ needs.build-ec2-cpu.outputs.ci-image }}
            device-type: cpu
            cuda-version: ""
            customer-type: ec2
          - ci-image: ${{ needs.build-sagemaker-gpu.outputs.ci-image }}
            device-type: gpu
            cuda-version: cu129
            customer-type: sagemaker
          - ci-image: ${{ needs.build-sagemaker-cpu.outputs.ci-image }}
            device-type: cpu
            cuda-version: ""
            customer-type: sagemaker
    concurrency:
      group: ${{ github.workflow }}-sanity-${{ matrix.ci-image }}-${{ github.run_id }}
      cancel-in-progress: true
    uses: ./.github/workflows/reusable-sanity-tests.yml
    with:
      image-uri: ${{ matrix.ci-image }}
      aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
      aws-region: ${{ vars.AWS_REGION }}
      framework: ray
      framework-version: "2.54.0"
      python-version: py313
      cuda-version: ${{ matrix.cuda-version }}
      os-version: amzn2023
      customer-type: ${{ matrix.customer-type }}
      arch-type: x86
      device-type: ${{ matrix.device-type }}
      contributor: None
      container-type: inference

  # ============================================================
  # Security tests
  # ============================================================
  security-test:
    needs: [build-ec2-gpu, build-ec2-cpu, build-sagemaker-gpu, build-sagemaker-cpu]
    if: success()
    strategy:
      fail-fast: false
      matrix:
        include:
          - ci-image: ${{ needs.build-ec2-gpu.outputs.ci-image }}
          - ci-image: ${{ needs.build-ec2-cpu.outputs.ci-image }}
          - ci-image: ${{ needs.build-sagemaker-gpu.outputs.ci-image }}
          - ci-image: ${{ needs.build-sagemaker-cpu.outputs.ci-image }}
    concurrency:
      group: ${{ github.workflow }}-security-${{ matrix.ci-image }}-${{ github.run_id }}
      cancel-in-progress: true
    uses: ./.github/workflows/reusable-security-tests.yml
    with:
      image-uri: ${{ matrix.ci-image }}
      aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
      aws-region: ${{ vars.AWS_REGION }}
      framework: ray
      framework-version: "2.54.0"

  # ============================================================
  # Telemetry tests
  # ============================================================
  telemetry-test:
    needs: [build-ec2-gpu, build-ec2-cpu, build-sagemaker-gpu, build-sagemaker-cpu]
    if: success()
    strategy:
      fail-fast: false
      matrix:
        include:
          - ci-image: ${{ needs.build-ec2-gpu.outputs.ci-image }}
          - ci-image: ${{ needs.build-ec2-cpu.outputs.ci-image }}
          - ci-image: ${{ needs.build-sagemaker-gpu.outputs.ci-image }}
          - ci-image: ${{ needs.build-sagemaker-cpu.outputs.ci-image }}
    concurrency:
      group: ${{ github.workflow }}-telemetry-${{ matrix.ci-image }}-${{ github.run_id }}
      cancel-in-progress: false
    uses: ./.github/workflows/reusable-telemetry-tests.yml
    with:
      image-uri: ${{ matrix.ci-image }}
      aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
      aws-region: ${{ vars.AWS_REGION }}
      framework: ray
      framework-version: "2.54.0"
      container-type: inference

  # ============================================================
  # Generate release specs
  # ============================================================
  generate-release-spec-ec2-gpu:
    needs: [load-config-ec2-gpu, build-ec2-gpu, sanity-test, security-test]
    if: success()
    runs-on: ubuntu-latest
    outputs:
      release-spec: ${{ steps.generate.outputs.release-spec }}
      should-release: ${{ steps.check-release.outputs.should-release }}
    steps:
      - uses: actions/checkout@v5
      - id: check-release
        run: |
          echo '${{ needs.load-config-ec2-gpu.outputs.config }}' > config.json
          echo "should-release=$(jq -r '.release.release // false' config.json)" >> $GITHUB_OUTPUT
      - id: generate
        if: steps.check-release.outputs.should-release == 'true'
        uses: ./.github/actions/generate-release-spec
        with:
          config-json: ${{ needs.load-config-ec2-gpu.outputs.config }}

  generate-release-spec-ec2-cpu:
    needs: [load-config-ec2-cpu, build-ec2-cpu, sanity-test, security-test]
    if: success()
    runs-on: ubuntu-latest
    outputs:
      release-spec: ${{ steps.generate.outputs.release-spec }}
      should-release: ${{ steps.check-release.outputs.should-release }}
    steps:
      - uses: actions/checkout@v5
      - id: check-release
        run: |
          echo '${{ needs.load-config-ec2-cpu.outputs.config }}' > config.json
          echo "should-release=$(jq -r '.release.release // false' config.json)" >> $GITHUB_OUTPUT
      - id: generate
        if: steps.check-release.outputs.should-release == 'true'
        uses: ./.github/actions/generate-release-spec
        with:
          config-json: ${{ needs.load-config-ec2-cpu.outputs.config }}

  generate-release-spec-sagemaker-gpu:
    needs: [load-config-sagemaker-gpu, build-sagemaker-gpu, sanity-test, security-test]
    if: success()
    runs-on: ubuntu-latest
    outputs:
      release-spec: ${{ steps.generate.outputs.release-spec }}
      should-release: ${{ steps.check-release.outputs.should-release }}
    steps:
      - uses: actions/checkout@v5
      - id: check-release
        run: |
          echo '${{ needs.load-config-sagemaker-gpu.outputs.config }}' > config.json
          echo "should-release=$(jq -r '.release.release // false' config.json)" >> $GITHUB_OUTPUT
      - id: generate
        if: steps.check-release.outputs.should-release == 'true'
        uses: ./.github/actions/generate-release-spec
        with:
          config-json: ${{ needs.load-config-sagemaker-gpu.outputs.config }}

  generate-release-spec-sagemaker-cpu:
    needs: [load-config-sagemaker-cpu, build-sagemaker-cpu, sanity-test, security-test]
    if: success()
    runs-on: ubuntu-latest
    outputs:
      release-spec: ${{ steps.generate.outputs.release-spec }}
      should-release: ${{ steps.check-release.outputs.should-release }}
    steps:
      - uses: actions/checkout@v5
      - id: check-release
        run: |
          echo '${{ needs.load-config-sagemaker-cpu.outputs.config }}' > config.json
          echo "should-release=$(jq -r '.release.release // false' config.json)" >> $GITHUB_OUTPUT
      - id: generate
        if: steps.check-release.outputs.should-release == 'true'
        uses: ./.github/actions/generate-release-spec
        with:
          config-json: ${{ needs.load-config-sagemaker-cpu.outputs.config }}

  # ============================================================
  # Release — EC2 GPU
  # ============================================================
  release-ec2-gpu:
    needs: [load-config-ec2-gpu, build-ec2-gpu, generate-release-spec-ec2-gpu]
    if: needs.generate-release-spec-ec2-gpu.outputs.should-release == 'true'
    concurrency:
      group: ${{ github.workflow }}-release-ec2-gpu-${{ github.run_id }}
      cancel-in-progress: true
    uses: ./.github/workflows/reusable-release-image.yml
    with:
      source-image-uri: ${{ needs.build-ec2-gpu.outputs.ci-image }}
      release-spec: ${{ needs.generate-release-spec-ec2-gpu.outputs.release-spec }}
      environment: ${{ github.event_name == 'pull_request' && 'gamma' || fromJson(needs.load-config-ec2-gpu.outputs.config).release.environment }}
      aws-region: ${{ vars.AWS_REGION }}
      runner-fleet: default-runner
      publish-only: true
    secrets: inherit

  # ============================================================
  # Release — EC2 CPU
  # ============================================================
  release-ec2-cpu:
    needs: [load-config-ec2-cpu, build-ec2-cpu, generate-release-spec-ec2-cpu]
    if: needs.generate-release-spec-ec2-cpu.outputs.should-release == 'true'
    concurrency:
      group: ${{ github.workflow }}-release-ec2-cpu-${{ github.run_id }}
      cancel-in-progress: true
    uses: ./.github/workflows/reusable-release-image.yml
    with:
      source-image-uri: ${{ needs.build-ec2-cpu.outputs.ci-image }}
      release-spec: ${{ needs.generate-release-spec-ec2-cpu.outputs.release-spec }}
      environment: ${{ github.event_name == 'pull_request' && 'gamma' || fromJson(needs.load-config-ec2-cpu.outputs.config).release.environment }}
      aws-region: ${{ vars.AWS_REGION }}
      runner-fleet: default-runner
      publish-only: true
    secrets: inherit

  # ============================================================
  # Release — SageMaker GPU
  # ============================================================
  release-sagemaker-gpu:
    needs: [load-config-sagemaker-gpu, build-sagemaker-gpu, generate-release-spec-sagemaker-gpu]
    if: needs.generate-release-spec-sagemaker-gpu.outputs.should-release == 'true'
    concurrency:
      group: ${{ github.workflow }}-release-sagemaker-gpu-${{ github.run_id }}
      cancel-in-progress: true
    uses: ./.github/workflows/reusable-release-image.yml
    with:
      source-image-uri: ${{ needs.build-sagemaker-gpu.outputs.ci-image }}
      release-spec: ${{ needs.generate-release-spec-sagemaker-gpu.outputs.release-spec }}
      environment: ${{ github.event_name == 'pull_request' && 'gamma' || fromJson(needs.load-config-sagemaker-gpu.outputs.config).release.environment }}
      aws-region: ${{ vars.AWS_REGION }}
      runner-fleet: default-runner
      publish-only: true
    secrets: inherit

  # ============================================================
  # Release — SageMaker CPU
  # ============================================================
  release-sagemaker-cpu:
    needs: [load-config-sagemaker-cpu, build-sagemaker-cpu, generate-release-spec-sagemaker-cpu]
    if: needs.generate-release-spec-sagemaker-cpu.outputs.should-release == 'true'
    concurrency:
      group: ${{ github.workflow }}-release-sagemaker-cpu-${{ github.run_id }}
      cancel-in-progress: true
    uses: ./.github/workflows/reusable-release-image.yml
    with:
      source-image-uri: ${{ needs.build-sagemaker-cpu.outputs.ci-image }}
      release-spec: ${{ needs.generate-release-spec-sagemaker-cpu.outputs.release-spec }}
      environment: ${{ github.event_name == 'pull_request' && 'gamma' || fromJson(needs.load-config-sagemaker-cpu.outputs.config).release.environment }}
      aws-region: ${{ vars.AWS_REGION }}
      runner-fleet: default-runner
      publish-only: true
    secrets: inherit
