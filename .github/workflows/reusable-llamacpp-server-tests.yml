name: Reusable llama.cpp Server Tests

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      image-uri:
        description: 'Image URI to test'
        required: true
        type: string
      aws-account-id:
        description: 'AWS account ID for ECR authentication'
        required: true
        type: string
      aws-region:
        description: 'AWS region for ECR authentication'
        required: true
        type: string
      framework-version:
        description: 'llama.cpp framework version'
        required: true
        type: string

jobs:
  smoke-test:
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-g6xl-runner
        buildspec-override:true
    steps:
      - name: Checkout DLC source
        uses: actions/checkout@v5

      - name: Container pull
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ inputs.aws-account-id }}
          aws-region: ${{ inputs.aws-region }}
          image-uri: ${{ inputs.image-uri }}

      - name: Verify llama-server binary
        env:
          IMAGE: ${{ inputs.image-uri }}
        run: |
          docker run --rm --gpus all ${IMAGE} --help

      - name: Verify llama-server with model
        env:
          IMAGE: ${{ inputs.image-uri }}
          HF_TOKEN: ${{ secrets.HUGGING_FACE_HUB_TOKEN }}
        run: |
          # Download a tiny GGUF model for smoke test
          mkdir -p /tmp/llamacpp-test
          curl -sL -o /tmp/llamacpp-test/test.gguf \
            "https://huggingface.co/ggml-org/models/resolve/main/tinyllamas/stories260K.gguf"

          # Start server with the test model
          CONTAINER_ID=$(docker run -d --gpus all -p 8080:8080 \
            -v /tmp/llamacpp-test:/models \
            ${IMAGE} \
            --model /models/test.gguf --host 0.0.0.0 --port 8080)
          echo "CONTAINER_ID=${CONTAINER_ID}" >> ${GITHUB_ENV}

          # Wait for health endpoint
          echo "Waiting for llama-server to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null 2>&1; then
              echo "Server is healthy after $((i * 2))s"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Server failed to start"
              docker logs ${CONTAINER_ID}
              exit 1
            fi
            sleep 2
          done

          # Send a completion request
          RESPONSE=$(curl -sf http://localhost:8080/v1/chat/completions \
            -H "Content-Type: application/json" \
            -d '{"messages":[{"role":"user","content":"hello"}],"max_tokens":16}')
          echo "Response: ${RESPONSE}"

          # Verify we got a response with choices
          echo "${RESPONSE}" | python3 -c "import sys,json; r=json.load(sys.stdin); assert r.get('choices'), 'No choices in response'"
          echo "Inference test passed"

          docker stop ${CONTAINER_ID}
