name: "Auto Release - Ray EC2"

on:
  schedule:
    - cron: '00 17 * * 2,4'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      configs: ${{ steps.discover.outputs.configs }}
    steps:
      - uses: actions/checkout@v6
      - id: discover
        uses: ./.github/actions/discover-configs
        with:
          pattern: ".github/config/image/ray/ec2-*.yml"

  pipeline:
    needs: [discover]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.configs) }}
    uses: ./.github/workflows/ray.pipeline.yml
    with:
      config-file: ${{ matrix.config_file }}
      tag-suffix: ${{ github.run_id }}
      run-security-test: false
      release: true
    secrets: inherit
