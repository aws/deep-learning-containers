name: Reusable Release Image Workflow

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      source-image-uri:
        description: 'Source image URI to release'
        required: true
        type: string
      release-spec:
        description: 'Release specification YAML content'
        required: true
        type: string
      environment:
        description: 'Deployment environment (gamma or production)'
        required: true
        type: string
      aws-region:
        description: 'AWS region'
        required: false
        type: string
        default: 'us-west-2'
      runner-fleet:
        description: 'CodeBuild runner fleet'
        required: false
        type: string
        default: 'default-runner'
    outputs:
      run-identifier:
        description: 'Unique identifier for this release run'
        value: ${{ jobs.step1-publish-images.outputs.run-identifier }}

jobs:
  validate-release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate release context
        run: |
          ENVIRONMENT="${{ inputs.environment }}"

          # Validate environment input
          if [[ "${ENVIRONMENT}" != "gamma" && "${ENVIRONMENT}" != "production" ]]; then
            echo "❌ ERROR: Invalid environment '${ENVIRONMENT}'"
            echo "Valid environments: gamma, production"
            exit 1
          fi

          echo "✅ Release context validation passed"
          echo "Ref: ${{ github.ref }}"
          echo "Environment: ${ENVIRONMENT}"

  step1-publish-images:
    needs: [validate-release]
    environment: ${{ inputs.environment }}
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:${{ inputs.runner-fleet }}
        buildspec-override:true
    # default is 6 hours for both github hosted and self hosted
    timeout-minutes: 720
    outputs:
      run-identifier: ${{ steps.setup.outputs.run-identifier }}
      metadata-file-name: ${{ steps.setup.outputs.metadata-file-name }}
      images-published: ${{ steps.publish.outputs.images-published }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup release package
        uses: ./.github/actions/setup-release-package
        with:
          aws-region: ${{ inputs.aws-region }}

      - name: Install SOCI and nerdctl
        run: |
          echo "Installing SOCI and nerdctl..."
          ARCH_SUFFIX="amd64"

          # SOCI SNAPSHOTTER
          if command -v soci &> /dev/null; then
            echo "SOCI already installed:"
            soci --version
          else
            echo "Installing SOCI for ${ARCH_SUFFIX}..."
            SOCI_VERSION="0.11.1"
            wget https://github.com/awslabs/soci-snapshotter/releases/download/v${SOCI_VERSION}/soci-snapshotter-${SOCI_VERSION}-linux-${ARCH_SUFFIX}.tar.gz
            sudo tar -C /usr/local/bin -xvf soci-snapshotter-${SOCI_VERSION}-linux-${ARCH_SUFFIX}.tar.gz soci soci-snapshotter-grpc
            rm soci-snapshotter-${SOCI_VERSION}-linux-${ARCH_SUFFIX}.tar.gz
            soci --version
          fi

          # NERDCTL
          if command -v nerdctl &> /dev/null; then
            echo "nerdctl already installed:"
            nerdctl --version
          else
            echo "Installing nerdctl for ${ARCH_SUFFIX}..."
            export CONTAINERD_ADDRESS=/var/run/docker/containerd/containerd.sock
            NERDCTL_VERSION="2.1.5"
            wget https://github.com/containerd/nerdctl/releases/download/v${NERDCTL_VERSION}/nerdctl-${NERDCTL_VERSION}-linux-${ARCH_SUFFIX}.tar.gz
            sudo tar -C /usr/local/bin -xzf nerdctl-${NERDCTL_VERSION}-linux-${ARCH_SUFFIX}.tar.gz
            sudo chmod +x /usr/local/bin/nerdctl
            rm nerdctl-${NERDCTL_VERSION}-linux-${ARCH_SUFFIX}.tar.gz
            nerdctl --version
          fi

          echo "CONTAINERD_ADDRESS=/var/run/docker/containerd/containerd.sock" >> ${GITHUB_ENV}

      - name: Setup release environment
        id: setup
        run: |
          # Extract a unique identifier from the source image URI
          # Example: 123456789.dkr.ecr.us-west-2.amazonaws.com/vllm:0.14.0-gpu-py3.11-cu12.4-ubuntu22.04-ec2-pr-123
          # Extract the tag portion after the last colon
          IMAGE_TAG=$(echo "${{ inputs.source-image-uri }}" | rev | cut -d':' -f1 | rev)
          # Sanitize the tag to be filesystem-safe (replace special chars with dashes)
          SANITIZED_TAG=$(echo "${IMAGE_TAG}" | tr '/:.' '-')

          RUN_IDENTIFIER="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${SANITIZED_TAG}"
          METADATA_FILE="/tmp/release_metadata_${RUN_IDENTIFIER}.dict"

          echo "RUN_IDENTIFIER=${RUN_IDENTIFIER}" >> ${GITHUB_ENV}
          echo "METADATA_FILE=${METADATA_FILE}" >> ${GITHUB_ENV}
          echo "REGION=${{ inputs.aws-region }}" >> ${GITHUB_ENV}
          echo "SOURCE_STAGE=${{ vars.SOURCE_STAGE }}" >> ${GITHUB_ENV}
          echo "TARGET_STAGE=${{ vars.TARGET_STAGE }}" >> ${GITHUB_ENV}

          echo "run-identifier=${RUN_IDENTIFIER}" >> ${GITHUB_OUTPUT}
          echo "metadata-file-name=release_metadata_${RUN_IDENTIFIER}.dict" >> ${GITHUB_OUTPUT}

          echo "Generated run identifier: ${RUN_IDENTIFIER}"
          echo "Environment: ${{ inputs.environment }}"
          echo "Source stage: ${{ vars.SOURCE_STAGE }}"
          echo "Target stage: ${{ vars.TARGET_STAGE }}"

      - name: Publish DLC Images
        id: publish
        run: |
          echo "=========================================="
          echo "Step 1: Publishing DLC Images"
          echo "=========================================="

          cat > release_spec.yml <<'EOF'
          ${{ inputs.release-spec }}
          EOF

          echo "Release specification:"
          cat release_spec.yml

          publish_dlc_images \
            --release-spec release_spec.yml \
            --source-image-uri "${{ inputs.source-image-uri }}" \
            --metadata-file "${METADATA_FILE}"

          # Check if metadata file was created
          # If not created, it means the release was skipped (blocked day or outside business hours)
          if [ -f "${METADATA_FILE}" ]; then
            # Read IMAGES_PUBLISHED from the metadata file
            IMAGES_PUBLISHED=$(python3 -c "import json; print(json.load(open('${METADATA_FILE}'))['release_successful'])")
            echo "images-published=${IMAGES_PUBLISHED}" >> ${GITHUB_OUTPUT}

            if [ "${IMAGES_PUBLISHED}" == "1" ]; then
              echo "✅ Step 1 completed: Images published successfully"
            else
              echo "⚠️ Step 1 completed but release was skipped (no images published)"
            fi
            echo "Release metadata:"
            cat ${METADATA_FILE}
          else
            # Metadata file not created - release was skipped (blocked day or outside business hours)
            echo "⚠️ Release skipped: No metadata file generated"
            echo "This typically happens on blocked days or outside business hours"
            echo "images-published=0" >> ${GITHUB_OUTPUT}

            # Create a minimal metadata file for artifact upload consistency
            echo '{"release_successful": "0", "skip_reason": "blocked_day_or_outside_business_hours"}' > "${METADATA_FILE}"
          fi

      - name: Upload metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata-${{ steps.setup.outputs.run-identifier }}
          path: ${{ env.METADATA_FILE }}
          retention-days: 7

  step2-generate-info:
    needs: [step1-publish-images]
    environment: ${{ inputs.environment }}
    if: needs.step1-publish-images.outputs.images-published == '1'
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:${{ inputs.runner-fleet }}
        buildspec-override:true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup release package
        uses: ./.github/actions/setup-release-package
        with:
          aws-region: ${{ inputs.aws-region }}

      - name: Download metadata artifact
        uses: actions/download-artifact@v4
        with:
          name: release-metadata-${{ needs.step1-publish-images.outputs.run-identifier }}
          path: /tmp/

      - name: Setup environment
        run: |
          RUN_IDENTIFIER="${{ needs.step1-publish-images.outputs.run-identifier }}"
          METADATA_FILE="/tmp/${{ needs.step1-publish-images.outputs.metadata-file-name }}"

          echo "RUN_IDENTIFIER=${RUN_IDENTIFIER}" >> ${GITHUB_ENV}
          echo "METADATA_FILE=${METADATA_FILE}" >> ${GITHUB_ENV}
          echo "REGION=${{ inputs.aws-region }}" >> ${GITHUB_ENV}
          echo "SOURCE_STAGE=${{ vars.SOURCE_STAGE }}" >> ${GITHUB_ENV}
          echo "TARGET_STAGE=${{ vars.TARGET_STAGE }}" >> ${GITHUB_ENV}

      - name: Generate Release Information
        run: |
          echo "=========================================="
          echo "Step 2: Generating Release Information"
          echo "=========================================="

          if [ ! -f "${METADATA_FILE}" ]; then
            echo "❌ Error: Metadata file not found at ${METADATA_FILE}"
            exit 1
          fi

          echo "Release metadata from Step 1:"
          cat ${METADATA_FILE}

          generate_dlc_image_release_information \
            --metadata-file "${METADATA_FILE}" \
            --run-id "${RUN_IDENTIFIER}"

          echo "✅ Step 2 completed: Release information generated and uploaded to S3"

  step3-publish-notifications:
    needs: [step1-publish-images, step2-generate-info]
    environment: ${{ inputs.environment }}
    if: needs.step1-publish-images.outputs.images-published == '1'
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:${{ inputs.runner-fleet }}
        buildspec-override:true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup release package
        uses: ./.github/actions/setup-release-package
        with:
          aws-region: ${{ inputs.aws-region }}

      - name: Setup environment
        run: |
          RUN_IDENTIFIER="${{ needs.step1-publish-images.outputs.run-identifier }}"
          echo "RUN_IDENTIFIER=${RUN_IDENTIFIER}" >> ${GITHUB_ENV}
          echo "REGION=${{ inputs.aws-region }}" >> ${GITHUB_ENV}
          echo "SOURCE_STAGE=${{ vars.SOURCE_STAGE }}" >> ${GITHUB_ENV}
          echo "TARGET_STAGE=${{ vars.TARGET_STAGE }}" >> ${GITHUB_ENV}

      - name: Publish Release Information
        run: |
          echo "=========================================="
          echo "Step 3: Publishing Release Information"
          echo "=========================================="

          publish_release_information --run-id "${RUN_IDENTIFIER}"

          echo "✅ Step 3 completed: Release information published successfully"
          echo ""
          echo "=========================================="
          echo "🎉 All release steps completed successfully!"
          echo "=========================================="

  step4-docs-pr:
    needs: [step1-publish-images, step3-publish-notifications]
    if: needs.step1-publish-images.outputs.images-published == '1'
    runs-on: ubuntu-latest
    steps:
      - name: Decode the GitHub App Private Key
        id: decode
        run: |
          private_key=$(echo "${{ secrets.ASIMOVBOT_APP_PRIVATE_KEY }}" | base64 -d | awk 'BEGIN {ORS="\\n"} {print}' | head -c -2) &> /dev/null
          echo "::add-mask::$private_key"
          echo "private-key=$private_key" >> "$GITHUB_OUTPUT"

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.ASIMOVBOT_APP_ID }}
          private-key: ${{ steps.decode.outputs.private-key }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Parse release spec
        id: parse-spec
        run: |
          echo '${{ inputs.release-spec }}' > /tmp/release-spec.yml
          echo "FRAMEWORK=$(yq '.common.framework' /tmp/release-spec.yml)" >> "$GITHUB_ENV"
          echo "VERSION=$(yq '.common.framework_version' /tmp/release-spec.yml)" >> "$GITHUB_ENV"
          echo "PYTHON=$(yq '.common.python_version' /tmp/release-spec.yml)" >> "$GITHUB_ENV"
          echo "CUDA=$(yq '.common.cuda_version' /tmp/release-spec.yml)" >> "$GITHUB_ENV"
          echo "OS=$(yq '.common.os_version' /tmp/release-spec.yml)" >> "$GITHUB_ENV"
          echo "PLATFORM=$(yq '.common.customer_type' /tmp/release-spec.yml)" >> "$GITHUB_ENV"
          echo "DEVICE=$(yq '.common.device_type' /tmp/release-spec.yml)" >> "$GITHUB_ENV"
          echo "PUBLIC_REGISTRY=$(yq '.release.public_registry' /tmp/release-spec.yml)" >> "$GITHUB_ENV"
          echo "PROD_IMAGE=$(yq '.common.prod_image' /tmp/release-spec.yml)" >> "$GITHUB_ENV"

      - name: Pull image and extract package versions
        run: |
          # Construct image URI from public ECR registry and release-spec fields
          FULL_TAG="${VERSION}-${DEVICE}-${PYTHON}-${CUDA}-${OS}-${PLATFORM}"
          IMAGE_URI="public.ecr.aws/${{ env.PUBLIC_REGISTRY }}:${FULL_TAG}"
          echo "Pulling image: ${IMAGE_URI}"
          docker pull "${IMAGE_URI}"

          # Define framework-to-package map
          case "$FRAMEWORK" in
            vllm)
              PIP_PACKAGES="vllm torch torchvision torchaudio"
              SYSTEM_PACKAGES="cuda nccl efa"
              ;;
            sglang)
              PIP_PACKAGES="sglang sgl_kernel torch torchvision torchaudio torchao transformers flashinfer"
              SYSTEM_PACKAGES="cuda cudnn nccl efa gdrcopy"
              ;;
            *)
              echo "::warning::Unknown framework '$FRAMEWORK', using empty package list"
              PIP_PACKAGES=""
              SYSTEM_PACKAGES=""
              ;;
          esac

          FAILED_PACKAGES=()

          # Extract pip package versions
          for pkg_name in $PIP_PACKAGES; do
            version=$(docker run --rm "$IMAGE_URI" pip show "$pkg_name" 2>/dev/null | grep "^Version:" | awk '{print $2}')
            # Map pip package names to output keys
            case "$pkg_name" in
              torch) output_key="pytorch" ;;
              sgl_kernel) output_key="sgl-kernel" ;;
              *) output_key="$pkg_name" ;;
            esac
            if [ -n "$version" ]; then
              echo "  ✅ ${output_key}: ${version}"
              echo "PKG_${output_key}=${version}" >> "$GITHUB_ENV"
            else
              echo "::warning::Failed to extract version for pip package '${pkg_name}' (key: ${output_key})"
              FAILED_PACKAGES+=("$output_key")
              echo "PKG_${output_key}=" >> "$GITHUB_ENV"
            fi
          done

          # Extract system package versions
          for sys_pkg in $SYSTEM_PACKAGES; do
            version=""
            case "$sys_pkg" in
              cuda)
                version=$(docker run --rm "$IMAGE_URI" nvcc --version 2>/dev/null | grep "release" | sed 's/.*release //' | sed 's/,.*//')
                ;;
              nccl)
                version=$(docker run --rm "$IMAGE_URI" python3 -c "import torch; print(torch.cuda.nccl.version())" 2>/dev/null)
                ;;
              efa)
                version=$(docker run --rm "$IMAGE_URI" fi_info --version 2>/dev/null | head -1 | awk '{print $2}')
                ;;
              cudnn)
                version=$(docker run --rm "$IMAGE_URI" python3 -c "import torch; print(torch.backends.cudnn.version())" 2>/dev/null)
                ;;
              gdrcopy)
                version=$(docker run --rm "$IMAGE_URI" dpkg -l 2>/dev/null | grep gdrcopy | awk '{print $3}' | head -1)
                ;;
            esac
            if [ -n "$version" ]; then
              echo "  ✅ ${sys_pkg}: ${version}"
              echo "PKG_${sys_pkg}=${version}" >> "$GITHUB_ENV"
            else
              echo "::warning::Failed to extract version for system package '${sys_pkg}'"
              FAILED_PACKAGES+=("$sys_pkg")
              echo "PKG_${sys_pkg}=" >> "$GITHUB_ENV"
            fi
          done

          # Store failed packages as comma-separated string
          FAILED_STR=$(IFS=,; echo "${FAILED_PACKAGES[*]}")
          echo "FAILED_PACKAGES=${FAILED_STR}" >> "$GITHUB_ENV"
          if [ ${#FAILED_PACKAGES[@]} -gt 0 ]; then
            echo "::warning::Failed to extract versions for: ${FAILED_STR}"
          else
            echo "✅ All package versions extracted successfully"
          fi

      - name: Generate docs data YAML file
        run: |
          # Compute display name
          case "$FRAMEWORK" in
            vllm) DISPLAY_NAME="vLLM" ;;
            sglang) DISPLAY_NAME="SGLang" ;;
            *) DISPLAY_NAME="$FRAMEWORK" ;;
          esac

          # Compute major.minor version (e.g., "0.17.1" -> "0.17")
          MAJOR_MINOR=$(echo "$VERSION" | grep -oP '^\d+\.\d+')

          # Generate tags based on platform
          if [ "$PLATFORM" = "ec2" ]; then
            TAG1="${VERSION}-${DEVICE}-${PYTHON}-${CUDA}-${OS}-ec2"
            TAG2="${MAJOR_MINOR}-${DEVICE}-${PYTHON}-${CUDA}-${OS}-ec2-v1"
            TAG3="${VERSION}-${DEVICE}-${PYTHON}-ec2"
            TAG4="${MAJOR_MINOR}-${DEVICE}-${PYTHON}-ec2"
          elif [ "$PLATFORM" = "sagemaker" ]; then
            TAG1="${VERSION}-${DEVICE}-${PYTHON}-${CUDA}-${OS}-sagemaker"
            TAG2="${MAJOR_MINOR}-${DEVICE}-${PYTHON}-${CUDA}-${OS}-sagemaker-v1"
            TAG3="${VERSION}-${DEVICE}-${PYTHON}"
            TAG4="${MAJOR_MINOR}-${DEVICE}-${PYTHON}"
          fi

          # Generate announcement message based on platform
          if [ "$PLATFORM" = "ec2" ]; then
            ANNOUNCEMENT="Introduced ${DISPLAY_NAME} ${VERSION} containers for EC2, ECS, EKS"
          elif [ "$PLATFORM" = "sagemaker" ]; then
            ANNOUNCEMENT="Introduced ${DISPLAY_NAME} ${VERSION} containers for SageMaker"
          fi

          # Write the YAML file
          OUTPUT_DIR="docs/src/data/${FRAMEWORK}"
          OUTPUT_FILE="${OUTPUT_DIR}/${VERSION}-${DEVICE}-${PLATFORM}.yml"
          mkdir -p "$OUTPUT_DIR"

          case "$FRAMEWORK" in
            vllm)
              cat > "$OUTPUT_FILE" <<EOF
          framework: ${DISPLAY_NAME}
          version: "${VERSION}"
          accelerator: ${DEVICE}
          python: ${PYTHON}
          cuda: ${CUDA}
          os: ${OS}
          platform: ${PLATFORM}
          public_registry: ${PUBLIC_REGISTRY}

          tags:
            - "${TAG1}"
            - "${TAG2}"
            - "${TAG3}"
            - "${TAG4}"

          announcements:
            - "${ANNOUNCEMENT}"

          packages:
            vllm: "${PKG_vllm}"
            pytorch: "${PKG_pytorch}"
            torchvision: "${PKG_torchvision}"
            torchaudio: "${PKG_torchaudio}"
            cuda: "${PKG_cuda}"
            nccl: "${PKG_nccl}"
            efa: "${PKG_efa}"
          EOF
              ;;
            sglang)
              cat > "$OUTPUT_FILE" <<EOF
          framework: ${DISPLAY_NAME}
          version: "${VERSION}"
          accelerator: ${DEVICE}
          python: ${PYTHON}
          cuda: ${CUDA}
          os: ${OS}
          platform: ${PLATFORM}
          public_registry: ${PUBLIC_REGISTRY}

          tags:
            - "${TAG1}"
            - "${TAG2}"
            - "${TAG3}"
            - "${TAG4}"

          announcements:
            - "${ANNOUNCEMENT}"

          packages:
            sglang: "${PKG_sglang}"
            sgl-kernel: "${PKG_sgl-kernel}"
            pytorch: "${PKG_pytorch}"
            torchvision: "${PKG_torchvision}"
            torchaudio: "${PKG_torchaudio}"
            torchao: "${PKG_torchao}"
            transformers: "${PKG_transformers}"
            flashinfer: "${PKG_flashinfer}"
            cuda: "${PKG_cuda}"
            cudnn: "${PKG_cudnn}"
            nccl: "${PKG_nccl}"
            efa: "${PKG_efa}"
            gdrcopy: "${PKG_gdrcopy}"
          EOF
              ;;
            *)
              echo "::warning::Unknown framework '$FRAMEWORK', generating minimal YAML"
              cat > "$OUTPUT_FILE" <<EOF
          framework: ${DISPLAY_NAME}
          version: "${VERSION}"
          accelerator: ${DEVICE}
          python: ${PYTHON}
          cuda: ${CUDA}
          os: ${OS}
          platform: ${PLATFORM}
          public_registry: ${PUBLIC_REGISTRY}

          tags:
            - "${TAG1}"
            - "${TAG2}"
            - "${TAG3}"
            - "${TAG4}"

          announcements:
            - "${ANNOUNCEMENT}"

          packages: {}
          EOF
              ;;
          esac

          echo "✅ Generated docs data file: ${OUTPUT_FILE}"
          cat "$OUTPUT_FILE"
          echo "OUTPUT_FILE=${OUTPUT_FILE}" >> "$GITHUB_ENV"

      - name: Create branch, commit, and open PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Compute display name and branch name
          case "$FRAMEWORK" in
            vllm) DISPLAY_NAME="vLLM" ;;
            sglang) DISPLAY_NAME="SGLang" ;;
            *) DISPLAY_NAME="$FRAMEWORK" ;;
          esac
          BRANCH_NAME="docs/auto-update-${FRAMEWORK}-${VERSION}-${PLATFORM}"
          PR_TITLE="docs: Add ${DISPLAY_NAME} ${VERSION} ${PLATFORM^^} image data"

          # Configure git
          git config user.name "asimov-bot[bot]"
          git config user.email "asimov-bot[bot]@users.noreply.github.com"

          # Create and push branch (force-push for idempotency)
          git checkout -B "$BRANCH_NAME"
          git add "$OUTPUT_FILE"
          git commit -m "$PR_TITLE"
          git push --force origin "$BRANCH_NAME"

          # Build PR body
          PR_BODY="Auto-generated by the release workflow.

          This PR adds the docs data file for ${DISPLAY_NAME} ${VERSION} (${PLATFORM}).

          **File:** \`${OUTPUT_FILE}\`"

          # Add failed packages warning if any
          if [ -n "${FAILED_PACKAGES:-}" ]; then
            PR_BODY="${PR_BODY}

          ---

          ⚠️ **Warning: Some package versions could not be extracted:**

          $(echo "$FAILED_PACKAGES" | tr ',' '\n' | while read -r pkg; do echo "- \`${pkg}\`"; done)"
          fi

          # Create or update PR
          EXISTING_PR=$(gh pr list --head "$BRANCH_NAME" --json number --jq '.[0].number' 2>/dev/null)
          if [ -n "$EXISTING_PR" ] && [ "$EXISTING_PR" != "null" ]; then
            echo "Updating existing PR #${EXISTING_PR}"
            gh pr edit "$EXISTING_PR" --title "$PR_TITLE" --body "$PR_BODY"
            PR_URL=$(gh pr view "$EXISTING_PR" --json url --jq '.url')
          else
            echo "Creating new PR"
            PR_URL=$(gh pr create --title "$PR_TITLE" --body "$PR_BODY" --head "$BRANCH_NAME" --base main)
          fi

          echo "✅ PR URL: ${PR_URL}"
          echo "PR_URL=${PR_URL}" >> "$GITHUB_ENV"

      - name: Send Slack notification
        if: always()
        run: |
          # Compute display name
          case "${FRAMEWORK:-unknown}" in
            vllm) DISPLAY_NAME="vLLM" ;;
            sglang) DISPLAY_NAME="SGLang" ;;
            *) DISPLAY_NAME="${FRAMEWORK:-unknown}" ;;
          esac

          # Skip if webhook not configured
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi

          # Determine payload based on job outcome
          if [ -n "${PR_URL:-}" ]; then
            PAYLOAD=$(cat <<SLACK
          {"text": "📄 Docs PR created for ${DISPLAY_NAME} ${VERSION} (${PLATFORM}): ${PR_URL}"}
          SLACK
            )
          else
            RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            PAYLOAD=$(cat <<SLACK
          {"text": "❌ Docs PR job failed for ${DISPLAY_NAME} ${VERSION:-unknown} (${PLATFORM:-unknown}): ${RUN_URL}"}
          SLACK
            )
          fi

          curl -s -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
