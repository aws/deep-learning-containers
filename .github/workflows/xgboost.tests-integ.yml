name: Reusable XGBoost Integration Tests

on:
  workflow_call:
    inputs:
      config-file:
        description: "Path to image config YAML"
        required: true
        type: string
      image-uri:
        description: "Image URI to test. If empty, derives prod URI from config."
        required: false
        type: string
        default: ""

permissions:
  contents: read

env:
  XGBOOST_CONTAINER_REPO: "https://github.com/aws/sagemaker-xgboost-container.git"

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
      image-uri: ${{ steps.image.outputs.image-uri }}
      aws-account-id: ${{ steps.image.outputs.aws-account-id }}
      framework-version: ${{ steps.config.outputs.framework-version }}
      xgboost-branch: ${{ steps.config.outputs.xgboost-branch }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolve image URI
        id: image
        uses: ./.github/actions/resolve-image-uri
        with:
          image-uri: ${{ inputs.image-uri }}
          ci-aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
          prod-aws-account-id: ${{ vars.PROD_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          config-file: ${{ inputs.config-file }}

      - name: Check image exists
        id: check
        uses: ./.github/actions/check-image-exists
        with:
          image-uri: ${{ steps.image.outputs.image-uri }}

      - name: Parse config
        id: config
        run: |
          CONFIG_FILE="${{ inputs.config-file }}"
          echo "framework-version=$(yq '.metadata.framework_version' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "xgboost-branch=$(yq '.build.xgboost_container_branch // "master"' "$CONFIG_FILE")" >> $GITHUB_OUTPUT

  # Container tests — training, scoring, batch transform (GPU required)
  container-test-training:
    if: ${{ needs.preflight.outputs.exists == 'true' }}
    needs: [preflight]
    timeout-minutes: 90
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-g6xl-runner
        buildspec-override:true
    steps:
      - uses: actions/checkout@v6

      - name: ECR login
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ needs.preflight.outputs.aws-account-id }}
          aws-region: ${{ vars.AWS_REGION }}
          image-uri: ${{ needs.preflight.outputs.image-uri }}

      - name: Install test dependencies
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install -r test/requirements.txt docker pytest boto3 requests

      - name: Run training container tests
        run: |
          source .venv/bin/activate
          cd test/
          python3 -m pytest -v --tb=short -rA --log-cli-level=INFO \
            --image ${{ needs.preflight.outputs.image-uri }} \
            xgboost/container/test_training.py

  container-test-scoring:
    if: ${{ needs.preflight.outputs.exists == 'true' }}
    needs: [preflight]
    timeout-minutes: 60
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-g6xl-runner
        buildspec-override:true
    steps:
      - uses: actions/checkout@v6

      - name: ECR login
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ needs.preflight.outputs.aws-account-id }}
          aws-region: ${{ vars.AWS_REGION }}
          image-uri: ${{ needs.preflight.outputs.image-uri }}

      - name: Install test dependencies
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install -r test/requirements.txt docker pytest boto3 requests

      - name: Generate and upload models
        run: |
          source .venv/bin/activate
          uv pip install xgboost==${{ needs.preflight.outputs.framework-version }} numpy
          XGBOOST_VERSION=${{ needs.preflight.outputs.framework-version }} python3 test/xgboost/container/generate_models.py

      - name: Run scoring container tests
        run: |
          source .venv/bin/activate
          cd test/
          python3 -m pytest -v --tb=short -rA --log-cli-level=INFO \
            --image ${{ needs.preflight.outputs.image-uri }} \
            xgboost/container/test_scoring.py

  container-test-batch-transform:
    if: ${{ needs.preflight.outputs.exists == 'true' }}
    needs: [preflight]
    timeout-minutes: 60
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-g6xl-runner
        buildspec-override:true
    steps:
      - uses: actions/checkout@v6

      - name: ECR login
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ needs.preflight.outputs.aws-account-id }}
          aws-region: ${{ vars.AWS_REGION }}
          image-uri: ${{ needs.preflight.outputs.image-uri }}

      - name: Install test dependencies
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install -r test/requirements.txt docker pytest boto3 requests

      - name: Generate and upload models
        run: |
          source .venv/bin/activate
          uv pip install xgboost==${{ needs.preflight.outputs.framework-version }} numpy
          XGBOOST_VERSION=${{ needs.preflight.outputs.framework-version }} python3 test/xgboost/container/generate_models.py

      - name: Run batch transform container tests
        run: |
          source .venv/bin/activate
          cd test/
          python3 -m pytest -v --tb=short -rA --log-cli-level=INFO \
            --image ${{ needs.preflight.outputs.image-uri }} \
            xgboost/container/test_batch_transform.py

  # E2E tests — SageMaker training/inference/transform jobs
  e2e-test:
    if: ${{ needs.preflight.outputs.exists == 'true' }}
    needs: [preflight, container-test-training, container-test-scoring, container-test-batch-transform]
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        test-module:
          - test_e2e
          - test_e2e_selectable
          - test_hpo
          - test_inference
          - test_inference_mme
          - test_network_isolation
          - test_script_mode_e2e
          - test_training_csv
          - test_training_libsvm
          - test_training_pb
          - test_training_pq
          - test_transform
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    steps:
      - uses: actions/checkout@v6

      - name: Install test dependencies
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install -r test/requirements.txt
          uv pip install -r test/xgboost/requirements.txt

      - name: Run ${{ matrix.test-module }}
        run: |
          source .venv/bin/activate
          cd test/
          python3 -m pytest -v --tb=short -rA --log-cli-level=INFO \
            --image-uri ${{ needs.preflight.outputs.image-uri }} \
            --xgboost-version ${{ needs.preflight.outputs.framework-version }} \
            xgboost/e2e/${{ matrix.test-module }}.py

  # Benchmark tests
  benchmark-test:
    if: ${{ needs.preflight.outputs.exists == 'true' }}
    needs: [preflight, e2e-test]
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        test-module:
          - test_training_content_type
          - test_training_data_size
          - test_training_instance_type
          - test_training_max_depth
          - test_training_num_round
          - test_training_objective
          - test_training_tree_method
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:default-runner
        buildspec-override:true
    steps:
      - uses: actions/checkout@v6

      - name: Install test dependencies
        run: |
          uv venv --python 3.12
          source .venv/bin/activate
          uv pip install -r test/requirements.txt
          uv pip install -r test/xgboost/requirements.txt

      - name: Run ${{ matrix.test-module }}
        run: |
          source .venv/bin/activate
          cd test/
          python3 -m pytest -v --tb=short -rA --log-cli-level=INFO \
            --image-uri ${{ needs.preflight.outputs.image-uri }} \
            --xgboost-version ${{ needs.preflight.outputs.framework-version }} \
            xgboost/benchmarks/${{ matrix.test-module }}.py
