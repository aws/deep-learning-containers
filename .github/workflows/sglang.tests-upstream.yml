name: Reusable SGLang Upstream Tests

on:
  workflow_call:
    inputs:
      config-file:
        description: "Path to image config YAML"
        required: true
        type: string
      image-uri:
        description: "Image URI to test. If empty, derives prod URI from config."
        required: false
        type: string
        default: ""

permissions:
  contents: read

env:
  TEST_ARTIFACTS_DIRECTORY: "/test_artifacts/sglang"

jobs:
  local-benchmark-test:
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-g6xl-runner
        buildspec-override:true
    steps:
      - uses: actions/checkout@v6

      - name: Resolve image URI
        id: image
        uses: ./.github/actions/resolve-image-uri
        with:
          image-uri: ${{ inputs.image-uri }}
          ci-aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
          prod-aws-account-id: ${{ vars.PROD_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          config-file: ${{ inputs.config-file }}

      - name: Check image exists
        id: check
        uses: ./.github/actions/check-image-exists
        with:
          image-uri: ${{ steps.image.outputs.image-uri }}

      - name: ECR login
        if: steps.check.outputs.exists == 'true'
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ steps.image.outputs.aws-account-id }}
          aws-region: ${{ vars.AWS_REGION }}
          image-uri: ${{ steps.image.outputs.image-uri }}

      - name: Setup for SGLang datasets
        if: steps.check.outputs.exists == 'true'
        run: |
          mkdir -p ${TEST_ARTIFACTS_DIRECTORY}/dataset
          if [ ! -f ${TEST_ARTIFACTS_DIRECTORY}/dataset/ShareGPT_V3_unfiltered_cleaned_split.json ]; then
              echo "Downloading ShareGPT dataset..."
              wget -P ${TEST_ARTIFACTS_DIRECTORY}/dataset https://huggingface.co/datasets/anon8231489123/ShareGPT_Vicuna_unfiltered/resolve/main/ShareGPT_V3_unfiltered_cleaned_split.json
          else
              echo "ShareGPT dataset already exists. Skipping download."
          fi

      - name: Start container
        if: steps.check.outputs.exists == 'true'
        env:
          IMAGE: ${{ steps.image.outputs.image-uri }}
          HF_TOKEN: ${{ secrets.HUGGING_FACE_HUB_TOKEN }}
        run: |
          CONTAINER_ID=$(docker run -d -it --rm --gpus=all \
            -v ${HOME}/.cache/huggingface:/root/.cache/huggingface \
            -v ${TEST_ARTIFACTS_DIRECTORY}/dataset:/dataset \
            -p 30000:30000 \
            -e HF_TOKEN=${HF_TOKEN} \
            ${IMAGE} \
            --model-path Qwen/Qwen3-0.6B \
            --reasoning-parser qwen3 \
            --host 127.0.0.1 \
            --port 30000)
          echo "CONTAINER_ID=${CONTAINER_ID}" >> ${GITHUB_ENV}
          echo "Waiting for serving endpoint startup ..."
          sleep 1200s
          docker logs ${CONTAINER_ID}

      - name: Run SGLang benchmark
        if: steps.check.outputs.exists == 'true'
        run: |
          docker exec ${CONTAINER_ID} python3 -m sglang.bench_serving \
          --backend sglang \
          --host 127.0.0.1 --port 30000 \
          --num-prompts 1000 \
          --model Qwen/Qwen3-0.6B \
          --dataset-name sharegpt \
          --dataset-path /dataset/ShareGPT_V3_unfiltered_cleaned_split.json

      - name: Skip notice
        if: steps.check.outputs.exists != 'true'
        run: echo "Image not found in ECR — skipping tests (first release scenario)"

  srt-backend-test:
    runs-on:
      - codebuild-runner-${{ github.run_id }}-${{ github.run_attempt }}
        fleet:x86-g6exl-runner
        buildspec-override:true
    steps:
      - uses: actions/checkout@v6

      - name: Resolve image URI
        id: image
        uses: ./.github/actions/resolve-image-uri
        with:
          image-uri: ${{ inputs.image-uri }}
          ci-aws-account-id: ${{ vars.CI_AWS_ACCOUNT_ID }}
          prod-aws-account-id: ${{ vars.PROD_AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}
          config-file: ${{ inputs.config-file }}

      - name: Check image exists
        id: check
        uses: ./.github/actions/check-image-exists
        with:
          image-uri: ${{ steps.image.outputs.image-uri }}

      - name: ECR login
        if: steps.check.outputs.exists == 'true'
        uses: ./.github/actions/ecr-authenticate
        with:
          aws-account-id: ${{ steps.image.outputs.aws-account-id }}
          aws-region: ${{ vars.AWS_REGION }}
          image-uri: ${{ steps.image.outputs.image-uri }}

      - name: Parse config
        if: steps.check.outputs.exists == 'true'
        id: config
        run: |
          CONFIG_FILE="${{ inputs.config-file }}"
          echo "framework-version=$(yq '.metadata.framework_version' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "sglang-ref=$(yq '.build.sglang_ref // ""' "$CONFIG_FILE")" >> $GITHUB_OUTPUT

      - name: Checkout SGLang tests
        if: steps.check.outputs.exists == 'true'
        uses: actions/checkout@v6
        with:
          repository: sgl-project/sglang
          ref: ${{ steps.config.outputs.sglang-ref != '' && steps.config.outputs.sglang-ref || format('v{0}', steps.config.outputs.framework-version) }}
          path: sglang_source

      - name: Start container
        if: steps.check.outputs.exists == 'true'
        run: |
          CONTAINER_ID=$(docker run -d -it --rm --gpus=all --entrypoint /bin/bash \
            -v ${HOME}/.cache/huggingface:/root/.cache/huggingface \
            -v ./sglang_source:/workdir --workdir /workdir \
            -e HF_TOKEN=${{ secrets.HUGGING_FACE_HUB_TOKEN }} \
            ${{ steps.image.outputs.image-uri }})
          echo "CONTAINER_ID=${CONTAINER_ID}" >> ${GITHUB_ENV}

      - name: Setup for SGLang tests
        if: steps.check.outputs.exists == 'true'
        run: |
          docker exec ${CONTAINER_ID} sh -c '
            set -eux
            pip install --break-system-packages \
              pytest tabulate parameterized scipy
          '

      - name: Run SGLang tests
        if: steps.check.outputs.exists == 'true'
        run: |
          docker exec ${CONTAINER_ID} sh -c '
            set -eux
            nvidia-smi

            export PYTHONPATH=/workdir/python:${PYTHONPATH:-}

            # Workaround: sglang v0.5.12 has an incomplete suite rename
            case "${{ steps.config.outputs.framework-version }}" in 0.5.12*)
              rm -f /workdir/test/registered/radix_cache/test_unified_radix_cache_kl_hicache.py
            ;;
            esac

            cd /workdir/test
            export SGLANG_TIMEOUT=600
            python3 run_suite.py --hw cuda --suite stage-a-test-1
          '

      - name: Skip notice
        if: steps.check.outputs.exists != 'true'
        run: echo "Image not found in ECR — skipping tests (first release scenario)"
