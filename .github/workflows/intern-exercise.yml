name: "Print Metadata for PR"

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

jobs:
  print-metadata:
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.pull_request.number || 'manual'}}
      BRANCH_NAME: ${{ github.head_ref || github.ref_name}}
      HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: print-info
        run: |
          echo "PR Number: $PR_NUMBER"
          echo "Branch Name: $BRANCH_NAME"
          echo "Head Commit SHA: $HEAD_SHA"

  parse-config:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.metadata.outputs.image_name }}
      framework: ${{ steps.metadata.outputs.framework }}
      framework_version: ${{ steps.metadata.outputs.framework_version }}
      device_type: ${{ steps.metadata.outputs.device_type }}
      customer_type: ${{ steps.metadata.outputs.customer_type }}
      prod_image: ${{ steps.metadata.outputs.prod_image }}
    steps:
      - uses: actions/checkout@v6
      - name: Extract metadata
        id: metadata
        shell: bash
        run: |
          CONFIG_FILE=".github/config/image/pytorch/2.11-ec2-cuda.yml"
          echo "image_name=$(yq '.image.name' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "framework=$(yq '.metadata.framework' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "framework_version=$(yq '.metadata.framework_version' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "device_type=$(yq '.metadata.device_type' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "customer_type=$(yq '.metadata.customer_type' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "prod_image=$(yq '.metadata.prod_image' "$CONFIG_FILE")" >> $GITHUB_OUTPUT


  summarize:
    needs: [parse-config]
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        env:
          IMAGE_NAME: ${{ needs.parse-config.outputs.image_name }}
          FRAMEWORK: ${{ needs.parse-config.outputs.framework }}
          FRAMEWORK_VERSION: ${{ needs.parse-config.outputs.framework_version }}
          DEVICE_TYPE: ${{ needs.parse-config.outputs.device_type }}
          CUSTOMER_TYPE: ${{ needs.parse-config.outputs.customer_type }}
          PROD_IMAGE: ${{ needs.parse-config.outputs.prod_image }}
        run: |
          echo "Image: $IMAGE_NAME | framework=$FRAMEWORK | version=$FRAMEWORK_VERSION | device=$DEVICE_TYPE | customer=$CUSTOMER_TYPE"
      - name: GPU info
        if: needs.parse-config.outputs.device_type == 'gpu'
        run: |
          echo "GPU build: CUDA acceleration enabled"
      - name: CPU info
        if: needs.parse-config.outputs.device_type == 'cpu'
        run: |
          echo "CPU build: no accelerator"
      - name: SageMaker info
        if: needs.parse-config.outputs.customer_type == 'sagemaker'
        run: |
          echo "SageMaker image: adding SM labels"
      - name: EC2 info
        if: needs.parse-config.outputs.customer_type == 'ec2'
        run: |
          echo "EC2 image: no SM labels needed"

