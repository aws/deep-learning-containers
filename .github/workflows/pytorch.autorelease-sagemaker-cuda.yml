name: "Auto Release - PyTorch SageMaker CUDA"

on:
  schedule:
    - cron: '20 17 * * 1,3'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  pipeline:
    uses: ./.github/workflows/pytorch.pipeline.yml
    with:
      config-file: .github/config/image/pytorch/2.11-sagemaker-cuda.yml
      tag-suffix: ${{ github.run_id }}
      release: true
    secrets: inherit
