# Release Schedule — HOUSEKEEPING ONLY
# This file is NOT consumed by any workflow or action at runtime.
# It exists solely as a human-readable reference and validation target.
# A prcheck workflow (_prcheck.release-schedule.yml) validates that each
# autorelease workflow's cron schedule matches the entries here.
#
# Release window: 9:00 AM – 4:00 PM PDT/PST (16:00 – 23:00 UTC)
# Heavy GPU workflows are interleaved with light/minimal to avoid resource contention.

schedules:
  # Monday / Wednesday
  - cron: "00 16 * * 1,3"
    workflow: vllm.autorelease-ec2-amzn2023.yml
    gpu: heavy

  - cron: "00 17 * * 1,3"
    workflow: pytorch.autorelease-2.11-ec2.yml
    gpu: light

  - cron: "00 18 * * 1,3"
    workflow: vllm.autorelease-sagemaker-amzn2023.yml
    gpu: heavy

  - cron: "00 19 * * 1,3"
    workflow: pytorch.autorelease-2.11-sagemaker.yml
    gpu: light

  - cron: "00 20 * * 1,3"
    workflow: vllm.autorelease-ec2-ubuntu.yml
    gpu: heavy

  - cron: "00 21 * * 1,3"
    workflow: base.autorelease-cu129.yml
    gpu: minimal

  - cron: "30 21 * * 1,3"
    workflow: vllm.autorelease-sagemaker-ubuntu.yml
    gpu: heavy

  - cron: "30 22 * * 1,3"
    workflow: base.autorelease-cu130.yml
    gpu: minimal

  # Tuesday / Thursday
  - cron: "00 16 * * 2,4"
    workflow: sglang.autorelease-ec2-amzn2023.yml
    gpu: heavy

  - cron: "00 17 * * 2,4"
    workflow: ray.autorelease-ec2.yml
    gpu: light

  - cron: "00 18 * * 2,4"
    workflow: sglang.autorelease-sagemaker-amzn2023.yml
    gpu: heavy

  - cron: "00 19 * * 2,4"
    workflow: vllm-omni.autorelease-ec2.yml
    gpu: medium

  - cron: "00 20 * * 2,4"
    workflow: sglang.autorelease-ec2-ubuntu.yml
    gpu: heavy

  - cron: "00 21 * * 2,4"
    workflow: ray.autorelease-sagemaker.yml
    gpu: light

  - cron: "30 21 * * 2,4"
    workflow: sglang.autorelease-sagemaker-ubuntu.yml
    gpu: heavy

  - cron: "00 22 * * 2,4"
    workflow: vllm-omni.autorelease-sagemaker.yml
    gpu: medium
